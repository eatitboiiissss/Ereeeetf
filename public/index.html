<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --acc:#5b8df8;--acc2:#4a7af0;--acc-g:rgba(91,141,248,.15);
  --green:#23d18b;--red:#f04747;--yellow:#faa61a;--purple:#a855f7;--orange:#ff6b35;
  --bg0:#07070e;--bg1:#0e0e1a;--bg2:#141422;--bg3:#1a1a2e;--bg4:#22223f;--bg5:#2a2a4a;
  --t0:#f0f0f8;--t1:#9898b8;--t2:#4a4a6e;
  --bdr:rgba(255,255,255,.05);--bdr2:rgba(255,255,255,.1);
  --sh:0 8px 32px rgba(0,0,0,.7);--r:10px;
  --font:'Norse',serif;
  --rail-w:68px;--sb-w:230px;--mp-w:220px;
  --blend-bg:transparent;--blend-msgs:transparent;--blend-mode:normal;
}
body.light-mode{--bg0:#f0f2f5;--bg1:#e4e8f0;--bg2:#ffffff;--bg3:#f2f4f8;--bg4:#e8edf5;--bg5:#dce3ef;--t0:#1a1a2e;--t1:#4a4a6e;--t2:#8888a8;--bdr:rgba(0,0,0,.08);--bdr2:rgba(0,0,0,.12)}
body{font-family:var(--font);background:var(--bg0);color:var(--t0);overflow:hidden;height:100vh;height:100dvh;transition:background .3s,color .3s}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(91,141,248,.3);border-radius:2px}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit;transition:all .15s;touch-action:manipulation}
input,textarea,select{font-family:inherit;outline:none;border:none;-webkit-appearance:none}
.hidden{display:none!important}

/* BG */
#bg-theme{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;pointer-events:none;opacity:0;transition:opacity .5s}
#bg-theme.on{opacity:1}
#bg-dim{position:fixed;inset:0;z-index:1;pointer-events:none;display:none}
#bg-theme.no-ui-mode~#bg-dim{display:none}

/* ── AUTH ─────────────────────────────────────────── */
#auth{position:relative;z-index:10;display:flex;align-items:center;justify-content:center;height:100vh;height:100dvh;padding:16px;background:radial-gradient(ellipse at 30% 50%,rgba(91,141,248,.1),transparent 60%),radial-gradient(ellipse at 70% 20%,rgba(168,85,247,.08),transparent 50%)}
.abox{background:rgba(14,14,26,.97);backdrop-filter:blur(20px);border:1px solid var(--bdr2);border-radius:20px;padding:28px 32px;width:100%;max-width:400px;box-shadow:0 32px 80px rgba(0,0,0,.9)}

.alogo{text-align:center;font-family:'Norse',serif;font-size:32px;font-weight:normal;letter-spacing:2px;margin-bottom:3px}
.alogo em{color:var(--acc);font-style:normal}
.atag{text-align:center;font-size:12px;color:var(--t2);margin-bottom:18px}
.atabs{display:flex;gap:4px;background:rgba(255,255,255,.05);border-radius:10px;padding:4px;margin-bottom:16px}
.atab{flex:1;padding:8px;border-radius:7px;font-size:13px;font-weight:600;color:var(--t2);border:none;background:none;cursor:pointer}
.atab.on{background:var(--acc);color:#fff}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t2);margin-bottom:5px}
.fld input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:9px;padding:11px 13px;color:var(--t0);font-size:14px;transition:border-color .2s}
.fld input:focus{border-color:var(--acc)}
.btn-p{width:100%;padding:12px;border-radius:9px;font-size:14px;font-weight:700;background:var(--acc);color:#fff;cursor:pointer;margin-top:4px;font-family:inherit;border:none;transition:all .2s}
.btn-p:hover{background:var(--acc2);transform:translateY(-1px)}
.aerr{background:rgba(240,71,71,.1);border:1px solid rgba(240,71,71,.3);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--red);margin-bottom:10px;display:none}
.key-badge{display:inline-block;background:rgba(91,141,248,.1);border:1px solid rgba(91,141,248,.3);border-radius:8px;padding:6px 14px;font-size:12px;color:var(--acc);margin-bottom:14px}

/* ── APP LAYOUT ──────────────────────────────────── */
#app{display:none;position:relative;z-index:2;height:100vh;height:100dvh}
.layout{display:flex;height:100%;overflow:hidden}

/* RAIL */
.rail{width:var(--rail-w);background:rgba(7,7,14,.85);backdrop-filter:blur(10px);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:3px;overflow-y:auto;flex-shrink:0;border-right:1px solid var(--bdr);overflow-x:hidden}
.rb{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .22s;position:relative;flex-shrink:0;background:var(--bg3);border:2px solid transparent;overflow:hidden}
.rb:hover,.rb.on{border-radius:12px;background:var(--acc)}
.rb.on::before{content:'';position:absolute;left:-14px;width:4px;height:28px;background:#fff;border-radius:0 4px 4px 0}
.rb img{width:100%;height:100%;object-fit:cover;border-radius:inherit}
.rsep{width:28px;height:1px;background:var(--bdr2);margin:2px 0;flex-shrink:0}
.rbadge{position:absolute;top:-2px;right:-2px;background:var(--red);color:#fff;border-radius:50%;width:15px;height:15px;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg0)}

/* SIDEBAR */
.sb{width:var(--sb-w);background:rgba(14,14,26,.95);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid var(--bdr);overflow:hidden}
.srv-ban{width:100%;height:64px;object-fit:cover;flex-shrink:0;display:none}
.srv-ban.show{display:block}
.sbhd{height:46px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid var(--bdr);flex-shrink:0;cursor:pointer}
.sbt{font-size:14px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sbhd:hover .sbt{color:var(--acc)}
.sbbody{flex:1;overflow-y:auto;padding:4px 0}
.cat-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 8px 3px 10px}
.catlbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t2)}
.ci-row{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:7px;cursor:pointer;transition:background .12s;margin:1px 5px;position:relative}
.ci-row:hover{background:rgba(255,255,255,.05)}
.ci-row.on{background:rgba(91,141,248,.15)}
.ci-ic{font-size:13px;color:var(--t2);width:15px;text-align:center;flex-shrink:0;font-weight:800}
.ci-row.on .ci-ic{color:var(--acc)}
.ci-nm{font-size:13px;font-weight:500;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ci-row:hover .ci-nm,.ci-row.on .ci-nm{color:var(--t0)}
.ci-row:hover .chopts{opacity:1}
.chopts{opacity:0;display:flex;gap:1px;margin-left:auto}
.chopts button{color:var(--t2);padding:2px 4px;border-radius:4px;font-size:11px}
.chopts button:hover{color:var(--t0);background:var(--bg4)}
.vcsubs{margin:2px 5px 3px 22px}
.vcsub{display:flex;align-items:center;gap:5px;padding:2px 5px;border-radius:5px;font-size:11px;color:var(--t1)}
.vcsubav{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:11px}
.vcsubav img{width:100%;height:100%;object-fit:cover}

/* USER PANEL */
.up{display:flex;align-items:center;gap:7px;padding:7px;border-top:1px solid var(--bdr);flex-shrink:0;background:rgba(10,10,18,.9)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg3);overflow:hidden;flex-shrink:0;position:relative}
.av img{width:100%;height:100%;object-fit:cover;border-radius:inherit}
.av.s20{width:20px;height:20px;font-size:12px}
.av.s24{width:24px;height:24px;font-size:14px}
.av.s28{width:28px;height:28px;font-size:15px}
.av.s32{width:32px;height:32px;font-size:17px}
.av.s40{width:40px;height:40px;font-size:21px}
.av.s48{width:48px;height:48px;font-size:25px}
.av.s64{width:64px;height:64px;font-size:34px}
.sdot{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg1)}
.upi{flex:1;min-width:0}
.upn{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ups{font-size:10px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.upacts{display:flex;gap:1px}
.upacts button{color:var(--t2);padding:4px;border-radius:6px;font-size:13px}
.upacts button:hover{background:var(--bg3);color:var(--t0)}
.upacts button.muted{color:var(--red)}

/* VC BAR */
.vcbar{background:rgba(35,209,139,.06);border-top:1px solid rgba(35,209,139,.15);padding:7px 9px;flex-shrink:0}
.vcbar-top{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.vcdot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.vcts{display:flex;gap:2px}
.vcts button{color:var(--t2);padding:3px 4px;border-radius:5px;font-size:12px}
.vcts button:hover{background:var(--bg3);color:var(--t0)}
.vcts button.muted{color:var(--red)}.vcts button.aon{color:var(--acc)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg2);position:relative;min-width:0}
.main::before{content:'';position:absolute;inset:0;background:var(--blend-msgs);mix-blend-mode:var(--blend-mode);pointer-events:none;z-index:1;transition:background .4s}
.msgs,.chhdr,.inpwrap,.typr{position:relative;z-index:2}
.chhdr{height:46px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 12px;gap:9px;flex-shrink:0;background:rgba(20,20,34,.9);backdrop-filter:blur(8px);z-index:10;position:relative}
.chhdr-mob{display:none;color:var(--t2);font-size:18px;padding:4px 6px;border-radius:6px;cursor:pointer;margin-right:2px}
.chhdr .ci-ic{font-size:15px;color:var(--t2);font-weight:800}
.chhdr h3{font-size:14px;font-weight:800}
.chtopic{font-size:11px;color:var(--t2);padding-left:9px;border-left:1px solid var(--bdr2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.chhdra{margin-left:auto;display:flex;gap:1px}
.chhdra button{color:var(--t2);padding:4px 6px;border-radius:6px;font-size:13px}
.chhdra button:hover{background:rgba(255,255,255,.07);color:var(--t0)}
.chhdra button.on{color:var(--acc)}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:2px 0}
.mi{display:flex;flex-direction:column;padding:0 12px;margin-bottom:1px}
.mg{display:flex;gap:10px;padding:3px 0;border-radius:5px;transition:background .1s;position:relative}
.mg:hover{background:rgba(255,255,255,.02)}
.mg:hover .macts{opacity:1;pointer-events:all}
.mg-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg3);flex-shrink:0;cursor:pointer;overflow:hidden;font-size:19px;margin-top:2px}
.mg-av img{width:100%;height:100%;object-fit:cover}
.mgbody{flex:1;min-width:0}
.mghdr{display:flex;align-items:baseline;gap:7px;margin-bottom:1px;flex-wrap:wrap}
.mgan{font-size:14px;font-weight:700;cursor:pointer;line-height:1}
.mgan:hover{text-decoration:underline}
.mgts{font-size:10px;color:var(--t2)}
.mgadm{font-size:9px;background:rgba(240,71,71,.15);color:var(--red);border-radius:3px;padding:1px 5px;font-weight:700}
/* Markdown rendered content */
.mgtxt{font-size:14px;line-height:1.6;color:var(--t1);word-break:break-word}
.mgtxt strong{color:var(--t0);font-weight:700}
.mgtxt em{font-style:italic}
.mgtxt u{text-decoration:underline}
.mgtxt s{text-decoration:line-through;color:var(--t2)}
.mgtxt .spoiler{background:var(--t2);color:transparent;border-radius:4px;padding:0 3px;cursor:pointer;transition:all .2s;user-select:none}
.mgtxt .spoiler.open{background:var(--bg4);color:var(--t0)}
.mgtxt code{background:var(--bg4);border-radius:4px;padding:1px 5px;font-family:monospace;font-size:13px;color:#e879f9}
.mgtxt pre{background:var(--bg1);border-radius:8px;padding:10px 14px;margin:4px 0;overflow-x:auto;border:1px solid var(--bdr)}
.mgtxt pre code{background:none;padding:0;font-size:13px;color:#a5f3fc;font-family:'Courier New',monospace}
.mgtxt blockquote{border-left:3px solid var(--acc);padding:3px 10px;color:var(--t2);margin:3px 0;font-style:italic}
.mgtxt.ed::after{content:' (edited)';font-size:10px;color:var(--t2);font-style:italic}
.mgatt{margin-top:5px;max-width:360px}
.mgatt img,.mgatt video{max-width:100%;border-radius:9px;cursor:pointer;display:block}
.mgatt .file-att{display:flex;align-items:center;gap:9px;background:var(--bg3);border-radius:9px;padding:9px 12px;border:1px solid var(--bdr)}
.mgatt .file-att .fn{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.mgatt .file-att .fs{font-size:11px;color:var(--t2)}
.rref{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t2);margin-bottom:3px;cursor:pointer;background:rgba(255,255,255,.03);border-radius:5px;padding:3px 7px;border-left:2px solid var(--acc)}
.rxns{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.rxn{display:flex;align-items:center;gap:3px;background:var(--bg3);border:1px solid var(--bdr);border-radius:10px;padding:2px 7px;cursor:pointer;font-size:13px}
.rxn:hover{border-color:var(--acc)}
.rxn.mine{background:var(--acc-g);border-color:rgba(91,141,248,.4)}
.rxn-n{font-size:11px;font-weight:700;color:var(--t1)}
.macts{opacity:0;pointer-events:none;position:absolute;right:0;top:-20px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:9px;padding:3px;display:flex;gap:1px;z-index:30;box-shadow:var(--sh)}
.macts button{padding:3px 6px;border-radius:5px;font-size:11px;color:var(--t1)}
.macts button:hover{background:var(--bg4);color:var(--t0)}
.macts button.d:hover{background:var(--red);color:#fff}
.typr{height:22px;padding:0 12px;font-size:11px;color:var(--t2);display:flex;align-items:center;gap:5px;flex-shrink:0}
.tdots span{display:inline-block;width:3px;height:3px;border-radius:50%;background:var(--t2);animation:td .9s infinite;margin-right:1px}
.tdots span:nth-child(2){animation-delay:.15s}.tdots span:nth-child(3){animation-delay:.3s}
@keyframes td{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-4px)}}
.daysep{display:flex;align-items:center;gap:10px;padding:9px 12px;color:var(--t2);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.daysep::before,.daysep::after{content:'';flex:1;height:1px;background:var(--bdr)}

/* INPUT */
.inpwrap{padding:0 12px 12px;flex-shrink:0}
.rib{background:var(--bg3);border-left:3px solid var(--acc);border-radius:0 7px 7px 0;padding:5px 10px;margin-bottom:6px;font-size:12px;color:var(--t2);display:flex;align-items:center;justify-content:space-between}
.rib strong{color:var(--acc)}
.inpbox{background:var(--bg3);border-radius:11px;display:flex;align-items:flex-end;gap:5px;padding:7px 10px;border:1px solid var(--bdr);transition:border-color .2s}
.inpbox:focus-within{border-color:rgba(91,141,248,.4)}
.inpbox button{color:var(--t2);padding:3px;border-radius:5px;font-size:16px;flex-shrink:0}
.inpbox button:hover{color:var(--t0);background:var(--bg4)}
.inpbox button.sendbtn{color:var(--acc)}
.msgta{flex:1;background:none;border:none;color:var(--t0);font-size:14px;resize:none;max-height:120px;min-height:20px;line-height:1.5;font-family:inherit}
.msgta::placeholder{color:var(--t2)}
.attprev{display:flex;align-items:center;gap:7px;background:var(--bg4);border-radius:7px;padding:5px 9px;margin-bottom:6px;font-size:12px}
.attprev img{height:36px;border-radius:3px;object-fit:cover}
.attprev .an{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t1)}

/* MEMBERS */
.mp{width:var(--mp-w);background:rgba(14,14,26,.9);padding:0 5px;overflow-y:auto;flex-shrink:0;border-left:1px solid var(--bdr)}
.mpsec{padding-top:12px;margin-bottom:5px}
.mpsec h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t2);padding:0 7px;margin-bottom:7px}
.mr{display:flex;align-items:center;gap:8px;padding:5px 7px;border-radius:8px;cursor:pointer;transition:background .12s}
.mr:hover{background:rgba(255,255,255,.05)}
.mrnm{font-size:12px;font-weight:500;color:var(--t2)}
.mr:hover .mrnm{color:var(--t0)}

/* VOICE OV */
.vcov{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:flex;flex-direction:column;backdrop-filter:blur(12px)}
.vcovhd{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid var(--bdr);gap:10px}
.vcovhd h2{font-size:16px;font-weight:800}
.vcpill{background:var(--bg3);border-radius:7px;padding:3px 10px;font-size:11px;color:var(--t1)}
.vcgrid{flex:1;display:flex;flex-wrap:wrap;gap:12px;padding:14px;align-content:flex-start;overflow-y:auto}
.vctile{background:var(--bg2);border-radius:14px;border:2px solid var(--bdr);position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:160px;flex:1;min-width:180px;max-width:400px}
.vctile.spk{border-color:var(--green);box-shadow:0 0 20px rgba(35,209,139,.2)}
.vctile video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.vctile-info{position:absolute;bottom:8px;left:8px;display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.7);border-radius:18px;padding:3px 10px 3px 5px;backdrop-filter:blur(4px)}
.vctile-ic{position:absolute;top:8px;right:8px;display:flex;gap:2px}
.vctile-ic span{background:rgba(0,0,0,.65);border-radius:5px;padding:2px 4px;font-size:10px}
.vcbigav{font-size:52px;margin-bottom:5px}
.vctname{font-size:12px;font-weight:600;color:var(--t1)}
.vcctrls{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px;border-top:1px solid var(--bdr);flex-wrap:wrap}
.vcctw{display:flex;flex-direction:column;align-items:center;gap:3px}
.vcct{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;background:var(--bg3);color:var(--t0);transition:all .2s}
.vcct:hover{transform:scale(1.08);background:var(--bg4)}
.vcct.muted{background:var(--red)}.vcct.aon{background:var(--acc)}.vcct.leave{background:var(--red);width:50px;height:50px}
.vcct-lbl{font-size:9px;color:var(--t2)}
.vc-quality{background:var(--bg3);border:1px solid var(--bdr);border-radius:7px;padding:4px 8px;color:var(--t0);font-size:12px;cursor:pointer}

/* MODALS */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(6px);padding:12px}
.modal{background:var(--bg2);border-radius:16px;padding:22px;width:100%;max-width:460px;border:1px solid var(--bdr2);box-shadow:0 32px 80px rgba(0,0,0,.9);max-height:90vh;overflow-y:auto}
.modal h2{font-size:18px;font-weight:800;margin-bottom:5px}
.modal .sub{color:var(--t1);font-size:12px;margin-bottom:16px}
.mfld{margin-bottom:13px}
.mfld label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t2);margin-bottom:6px}
.mfld input,.mfld textarea,.mfld select{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:9px;padding:9px 12px;color:var(--t0);font-size:14px;transition:border-color .2s}
.mfld input:focus,.mfld textarea:focus{border-color:var(--acc)}
.mfld textarea{resize:vertical;min-height:60px}
.macts2{display:flex;gap:9px;justify-content:flex-end;margin-top:7px}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:none}
.btn-acc{background:var(--acc);color:#fff}.btn-acc:hover{background:var(--acc2)}
.btn-g{color:var(--t1);background:transparent}.btn-g:hover{color:var(--t0)}
.btn-d{background:var(--red);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.uparea{border:2px dashed var(--bdr2);border-radius:9px;padding:16px;text-align:center;cursor:pointer;color:var(--t2);font-size:13px;transition:all .2s}
.uparea:hover{border-color:var(--acc);color:var(--acc)}
.uparea img{max-width:100%;max-height:90px;border-radius:5px;margin-top:7px;object-fit:cover}

/* FRIENDS */
.frpg{display:flex;flex-direction:column;flex:1;overflow:hidden}
.frtabs{display:flex;gap:2px;padding:8px 12px;border-bottom:1px solid var(--bdr);flex-shrink:0;overflow-x:auto}
.frtab{padding:6px 12px;border-radius:7px;font-size:13px;font-weight:600;color:var(--t2);white-space:nowrap;position:relative}
.frtab:hover{color:var(--t0);background:rgba(255,255,255,.05)}
.frtab.on{background:var(--acc-g);color:var(--acc)}
.frtab .b2{position:absolute;top:-2px;right:-2px;background:var(--red);color:#fff;border-radius:50%;width:13px;height:13px;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center}
.frlist{flex:1;overflow-y:auto;padding:12px}
.fcard{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border-radius:11px;margin-bottom:7px}
.fcard:hover{background:var(--bg4)}
.finfo{flex:1;min-width:0}
.fnm{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fsub{font-size:11px;color:var(--t2)}
.facts{display:flex;gap:5px;flex-shrink:0}

/* DISCOVER */
.discgrid{display:flex;flex-wrap:wrap;gap:12px;padding:14px;overflow-y:auto;flex:1;align-content:flex-start}
.dcard{background:var(--bg3);border-radius:13px;overflow:hidden;width:196px;cursor:pointer;transition:all .2s;border:1px solid var(--bdr)}
.dcard:hover{transform:translateY(-2px);box-shadow:var(--sh);border-color:var(--acc)}
.dban{height:72px;object-fit:cover;width:100%;display:block}
.dinfo{padding:10px}
.dname{font-size:13px;font-weight:800;margin-bottom:3px}
.ddesc{font-size:11px;color:var(--t2);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:6px}
.dmeta{font-size:10px;color:var(--t2)}
.dmeta strong{color:var(--green)}

/* SETTINGS */
.slayout{display:flex;flex:1;overflow:hidden}
.snav{width:190px;background:var(--bg1);padding:12px 7px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--bdr)}
.snav h3{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t2);padding:0 7px;margin:12px 0 7px;display:block}
.snav h3:first-child{margin-top:0}
.si{padding:7px 9px;border-radius:7px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;display:flex;align-items:center;gap:7px}
.si:hover{color:var(--t0);background:rgba(255,255,255,.05)}
.si.on{color:var(--t0);background:var(--acc-g)}
.scontent{flex:1;overflow-y:auto;padding:24px}
.scontent h2{font-size:20px;font-weight:800;margin-bottom:5px}
.scontent .sdesc{color:var(--t1);font-size:12px;margin-bottom:22px}
.ssec{margin-bottom:22px}
.ssec h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t2);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bdr)}
.srow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bdr)}
.srow:last-child{border-bottom:none}
.srl{font-size:13px;font-weight:500}
.srs{font-size:11px;color:var(--t2);margin-top:2px}
.sinp{background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:7px 11px;color:var(--t0);font-size:13px}
.sinp:focus{border-color:var(--acc);outline:none}
.tog{width:38px;height:22px;border-radius:11px;background:var(--bg4);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none}
.tog.on{background:var(--acc)}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s}
.tog.on::after{transform:translateX(16px)}
.range-inp{accent-color:var(--acc);width:160px}
.clrpick{width:40px;height:30px;border-radius:7px;border:1px solid var(--bdr);cursor:pointer;background:none;padding:2px}
.theme-swatches{display:flex;gap:7px;flex-wrap:wrap}
.tsw{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:transform .15s;border:2px solid transparent}
.tsw:hover,.tsw.on{transform:scale(1.18);border-color:#fff}

/* PROFILE CARD */
.pc{position:fixed;background:var(--bg2);border:1px solid var(--bdr2);border-radius:14px;width:270px;z-index:5000;box-shadow:0 20px 60px rgba(0,0,0,.9);overflow:hidden}
.pcban{height:64px;object-fit:cover;width:100%;display:block}
.pcbody{padding:0 14px 14px}
.pcavr{display:flex;align-items:flex-end;justify-content:space-between;margin-top:-22px;margin-bottom:9px}
.pcname{font-size:16px;font-weight:800}
.pcun{font-size:11px;color:var(--t2);margin-bottom:3px}
.pccs{font-size:11px;color:var(--t1);font-style:italic;margin-bottom:7px}
.pcbio{font-size:11px;color:var(--t1);line-height:1.5;margin-bottom:10px}
.pcacts{display:flex;gap:6px}

/* ADMIN TABLE */
.abtable{width:100%;border-collapse:collapse}
.abtable th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t2);padding:7px 10px;text-align:left;border-bottom:1px solid var(--bdr)}
.abtable td{padding:9px 10px;border-bottom:1px solid var(--bdr);font-size:12px}

/* CTX */
.ctx{position:fixed;background:var(--bg3);border:1px solid var(--bdr2);border-radius:11px;padding:4px;z-index:9000;min-width:170px;box-shadow:0 12px 40px rgba(0,0,0,.8)}
.ctx-i{padding:7px 11px;border-radius:6px;font-size:13px;cursor:pointer;color:var(--t1);display:flex;align-items:center;gap:8px}
.ctx-i:hover{background:var(--acc);color:#fff}
.ctx-i.d:hover{background:var(--red);color:#fff}
.ctxsep{height:1px;background:var(--bdr);margin:3px 0}

/* EMOJI PICKER */
.ep{position:absolute;bottom:56px;right:8px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:13px;padding:9px;z-index:200;box-shadow:var(--sh);width:220px}
.ep input{width:100%;background:var(--bg4);border:1px solid var(--bdr);border-radius:7px;padding:5px 9px;color:var(--t0);font-size:12px;margin-bottom:7px}
.ep input:focus{outline:none;border-color:var(--acc)}
.epgrid{display:flex;flex-wrap:wrap;gap:2px;max-height:140px;overflow-y:auto}
.epbtn{font-size:19px;padding:3px;border-radius:5px;cursor:pointer;background:none;border:none;line-height:1}
.epbtn:hover{background:var(--bg4)}

/* SEARCH OV */
.sov{position:fixed;top:60px;left:50%;transform:translateX(-50%);width:520px;max-width:95vw;background:var(--bg2);border:1px solid var(--bdr2);border-radius:13px;padding:12px;z-index:2000;box-shadow:var(--sh)}
.sovrow{display:flex;align-items:center;gap:7px;background:var(--bg3);border-radius:8px;padding:7px 11px;margin-bottom:9px}
.sovrow input{flex:1;background:none;border:none;color:var(--t0);font-size:13px;font-family:inherit}
.sri{padding:7px 10px;border-radius:7px;cursor:pointer}
.sri:hover{background:var(--bg3)}
.src{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* SOUNDBOARD */
.sbpanel{position:absolute;bottom:60px;right:8px;width:260px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:13px;padding:12px;z-index:200;box-shadow:var(--sh)}
.sbpanel h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t2);margin-bottom:9px}
.sbsound{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500}
.sbsound:hover{background:var(--bg4)}

/* TOASTS */
.toasts{position:fixed;top:12px;right:12px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{background:var(--bg3);border:1px solid var(--bdr2);border-left:3px solid var(--acc);border-radius:9px;padding:9px 12px;pointer-events:all;animation:tin .25s;box-shadow:var(--sh);max-width:260px}
.toast.err{border-left-color:var(--red)}.toast.ok{border-left-color:var(--green)}
.toast-t{font-size:12px;font-weight:700;margin-bottom:1px}
.toast-b{font-size:11px;color:var(--t1)}
@keyframes tin{from{transform:translateX(120%);opacity:0}to{transform:none;opacity:1}}

/* WELCOME */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:9px;color:var(--t2);padding:32px;text-align:center}

<script>
// ── State ──────────────────────────────────────────────────────────
let me=null,ws=null;
let regKey='';
Object.defineProperty(window,'regKey',{get:()=>regKey,set:v=>{regKey=v;}});
let servers=[],allUsers={},friendships=[],groupChats=[],wallEntries=[];
let activeSrvId=null,activeChId=null,activeDMId=null,activeGroupId=null;
let view='welcome';
let messages={},dmMessages={},groupMessages={},msgCache={};
let showMP=true,muted=false,deafened=false,camOn=false,ssOn=false;
let voiceChId=null,voiceSrvId=null,localStream=null,screenStream=null;
let peerConns={},voiceRooms={},vcQuality='720p';
let typingTimers={},typingUsers={};
let replyTo=null,attachFile=null,lastTyping=0;
let mySettings={theme_color:'#5b8df8',theme_mode:'dark',theme_bg:null,theme_bg_blur:0,theme_bg_dim:40,theme_no_ui:0,theme_blend:null,theme_blend_opacity:30,custom_font_url:null,custom_font_name:null,profile_theme_color:'#5b8df8',profile_theme_gradient:null,notifications:1};
let friendTab='all',settingsTab='profile';
let soundboard=[];
const ICE=[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}];
const SL={online:'Online',idle:'Idle',dnd:'Do Not Disturb',offline:'Offline'};
const SDC={online:'sd-online',idle:'sd-idle',dnd:'sd-dnd',offline:'sd-offline'};
const SC={online:'var(--green)',idle:'var(--yellow)',dnd:'var(--red)',offline:'var(--t2)'};
const EMOJIS='👍❤️😂😮😢🔥🎉👋✅💯🚀💀😍🤔👀🎵💻🎮⭐🙏😎🤣🥳😤🫡💪🤖🎯🍕🎶🦊🐱🐼🦁🌟💎🎸🏆🧠'.split('');
const THEME_COLORS=['#5b8df8','#a855f7','#23d18b','#f04747','#faa61a','#ff6b35','#ec4899','#06b6d4','#10b981','#f59e0b','#8b5cf6','#ef4444'];
const isMob=()=>window.innerWidth<=700;

const $=id=>document.getElementById(id);
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function srvIcon(s,sz){
  sz=sz||44;
  if(s&&s.icon)return`<img src="${esc(s.icon)}" alt="" style="width:${sz}px;height:${sz}px;object-fit:cover;border-radius:${sz>32?12:8}px"/>`;
  const initials=((s&&s.name)||'??').slice(0,2).toUpperCase();
  return`<div style="width:${sz}px;height:${sz}px;border-radius:${sz>32?12:8}px;background:var(--acc-g);display:flex;align-items:center;justify-content:center;font-size:${Math.floor(sz*0.33)}px;font-weight:900;color:var(--acc);letter-spacing:-1px;border:1px solid var(--bdr2)">${esc(initials)}</div>`;
}
function fmtT(ts){return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
function fmtD(ts){return new Date(ts).toLocaleDateString([],{month:'long',day:'numeric',year:'numeric'})}
function fmtSize(b){if(!b)return'';if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB';}
function timeAgo(ts){const d=Date.now()-ts;if(d<60000)return'just now';if(d<3600000)return Math.floor(d/60000)+'m';if(d<86400000)return Math.floor(d/3600000)+'h';return Math.floor(d/86400000)+'d';}
function getUser(id){return allUsers[id]||{id,username:'unknown',displayName:'Unknown',avatar:null,avatarEmoji:'👤',status:'offline',customStatus:''}}
function findCh(id){for(const s of servers)for(const c of s.channels)if(c.id===id)return c;return null}
function findSrv(id){return servers.find(s=>s.id===id)}
function pend(){return friendships.filter(f=>f.status==='pending'&&!f.isRequester).length}
function renderAv(u,sz='s32'){
  const s2=sz;
  if(u?.avatar)return`<div class="av ${s2}"><img src="${esc(u.avatar)}" alt=""/></div>`;
  return`<div class="av ${s2}">${esc(u?.avatarEmoji||'👤')}</div>`;
}

// ── Markdown renderer ──────────────────────────────────────────────
function renderMD(text){
  if(!text)return'';
  let s=esc(text);
  // Code blocks first (preserve)
  const codeBlocks=[];
  s=s.replace(/```([\s\S]*?)```/g,(_,c)=>{codeBlocks.push(`<pre><code>${c.trim()}</code></pre>`);return`\x00CODE${codeBlocks.length-1}\x00`;});
  // Inline code
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  // Block quotes
  s=s.replace(/(^|<br>)&gt; (.+)/g,'$1<blockquote>$2</blockquote>');
  // Bold+italic
  s=s.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  // Bold
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  // Italic *
  s=s.replace(/\*([^*]+?)\*/g,'<em>$1</em>');
  // Italic _
  s=s.replace(/_([^_]+?)_/g,'<em>$1</em>');
  // Underline
  s=s.replace(/__(.+?)__/g,'<u>$1</u>');
  // Strikethrough
  s=s.replace(/~~(.+?)~~/g,'<s>$1</s>');
  // Spoiler
  s=s.replace(/\|\|(.+?)\|\|/g,'<span class="spoiler" onclick="this.classList.toggle(\'open\')">$1</span>');
  // Newlines
  s=s.replace(/\n/g,'<br>');
  // Restore code blocks
  s=s.replace(/\x00CODE(\d+)\x00/g,(_,i)=>codeBlocks[i]);
  return s;
}

// ── Theme ──────────────────────────────────────────────────────────
function applyTheme(s){
  s=s||mySettings;
  document.body.classList.toggle('light-mode',s.theme_mode==='light');
  const root=document.documentElement;
  if(s.theme_color){
    root.style.setProperty('--acc',s.theme_color);
    root.style.setProperty('--acc2',s.theme_color);
    root.style.setProperty('--acc-g',hexToRgba(s.theme_color,.15));
  }
  // ── Blend color theme ──────────────────────────────────────────
  if(s.theme_blend){
    const op=(parseInt(s.theme_blend_opacity)||30)/100;
    const blendRgba=hexToRgba(s.theme_blend,op);
    const blendRgbaStrong=hexToRgba(s.theme_blend,op*0.6);
    root.style.setProperty('--blend-msgs',blendRgba);
    root.style.setProperty('--blend-mode','normal');
    // Tint sidebar/rail/bg layers using a CSS variable approach
    const styleEl=document.getElementById('blend-style')||Object.assign(document.createElement('style'),{id:'blend-style'});
    styleEl.textContent=`
      .sb{background:color-mix(in srgb,${s.theme_blend} ${Math.round(op*60*100)}%,rgba(14,14,26,.95))!important}
      .rail{background:color-mix(in srgb,${s.theme_blend} ${Math.round(op*50*100)}%,rgba(7,7,14,.85))!important}
      .up{background:color-mix(in srgb,${s.theme_blend} ${Math.round(op*40*100)}%,rgba(10,10,18,.9))!important}
      .chhdr{background:color-mix(in srgb,${s.theme_blend} ${Math.round(op*30*100)}%,rgba(20,20,34,.9))!important}
      .main{background:color-mix(in srgb,${s.theme_blend} ${Math.round(op*20*100)}%,var(--bg2))!important}
      .mp{background:color-mix(in srgb,${s.theme_blend} ${Math.round(op*30*100)}%,rgba(14,14,26,.9))!important}
      .vcbar{background:color-mix(in srgb,${s.theme_blend} ${Math.round(op*20*100)}%,rgba(35,209,139,.06))!important}
      .inpbox{background:color-mix(in srgb,${s.theme_blend} ${Math.round(op*40*100)}%,var(--bg3))!important}
      .mg:hover{background:${hexToRgba(s.theme_blend,0.08)}!important}
    `;
    if(!document.getElementById('blend-style'))document.head.appendChild(styleEl);
  } else {
    const old=document.getElementById('blend-style');if(old)old.textContent='';
    root.style.setProperty('--blend-msgs','transparent');
  }
  // ── Background image ───────────────────────────────────────────
  const bg=$('bg-theme'),dim=$('bg-dim');
  if(s.theme_bg){
    bg.style.backgroundImage=`url(${s.theme_bg})`;
    const blurVal=parseInt(s.theme_bg_blur)||0;
    const dimVal=parseInt(s.theme_bg_dim)??40;
    bg.style.filter=blurVal>0?`blur(${blurVal*6}px)`:'none';
    bg.classList.add('on');
    if(s.theme_no_ui){
      dim.style.display='none';
      document.querySelectorAll('.sb,.rail,.up,.chhdr,.inpwrap').forEach(el=>el.style.background='transparent');
    } else {
      dim.style.background=`rgba(0,0,0,${dimVal/100})`;
      dim.style.display='block';
      document.querySelectorAll('.sb,.rail,.up,.chhdr,.inpwrap').forEach(el=>el.style.background='');
    }
  } else {
    bg.classList.remove('on');
    dim.style.display='none';
    document.querySelectorAll('.sb,.rail,.up,.chhdr,.inpwrap').forEach(el=>el.style.background='');
  }
  // ── Font ───────────────────────────────────────────────────────
  if(s.custom_font_url){
    $('font-style').textContent=`@font-face{font-family:'${esc(s.custom_font_name||'CF')}';src:url('${s.custom_font_url}');}:root{--font:'${esc(s.custom_font_name||'CF')}',serif;}`;
  } else {
    $('font-style').textContent=`:root{--font:'Norse',serif;}`;
  }
}
function hexToRgba(hex,a){try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}catch{return`rgba(91,141,248,${a})`;}}

// ── AUTH ────────────────────────────────────────────────────────────
function validateKey(){
  var k=document.getElementById('reg-key-inp').value.trim();
  if(!k){var e=document.getElementById('aerr');if(e){e.textContent='Please enter the registration key.';e.style.display='block';}return;}
  window.regKey=k;
  var sk=document.getElementById('step-key');
  var sa=document.getElementById('step-auth');
  if(sk)sk.style.cssText='display:none!important';
  if(sa){sa.style.cssText='display:block!important';sa.removeAttribute('hidden');}
}
function switchTab(t){
  $('li-f').style.display=t==='li'?'block':'none';
  $('reg-f').style.display=t==='reg'?'block':'none';
  $('tab-li').className='atab'+(t==='li'?' on':'');
  $('tab-reg').className='atab'+(t==='reg'?' on':'');
  $('aerr').style.display='none';
}
function showAuthErr(m){const e=$('aerr');e.textContent=m;e.style.display='block';}
async function doLogin(){
  const u=$('li-u').value.trim(),p=$('li-p').value;
  if(!u||!p)return showAuthErr('Fill all fields');
  const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
  const d=await r.json();
  if(!r.ok){
    if(d.error==='banned')return showBanScreen(d.reason||'Contact admin',d.expiresAt?new Date(d.expiresAt*1000).toISOString():null);
    if(d.error==='ip_banned')return showBanScreen(d.reason||'Your IP is banned',d.expiresAt?new Date(d.expiresAt*1000).toISOString():null);
    return showAuthErr(d.error);
  }
  me=d;await initApp();
}

function showBanScreen(reason,expiresISO){
  document.body.innerHTML=`<div style="background:#07070e;color:#f0f0f8;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background-image:radial-gradient(ellipse at 50% 0%,rgba(240,71,71,.15),transparent 60%)">
  <div style="background:rgba(20,6,6,.97);border:1px solid rgba(240,71,71,.35);border-radius:20px;padding:44px 38px;max-width:500px;width:100%;text-align:center;box-shadow:0 0 100px rgba(240,71,71,.18),0 32px 80px rgba(0,0,0,.9)">
    <div style="font-size:80px;margin-bottom:18px;animation:pulse 2.5s infinite">🔨</div>
    <h1 style="font-size:32px;font-weight:900;color:#f04747;letter-spacing:-1px;margin-bottom:8px">You Are Banned</h1>
    <p style="font-size:14px;color:#6868a0;margin-bottom:30px">Your access to Molecord has been revoked.</p>
    <div style="background:rgba(240,71,71,.07);border:1px solid rgba(240,71,71,.2);border-radius:12px;padding:16px 20px;margin-bottom:12px;text-align:left">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#f04747;margin-bottom:6px">Reason</div>
      <div style="font-size:14px;color:#e0e0f0;line-height:1.6">${esc(reason)}</div>
    </div>
    <div style="background:rgba(240,71,71,.07);border:1px solid rgba(240,71,71,.2);border-radius:12px;padding:16px 20px;margin-bottom:24px;text-align:left">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#f04747;margin-bottom:6px">${expiresISO?'Time Remaining':'Duration'}</div>
      ${expiresISO
        ?`<div style="font-size:13px;color:#9898b8">Until: ${new Date(expiresISO).toLocaleString()}</div><div id="ban-timer" style="font-size:26px;font-weight:900;color:#f04747;letter-spacing:2px;margin-top:8px;font-variant-numeric:tabular-nums">Calculating…</div>`
        :'<div style="color:#faa61a;font-size:15px;font-weight:700">🔒 Permanent — No expiration</div>'
      }
    </div>
    <div style="font-size:11px;color:#3a3a60">Molecord · If this is an error, contact an administrator.</div>
  </div></div>
  <style>@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}</style>
  ${expiresISO?`<script>
  const _bexp=new Date('${expiresISO}').getTime();
  function _btick(){const now=Date.now(),diff=_bexp-now;const el=document.getElementById('ban-timer');if(!el)return;if(diff<=0){el.textContent='Ban may have expired — refresh';return;}
  const d=Math.floor(diff/86400000),h=Math.floor(diff%86400000/3600000),m=Math.floor(diff%3600000/60000),s=Math.floor(diff%60000/1000);
  el.textContent=(d?d+'d ':'')+String(h).padStart(2,'0')+'h '+String(m).padStart(2,'0')+'m '+String(s).padStart(2,'0')+'s';}
  _btick();setInterval(_btick,1000);<\/script>`:''}`;
}
async function doRegister(){
  const u=$('reg-u').value.trim(),dn=$('reg-dn').value.trim(),e=$('reg-e').value.trim(),p=$('reg-p').value;
  if(!u||!p)return showAuthErr('Username and password required');
  const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,displayName:dn,email:e,password:p,regKey})});
  const d=await r.json();if(!r.ok)return showAuthErr(d.error);
  me=d;await initApp();
}
async function doLogout(){await fetch('/api/auth/logout',{method:'POST'});if(ws)ws.close();location.reload();}

// ── INIT ────────────────────────────────────────────────────────────
async function initApp(){
  const[mr,ur,sr,fr,gr,wr]=await Promise.all([fetch('/api/auth/me'),fetch('/api/users'),fetch('/api/servers'),fetch('/api/friends'),fetch('/api/groups'),fetch('/api/wall')]);
  if(!mr.ok)return;
  const meD=await mr.json();me={...meD,...me};
  if(meD.settings)mySettings={...mySettings,...meD.settings};
  const ua=await ur.json();ua.forEach(u=>allUsers[u.id]=u);allUsers[me.id]=me;
  servers=await sr.json();friendships=await fr.json();
  groupChats=gr.ok?await gr.json():[];
  wallEntries=wr.ok?await wr.json():[];
  $('auth').style.display='none';$('app').style.display='block';
  applyTheme();updateUP();renderRail();
  if(servers.length)selectServer(servers[0].id);
  updateFrBadge();connectWS();
  loadNFonts();
  // Load active announcement (only shows if one was actually sent)
  fetch('/api/announce/active').then(r=>r.json()).then(ann=>{if(ann&&ann.text)showAnnouncement(ann);}).catch(()=>{});
}
// Auto-session
(async()=>{try{const r=await fetch('/api/auth/me');if(r.ok){const d=await r.json();if(d.id){me=d;$('step-key').style.display='none';$('step-auth').style.display='none';await initApp();}}else{const d=await r.json().catch(()=>({}));if(d.error==='ip_banned')showBanScreen(d.reason||'Your IP is banned',d.expiresAt?new Date(d.expiresAt*1000).toISOString():null);}}catch{}})();

function loadNFonts(){
  // Inject name fonts for all users
  const styles=[];
  Object.values(allUsers).forEach(u=>{if(u.nameFontUrl&&u.nameFontName){styles.push(`@font-face{font-family:'nf-${esc(u.id)}';src:url('${u.nameFontUrl}');}`);}});
  if(styles.length){const el=document.getElementById('name-fonts')||document.createElement('style');el.id='name-fonts';el.textContent=styles.join('');document.head.appendChild(el);}
}

// ── WS ──────────────────────────────────────────────────────────────
function connectWS(){
  const p=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(`${p}//${location.host}`);
  ws.onmessage=e=>{try{handleWS(JSON.parse(e.data));}catch(err){console.error(err);}};
  ws.onclose=()=>setTimeout(connectWS,3000);
}
function wsSend(d){if(ws&&ws.readyState===1)ws.send(JSON.stringify(d));}

function handleWS(d){
  switch(d.type){
    case 'MESSAGE_CREATE':
      if(!messages[d.message.channelId])messages[d.message.channelId]=[];
      messages[d.message.channelId].push(d.message);msgCache[d.message.id]=d.message;
      if(d.message.channelId===activeChId&&view==='server'){appendMsg(d.message);scrollBot();}
      else if(d.message.authorId!==me.id&&mySettings.notifications){const ch=findCh(d.message.channelId);if(ch)toast(`#${ch.name}`,`${d.message.authorName}: ${d.message.content.slice(0,50)}`);}
      break;
    case 'MESSAGE_UPDATE':
      {const a=messages[d.channelId];if(a){const i=a.findIndex(m=>m.id===d.messageId);if(i>-1){a[i].content=d.content;a[i].edited=true;}}}
      if(d.channelId===activeChId&&view==='server')renderMsgs();break;
    case 'MESSAGE_DELETE':
      if(messages[d.channelId])messages[d.channelId]=messages[d.channelId].filter(m=>m.id!==d.messageId);
      if(d.channelId===activeChId&&view==='server')renderMsgs();break;
    case 'MESSAGE_PIN':
      {const a=messages[d.channelId];if(a){const i=a.findIndex(m=>m.id===d.messageId);if(i>-1)a[i].pinned=d.pinned;}}
      if(d.channelId===activeChId&&view==='server')renderMsgs();break;
    case 'REACTION_UPDATE':
      Object.values(messages).forEach(a=>{const i=a.findIndex(m=>m.id===d.messageId);if(i>-1)a[i].reactions=d.reactions;});
      {const re=document.getElementById('rxn-'+d.messageId);if(re)re.innerHTML=buildRxns({id:d.messageId,reactions:d.reactions});}break;
    case 'DM_CREATE':
      {const k=d.fromUserId===me.id?d.toUserId:d.fromUserId;
      if(!dmMessages[k])dmMessages[k]=[];dmMessages[k].push(d.message);
      // Make sure the other user is in allUsers and friendships so they appear in sidebar
      if(d.message.authorId&&!allUsers[d.message.authorId]?.displayName){
        allUsers[d.message.authorId]={id:d.message.authorId,displayName:d.message.authorName||'?',avatar:d.message.authorAvatar,avatarEmoji:d.message.authorAvatarEmoji||'👤',status:'online'};
      }
      // Refresh sidebar if on DM/friends view so new person appears
      if(view==='dm'||view==='friends'||view==='group')renderSidebar();
      if(activeDMId===k&&view==='dm'){appendDMMsg(d.message);scrollBot();}
      else if(d.fromUserId!==me.id){const u=allUsers[d.fromUserId];toast(`DM: ${u?.displayName||'?'}`,d.message.content.slice(0,50));}}break;
    case 'USER_STATUS':
      if(allUsers[d.userId])allUsers[d.userId].status=d.status;
      if(d.userId===me.id){me.status=d.status;updateUP();}
      renderMP();if(view==='friends')renderFriendsList();break;
    case 'USER_UPDATE':
      allUsers[d.user.id]={...allUsers[d.user.id],...d.user};
      if(d.user.id===me.id){me={...me,...d.user};renderSContent&&renderSContent();}
      updateUP();renderMP();loadNFonts();
      // Re-render messages so avatar/name changes show live
      if(view==='server'&&activeChId)renderMsgs();
      if(view==='dm'&&activeDMId)renderDMPage&&renderDMPage();
      renderSidebar();break;
    case 'USER_JOIN':allUsers[d.user.id]=d.user;break;
    case 'TYPING':
      if(d.channelId===activeChId&&d.userId!==me.id){if(!typingUsers[d.channelId])typingUsers[d.channelId]=new Set();typingUsers[d.channelId].add(d.displayName);clearTimeout(typingTimers[d.userId]);typingTimers[d.userId]=setTimeout(()=>{typingUsers[d.channelId]?.delete(d.displayName);renderTyping();},3000);renderTyping();}break;
    case 'SOUNDBOARD_PLAY':
      if(voiceChId){const a=new Audio(d.url);a.volume=0.7;a.play().catch(()=>{});toast('🔔 Soundboard',`${getUser(d.userId).displayName} played: ${d.name}`);}break;
    case 'CHANNEL_CREATE':{const s=findSrv(d.serverId);if(s){s.channels.push(d.channel);if(d.serverId===activeSrvId)renderSidebar();}}break;
    case 'CHANNEL_DELETE':
      servers.forEach(s=>s.channels=s.channels.filter(c=>c.id!==d.channelId));
      if(activeChId===d.channelId){activeChId=null;showWelcomeMain();}if(activeSrvId)renderSidebar();break;
    case 'SERVER_CREATED':case 'SERVER_JOINED':
      if(!servers.find(s=>s.id===d.server.id)){servers.push(d.server);renderRail();}break;
    case 'SERVER_UPDATE':
      {const i=servers.findIndex(s=>s.id===d.server.id);if(i>-1)servers[i]={...servers[i],...d.server};}
      renderRail();if(d.server.id===activeSrvId)renderSidebar();break;
    case 'SERVER_DELETED':
      servers=servers.filter(s=>s.id!==d.serverId);
      renderRail();
      if(activeSrvId===d.serverId){activeSrvId=null;if(servers.length)selectServer(servers[0].id);else showWelcomeMain();}
      break;
    case 'SERVER_KICKED':
      servers=servers.filter(s=>s.id!==d.serverId);
      renderRail();
      if(activeSrvId===d.serverId){activeSrvId=null;if(servers.length)selectServer(servers[0].id);else showWelcomeMain();}
      toast('Kicked',`You were kicked from ${esc(d.serverName||'a server')}`, 'err');
      break;
    case 'SERVER_BANNED':
      servers=servers.filter(s=>s.id!==d.serverId);
      renderRail();
      if(activeSrvId===d.serverId){activeSrvId=null;if(servers.length)selectServer(servers[0].id);else showWelcomeMain();}
      toast('Banned',`Banned from ${esc(d.serverName||'a server')}: ${esc(d.reason||'')}`, 'err');
      break;
    case 'WALL_ADD':
      wallEntries.unshift(d.entry);if(view==='wall')renderWall();break;
    case 'WALL_REMOVE':
      wallEntries=wallEntries.filter(e=>e.id!==d.id);if(view==='wall')renderWall();break;
    case 'PREMADE_ICON_ADD':
      premadeIcons.unshift(d.icon);renderPremadeIcons();break;
    case 'PREMADE_ICON_REMOVE':
      premadeIcons=premadeIcons.filter(i=>i.id!==d.iconId);renderPremadeIcons();break;
    case 'ROLE_CREATE':case 'ROLE_UPDATE':case 'ROLE_DELETE':case 'MEMBER_ROLE_UPDATE':
      // Refresh server data on role changes
      {const srv=findSrv(d.serverId||d.role?.serverId);if(srv)fetch(`/api/servers/${srv.id}`,{headers:{'Content-Type':'application/json'}}).then(r=>r.json()).then(s=>{const i=servers.findIndex(x=>x.id===s.id);if(i>-1)servers[i]=s;if(s.id===activeSrvId)renderSidebar();}).catch(()=>{});}break;
    case 'MEMBER_JOIN':{const s=findSrv(d.serverId);if(s&&!s.members.find(m=>m.id===d.userId)){const u=allUsers[d.userId];if(u)s.members.push({...u,role:'member'});}}break;
    case 'MEMBER_LEAVE':{const s=findSrv(d.serverId);if(s)s.members=s.members.filter(m=>m.id!==d.userId);}break;
    case 'FRIEND_REQUEST':
      friendships.unshift(d.friendship);updateFrBadge();
      if(view==='friends'){friendTab='requests';renderFriendsPage();}break;
    case 'FRIEND_ACCEPTED':
      // Requester: our request was accepted — add friend to list
      {
        const i=friendships.findIndex(f=>f.friendshipId===d.friendshipId);
        if(i>-1){ friendships[i].status='accepted'; if(d.user) friendships[i].user={...friendships[i].user,...d.user}; }
        else if(d.friendship){ friendships.unshift(d.friendship); }
        if(d.user) allUsers[d.user.id]={...allUsers[d.user.id],...d.user};
        updateFrBadge(); renderRail(); renderSidebar();
        toast('👥 Friend Added',`You are now friends with ${esc(d.user?.displayName||'?')}`,'ok');
      }
      break;
    case 'FRIEND_ACCEPTED_SELF':
      // Acceptor: confirm our accept — update sidebar
      {
        const i=friendships.findIndex(f=>f.friendshipId===d.friendshipId);
        if(i>-1){ friendships[i].status='accepted'; if(d.user) friendships[i].user={...friendships[i].user,...d.user}; }
        else if(d.friendship){ friendships.unshift(d.friendship); }
        if(d.user) allUsers[d.user.id]={...allUsers[d.user.id],...d.user};
        updateFrBadge(); renderRail(); renderSidebar();
      }
      break;
    case 'GROUP_CREATED':
      if(!groupChats.find(g=>g.id===d.group.id)){groupChats.unshift(d.group);}
      if(view==='friends'||view==='dm')renderSidebar();
      toast('💬 New Group',d.group.name,'ok');
      break;
    case 'GROUP_MESSAGE':
      if(!groupMessages[d.message.groupId])groupMessages[d.message.groupId]=[];
      groupMessages[d.message.groupId].push(d.message);
      if(activeGroupId===d.message.groupId&&view==='group'){appendGroupMsg(d.message);scrollBot();}
      else if(d.message.authorId!==me.id&&mySettings.notifications)toast('💬 '+getGroupName(d.message.groupId),d.message.authorName+': '+d.message.content.slice(0,50));
      break;
    case 'GROUP_MEMBER_ADD':
      {const g=groupChats.find(x=>x.id===d.groupId);if(g&&d.user&&!g.members.find(m=>m.id===d.user.id))g.members.push(d.user);}
      if(view==='group'&&activeGroupId===d.groupId)openGroup(d.groupId);
      break;
    case 'GROUP_MEMBER_LEAVE':
      {const g=groupChats.find(x=>x.id===d.groupId);if(g)g.members=g.members.filter(m=>m.id!==d.userId);}
      if(view==='group'&&activeGroupId===d.groupId)openGroup(d.groupId);
      break;
    case 'ANNOUNCEMENT':
      showAnnouncement(d.announcement);break;
    case 'ANNOUNCEMENT_CLEAR':
      {const b=$('ann-bar');if(b)b.style.display='none';}break;
    case 'ACTIVITY_LOG':
      ownerConsoleAppend(d.entry);break;
    case 'VPN_ALERT':
      ownerHandleVPNAlert(d);break;
    case 'SHIELD_ALERT':
      ownerHandleShieldAlert(d.alert);break;
    case 'VOICE_JOIN':if(d.userId!==me.id)toast('🔊',`${getUser(d.userId).displayName} joined voice`);break;
    case 'VOICE_LEAVE':closePeer(d.userId);break;
    case 'VOICE_ROOM_UPDATE':
      voiceRooms[d.channelId]=d.participants;
      renderRail();
      renderVCBar();
      renderSidebar(); // always — so VC members show even on other servers
      if(voiceChId===d.channelId)renderVCOv();
      break;
    case 'VOICE_STATE_UPDATE':{const pts=voiceRooms[d.channelId];if(pts){const p=pts.find(p=>p.userId===d.userId);if(p)Object.assign(p,d);}}renderVCOv();break;
    case 'RTC_SEND_OFFER':createOffer(d.targetUserId);break;
    case 'RTC_OFFER':handleOffer(d.fromUserId,d.sdp);break;
    case 'RTC_ANSWER':handleAnswer(d.fromUserId,d.sdp);break;
    case 'RTC_ICE':handleIce(d.fromUserId,d.candidate);break;
    case 'BANNED':
      showBanScreen(d.reason||'You have been banned',d.expiresAt?new Date(d.expiresAt*1000).toISOString():null);
      setTimeout(()=>{if(ws)ws.close();},1500);break;
  }
}

// ── MESSAGE RENDER ───────────────────────────────────────────────────
function renderMsgs(){
  const inner=$('msgs-inner');if(!inner)return;
  const msgs=messages[activeChId]||[];
  if(!msgs.length){const ch=findCh(activeChId);inner.innerHTML=`<div style="padding:40px;text-align:center;color:var(--t2)"><div style="font-size:48px;margin-bottom:10px">💬</div><div style="font-size:14px;font-weight:700;color:var(--t1)">#${esc(ch?.name||'')}</div><div style="font-size:12px;margin-top:4px">Be the first to say something!</div></div>`;return;}
  inner.innerHTML='';let la=null,lt=0,ld='';
  for(const m of msgs){
    const day=new Date(m.timestamp).toDateString();
    if(day!==ld){const s=document.createElement('div');s.className='daysep';s.textContent=fmtD(m.timestamp);inner.appendChild(s);ld=day;}
    const g=la===m.authorId&&(m.timestamp-lt)<300000&&!m.replyTo;
    inner.appendChild(buildMsgEl(m,!g));la=m.authorId;lt=m.timestamp;
  }
}
function buildNameEl(msg){
  // Name font effect
  if(msg.authorNameFontUrl){
    const fontFace=`@font-face{font-family:'nf-${msg.authorId}';src:url('${msg.authorNameFontUrl}');}`;
    if(!document.getElementById('nf-'+msg.authorId)){const s=document.createElement('style');s.id='nf-'+msg.authorId;s.textContent=fontFace;document.head.appendChild(s);}
    return`<span class="mgan" style="font-family:'nf-${msg.authorId}',sans-serif" onclick="openProfile(event,'${msg.authorId}')">${esc(msg.authorName||'?')}</span>`;
  }
  return`<span class="mgan" onclick="openProfile(event,'${msg.authorId}')">${esc(msg.authorName||'?')}</span>`;
}
function buildMsgEl(msg,showH){
  const u=getUser(msg.authorId);const wrap=document.createElement('div');wrap.className='mi';
  const d=document.createElement('div');d.className='mg';d.id='mg-'+msg.id;
  const avH=msg.authorAvatar?`<div class="mg-av" onclick="openProfile(event,'${msg.authorId}')"><img src="${esc(msg.authorAvatar)}" alt=""/></div>`:`<div class="mg-av" onclick="openProfile(event,'${msg.authorId}')">${esc(msg.authorAvatarEmoji||'👤')}</div>`;
  const attH=buildAtt(msg);const rxH=buildRxns(msg);const acH=buildActs(msg);const repH=msg.replyTo?buildRepRef(msg.replyTo):'';
  const mdContent=renderMD(msg.content);
  if(showH){
    d.innerHTML=`${avH}<div class="mgbody">${repH}<div class="mghdr">${buildNameEl(msg)}${u.isAdmin?'<span class="mgadm">ADMIN</span>':''}<span class="mgts">${fmtT(msg.timestamp)}</span></div><div class="mgtxt${msg.edited?' ed':''}" id="mt-${msg.id}">${mdContent}</div>${attH}<div class="rxns" id="rxn-${msg.id}">${rxH}</div></div>${acH}`;
  } else {
    d.innerHTML=`<div style="width:34px;flex-shrink:0"></div><div class="mgbody">${repH}<div class="mgtxt${msg.edited?' ed':''}" id="mt-${msg.id}">${mdContent}</div>${attH}<div class="rxns" id="rxn-${msg.id}">${rxH}</div></div>${acH}`;
  }
  wrap.appendChild(d);return wrap;
}
function buildAtt(msg){
  if(!msg.attachmentUrl)return'';const t=msg.attachmentType||'';
  if(t.startsWith('image/')||/\.(png|jpg|jpeg|gif|webp)$/i.test(msg.attachmentUrl))return`<div class="mgatt"><img src="${esc(msg.attachmentUrl)}" onclick="window.open('${esc(msg.attachmentUrl)}','_blank')" alt=""/></div>`;
  if(t.startsWith('video/'))return`<div class="mgatt"><video controls src="${esc(msg.attachmentUrl)}" style="max-width:360px;border-radius:9px"></video></div>`;
  if(t.startsWith('audio/'))return`<div class="mgatt"><audio controls src="${esc(msg.attachmentUrl)}" style="margin-top:4px"></audio></div>`;
  return`<div class="mgatt"><div class="file-att"><span style="font-size:22px">📄</span><div><div class="fn">${esc(msg.attachmentName||'File')}</div><div class="fs">${esc(fmtSize(msg.attachmentSize))}</div></div><a href="${esc(msg.attachmentUrl)}" download style="color:var(--acc);font-size:12px;margin-left:auto;text-decoration:none">↓ Download</a></div></div>`;
}
function buildRepRef(rid){const r=msgCache[rid];if(!r)return'';const u=getUser(r.authorId);return`<div class="rref">↩ <strong style="color:var(--acc)">${esc(u.displayName||'?')}</strong> ${esc(r.content.slice(0,60))}</div>`;}
function buildRxns(msg){return Object.entries(msg.reactions||{}).filter(([,u])=>u.length>0).map(([e,u])=>`<button class="rxn${u.includes(me?.id)?' mine':''}" onclick="doReact('${msg.id}','${e}')">${e}<span class="rxn-n">${u.length}</span></button>`).join('');}
function buildActs(msg){const mine=msg.authorId===me?.id;return`<div class="macts">${EMOJIS.slice(0,5).map(e=>`<button onclick="doReact('${msg.id}','${e}')">${e}</button>`).join('')}<button onclick="setReply('${msg.id}')">↩</button>${mine?`<button onclick="startEdit('${msg.id}')">✏️</button>`:''}<button onclick="doPin('${msg.id}')" style="${msg.pinned?'color:var(--yellow)':''}">📌</button>${mine||me?.isAdmin?`<button class="d" onclick="doDelete('${msg.id}')">🗑</button>`:''}</div>`;}
function appendMsg(msg){const inner=$('msgs-inner');if(!inner)return;const msgs=messages[activeChId]||[];const prev=msgs[msgs.length-2];const g=prev&&prev.authorId===msg.authorId&&(msg.timestamp-prev.timestamp)<300000&&!msg.replyTo;inner.appendChild(buildMsgEl(msg,!g));}
function scrollBot(){const m=$('msgs');if(m)setTimeout(()=>m.scrollTop=m.scrollHeight,50);}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

}
async function sendDM(){
  const ta=$('dm-ta');if(!ta)return;

  const fd=new FormData();if(c)fd.append('content',c);if(attachFile)fd.append('attachment',attachFile);

function onAtt(inp){const f=inp.files[0];if(!f)return;attachFile=f;const s=$('att-prev');if(!s)return;const isImg=f.type.startsWith('image/');s.innerHTML=`<div class="attprev">${isImg?`<img src="${URL.createObjectURL(f)}" alt=""/>`:''}<span class="an">${esc(f.name)}</span><span style="color:var(--t2);font-size:10px">${fmtSize(f.size)}</span><button onclick="clearAtt()" style="margin-left:auto;color:var(--t2)">✕</button></div>`;}
function clearAtt(){attachFile=null;const s=$('att-prev');if(s)s.innerHTML='';const i=$('att-inp');if(i)i.value='';}
function startEdit(id){const msg=messages[activeChId]?.find(m=>m.id===id);if(!msg)return;const el=document.getElementById('mt-'+id);if(!el)return;el.innerHTML=`<input style="width:100%;background:var(--bg4);border:1px solid var(--acc);border-radius:7px;padding:6px 10px;color:var(--t0);font-size:14px;font-family:inherit;outline:none" value="${esc(msg.content)}" onkeydown="onEditKD(event,'${id}')"/><div style="font-size:10px;color:var(--t2);margin-top:2px">Enter to save · Esc to cancel</div>`;el.querySelector('input').focus();}

// ── VOICE / WEBRTC ────────────────────────────────────────────────────
async function joinVoice(chId,srvId){
  if(voiceChId===chId){openVCOv();return;}
  if(voiceChId)await leaveVoice(true);
  try{localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});}
  catch(e){toast('Mic Error','Allow mic permission','err');return;}
  voiceChId=chId;voiceSrvId=srvId;muted=false;deafened=false;
  wsSend({type:'VOICE_JOIN',channelId:chId,serverId:srvId,quality:vcQuality});
  updateUP();renderVCBar();renderSidebar();openVCOv();toast('🔊','Joined voice','ok');
}
async function leaveVoice(silent=false){
  if(!voiceChId)return;
  wsSend({type:'VOICE_LEAVE',channelId:voiceChId,serverId:voiceSrvId});
  Object.keys(peerConns).forEach(closePeer);
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  if(screenStream){screenStream.getTracks().forEach(t=>t.stop());screenStream=null;}
  voiceChId=null;voiceSrvId=null;ssOn=false;camOn=false;
  $('vcov').classList.add('hidden');renderVCBar();renderSidebar();
  if(!silent)toast('📵','Left voice');
}
function openVCOv(){const ch=findCh(voiceChId);$('vcovch').textContent=ch?.name||'Voice';$('vcov').classList.remove('hidden');renderVCOv();updateVCCtrls();}
function closeVCOv(){$('vcov').classList.add('hidden');}
function changeQuality(q){vcQuality=q;if(voiceChId)wsSend({type:'VOICE_STATE',channelId:voiceChId,serverId:voiceSrvId,muted,deafened,screensharing:ssOn,video:camOn,quality:q});}
function renderVCOv(){
  if(!voiceChId)return;const grid=$('vcgrid');if(!grid)return;
  const pts=voiceRooms[voiceChId]||[];
  const me_tile={userId:me.id,displayName:me.displayName,avatar:me.avatar,avatarEmoji:me.avatarEmoji,muted,deafened,screensharing:ssOn,video:camOn,isMe:true};
  const tiles=[me_tile,...pts.filter(p=>p.userId!==me.id)];
  grid.innerHTML='';
  for(const p of tiles){
    const tile=document.createElement('div');tile.className='vctile';tile.id='vct-'+p.userId;
    const avH=p.avatar?`<img src="${esc(p.avatar)}" style="width:64px;height:64px;border-radius:50%;object-fit:cover" alt=""/>`:
      `<div class="vcbigav">${esc(p.avatarEmoji||'👤')}</div>`;
    tile.innerHTML=`${avH}<div class="vctname">${esc(p.displayName)}${p.isMe?' (you)':''}</div><div class="vctile-info">${renderAv({avatar:p.avatar,avatarEmoji:p.avatarEmoji},'s20')}<span style="font-size:12px;font-weight:600">${esc(p.displayName)}${p.isMe?' (you)':''}</span></div><div class="vctile-ic">${p.muted?'<span>🔇</span>':''}${p.screensharing?'<span>🖥️</span>':''}${p.video?'<span>📷</span>':''}</div>`;
    if(!p.isMe){
      const pc=peerConns[p.userId];
      if(pc){
        const receivers=pc.getReceivers();const audioTracks=[],videoTracks=[];
        receivers.forEach(r=>{if(r.track?.kind==='audio')audioTracks.push(r.track);if(r.track?.kind==='video')videoTracks.push(r.track);});
        if(audioTracks.length){const a=document.createElement('audio');a.autoplay=true;a.muted=deafened;a.srcObject=new MediaStream(audioTracks);a.style.display='none';tile.appendChild(a);}
        if(videoTracks.length){const v=document.createElement('video');v.autoplay=true;v.playsInline=true;v.srcObject=new MediaStream(videoTracks);Object.assign(v.style,{position:'absolute',inset:'0',width:'100%',height:'100%',objectFit:'cover'});tile.appendChild(v);}
      }
    } else {
      const src=ssOn&&screenStream?screenStream:(camOn&&localStream?new MediaStream(localStream.getVideoTracks()):null);
      if(src&&src.getVideoTracks().length>0){const v=document.createElement('video');v.autoplay=true;v.playsInline=true;v.muted=true;v.srcObject=src;Object.assign(v.style,{position:'absolute',inset:'0',width:'100%',height:'100%',objectFit:'cover'});tile.appendChild(v);}
    }
    grid.appendChild(tile);
  }
}
function updateVCCtrls(){
  const m=$('vc-mic'),d=$('vc-deaf'),c=$('vc-cam'),s=$('vc-ss');
  if(m){m.className='vcct'+(muted?' muted':'');m.textContent=muted?'🔇':'🎤';}
  if(d){d.className='vcct'+(deafened?' muted':'');d.textContent=deafened?'🔕':'🎧';}
  if(c)c.className='vcct'+(camOn?' aon':'');if(s)s.className='vcct'+(ssOn?' aon':'');

function toggleMute(){muted=!muted;if(localStream)localStream.getAudioTracks().forEach(t=>t.enabled=!muted);if(voiceChId)wsSend({type:'VOICE_STATE',channelId:voiceChId,serverId:voiceSrvId,muted,deafened,screensharing:ssOn,video:camOn,quality:vcQuality});updateUP();updateVCCtrls();renderVCBar();}

async function toggleCamera(){
  if(camOn){localStream?.getVideoTracks().forEach(t=>{t.stop();localStream?.removeTrack(t);});camOn=false;}
  else{try{const cs=await navigator.mediaDevices.getUserMedia({video:true,audio:false});cs.getVideoTracks().forEach(t=>localStream?.addTrack(t));camOn=true;for(const uid of Object.keys(peerConns)){const pc=peerConns[uid];cs.getVideoTracks().forEach(t=>pc.addTrack(t,localStream));const o=await pc.createOffer();await pc.setLocalDescription(o);wsSend({type:'RTC_OFFER',targetUserId:uid,sdp:o});}}catch(e){toast('Camera Error','Could not access camera','err');return;}}

async function toggleScreenshare(){

  else{try{screenStream=await navigator.mediaDevices.getDisplayMedia({video:{frameRate:{ideal:60}},audio:true});ssOn=true;screenStream.getVideoTracks()[0].onended=()=>{ssOn=false;screenStream=null;if(voiceChId)wsSend({type:'VOICE_STATE',channelId:voiceChId,serverId:voiceSrvId,muted,deafened,screensharing:false,video:camOn});updateVCCtrls();renderVCOv();};for(const uid of Object.keys(peerConns)){const pc=peerConns[uid];screenStream.getTracks().forEach(t=>pc.addTrack(t,screenStream));const o=await pc.createOffer();await pc.setLocalDescription(o);wsSend({type:'RTC_OFFER',targetUserId:uid,sdp:o});}}catch(e){if(e.name!=='NotAllowedError')toast('Screen Error','Could not share','err');return;}}
  if(voiceChId)wsSend({type:'VOICE_STATE',channelId:voiceChId,serverId:voiceSrvId,muted,deafened,screensharing:ssOn,video:camOn,quality:vcQuality});updateVCCtrls();renderVCOv();
}

// WebRTC
function createPeer(uid){if(peerConns[uid])return peerConns[uid];const pc=new RTCPeerConnection({iceServers:ICE});peerConns[uid]=pc;if(localStream)localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));if(screenStream)screenStream.getTracks().forEach(t=>pc.addTrack(t,screenStream));pc.onicecandidate=e=>{if(e.candidate)wsSend({type:'RTC_ICE',targetUserId:uid,candidate:e.candidate});};pc.ontrack=()=>renderVCOv();pc.onconnectionstatechange=()=>{if(['failed','closed'].includes(pc.connectionState))closePeer(uid);};return pc;}
async function createOffer(uid){const pc=createPeer(uid);const o=await pc.createOffer();await pc.setLocalDescription(o);wsSend({type:'RTC_OFFER',targetUserId:uid,sdp:o});}
async function handleOffer(uid,sdp){const pc=createPeer(uid);await pc.setRemoteDescription(new RTCSessionDescription(sdp));const a=await pc.createAnswer();await pc.setLocalDescription(a);wsSend({type:'RTC_ANSWER',targetUserId:uid,sdp:a});}
async function handleAnswer(uid,sdp){const pc=peerConns[uid];if(pc&&pc.signalingState!=='stable')await pc.setRemoteDescription(new RTCSessionDescription(sdp));}
async function handleIce(uid,c){const pc=peerConns[uid];if(pc&&c)try{await pc.addIceCandidate(new RTCIceCandidate(c));}catch{}}
function closePeer(uid){const pc=peerConns[uid];if(pc)pc.close();delete peerConns[uid];renderVCOv();}

// ── ADMIN ─────────────────────────────────────────────────────────────
async function banUser(){
  const un=$('ban-un')?.value.trim(),hrs=parseFloat($('ban-hrs')?.value)||null,reason=$('ban-reason')?.value.trim();
  if(!un)return toast('Error','Enter a username','err');
  const r=await fetch('/api/admin/ban',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:un,reason,durationHours:hrs})});
  const d=await r.json();
  if(r.ok){
    let msg=hrs?`for ${hrs}h`:'permanently';
    if(d.ipBanned)msg+=` · IP ${d.ip} also banned`;
    else msg+=` · No IP recorded yet`;
    toast('🔨 Banned',`${un} — ${msg}`,'ok');
    loadBans();
  } else toast('Error',d.error,'err');
}
async function unbanUser(){
  const un=$('unban-un')?.value.trim();if(!un)return;
  const r=await fetch('/api/admin/unban',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:un})});
  const d=await r.json();
  if(r.ok)toast('✅ Unbanned',`${un} — account + IP ban lifted`,'ok');
  else toast('Error',d.error,'err');
}
async function banIP(){
  const ip=$('ipban-ip')?.value.trim(),hrs=parseFloat($('ipban-hrs')?.value)||null,reason=$('ipban-reason')?.value.trim();
  if(!ip)return toast('Error','Enter an IP','err');
  const r=await fetch('/api/admin/ip-ban',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ip,reason,durationHours:hrs})});
  const d=await r.json();
  if(r.ok)toast('🚫 IP Banned',ip,'ok');else toast('Error',d.error,'err');
}
async function unbanIP(){
  const ip=$('ipunban-ip')?.value.trim();if(!ip)return toast('Error','Enter an IP','err');
  const r=await fetch('/api/admin/ip-unban',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ip})});

// ── ANNOUNCEMENTS ─────────────────────────────────────────────────
let _annTimer=null;
function showAnnouncement(ann){
  const bar=$('ann-bar');if(!bar)return;
  if(!ann||!ann.text||!ann.text.trim()){bar.style.display='none';return;}
  bar.style.display='flex';
  const t=$('ann-bar-text');if(t)t.textContent=ann.text||'';
  if(_annTimer)clearInterval(_annTimer);
  if(ann.expires_at){
    const updateTimer=()=>{
      const rem=ann.expires_at-Math.floor(Date.now()/1000);
      const el=$('ann-bar-timer');
      if(rem<=0){bar.style.display='none';clearInterval(_annTimer);return;}
      if(el)el.textContent=`(${rem>3600?Math.floor(rem/3600)+'h ':Math.floor(rem/60)+'m'})`;
    };
    updateTimer();_annTimer=setInterval(updateTimer,10000);
  } else {const el=$('ann-bar-timer');if(el)el.textContent='';}
}
