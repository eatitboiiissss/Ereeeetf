<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Molecord</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔵</text></svg>"/>
<style id="font-style"></style>
<style id="theme-style"></style>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --acc:#5b8df8;--acc2:#4a7af0;--acc-g:rgba(91,141,248,.15);
  --green:#23d18b;--red:#f04747;--yellow:#faa61a;--purple:#a855f7;--orange:#ff6b35;
  --bg0:#07070e;--bg1:#0e0e1a;--bg2:#141422;--bg3:#1a1a2e;--bg4:#22223f;--bg5:#2a2a4a;
  --t0:#f0f0f8;--t1:#9898b8;--t2:#4a4a6e;
  --bdr:rgba(255,255,255,.05);--bdr2:rgba(255,255,255,.1);
  --sh:0 8px 32px rgba(0,0,0,.7);--r:10px;
  --font:'DM Sans',sans-serif;
}
body.light-mode{
  --bg0:#f0f2f5;--bg1:#e4e8f0;--bg2:#ffffff;--bg3:#f2f4f8;--bg4:#e8edf5;--bg5:#dce3ef;
  --t0:#1a1a2e;--t1:#4a4a6e;--t2:#8888a8;
  --bdr:rgba(0,0,0,.08);--bdr2:rgba(0,0,0,.12);
}
body{font-family:var(--font);background:var(--bg0);color:var(--t0);overflow:hidden;height:100vh;user-select:none;transition:background .3s,color .3s}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(91,141,248,.3);border-radius:2px}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit;transition:all .15s}
input,textarea,select{font-family:inherit;outline:none;border:none}
.hidden{display:none!important}

/* BG */
#bg-theme{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;pointer-events:none;opacity:0;transition:opacity .5s}
#bg-theme.on{opacity:1}
#bg-dim{position:fixed;inset:0;z-index:1;pointer-events:none}

/* AUTH */
#auth{position:relative;z-index:10;display:flex;align-items:center;justify-content:center;height:100vh;background:radial-gradient(ellipse at 30% 50%,rgba(91,141,248,.1),transparent 60%),radial-gradient(ellipse at 70% 20%,rgba(168,85,247,.08),transparent 50%)}
.abox{background:rgba(14,14,26,.97);backdrop-filter:blur(20px);border:1px solid var(--bdr2);border-radius:20px;padding:36px 40px;width:420px;box-shadow:0 32px 80px rgba(0,0,0,.9)}
.alogo{text-align:center;font-size:32px;font-weight:900;letter-spacing:-1.5px;margin-bottom:4px;font-family:system-ui,sans-serif}
.alogo em{color:var(--acc);font-style:normal}
.atag{text-align:center;font-size:13px;color:var(--t2);margin-bottom:20px}
.atabs{display:flex;gap:4px;background:rgba(255,255,255,.05);border-radius:10px;padding:4px;margin-bottom:20px}
.atab{flex:1;padding:8px;border-radius:7px;font-size:13px;font-weight:600;color:var(--t2)}
.atab.on{background:var(--acc);color:#fff}
.fld{margin-bottom:13px}
.fld label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t2);margin-bottom:6px}
.fld input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:9px;padding:11px 14px;color:var(--t0);font-size:14px;transition:border-color .2s}
.fld input:focus{border-color:var(--acc)}
.btn-p{width:100%;padding:12px;border-radius:9px;font-size:14px;font-weight:700;background:var(--acc);color:#fff;cursor:pointer;margin-top:6px;font-family:inherit;border:none}
.btn-p:hover{background:var(--acc2);transform:translateY(-1px);box-shadow:0 4px 20px rgba(91,141,248,.4)}
.aerr{background:rgba(240,71,71,.1);border:1px solid rgba(240,71,71,.3);border-radius:8px;padding:9px 13px;font-size:13px;color:var(--red);margin-bottom:12px;display:none}
.key-step{text-align:center;padding:8px 0}
.key-badge{display:inline-block;background:rgba(91,141,248,.1);border:1px solid rgba(91,141,248,.3);border-radius:10px;padding:8px 16px;font-size:13px;color:var(--acc);margin-bottom:16px}

/* LAYOUT */
#app{display:none;position:relative;z-index:2;height:100vh}
.layout{display:flex;height:100vh;overflow:hidden}

/* RAIL */
.rail{width:70px;background:rgba(7,7,14,.8);backdrop-filter:blur(10px);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:3px;overflow-y:auto;flex-shrink:0;border-right:1px solid var(--bdr)}
.rb{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;cursor:pointer;transition:all .25s;position:relative;flex-shrink:0;background:var(--bg3);border:2px solid transparent;overflow:hidden}
.rb:hover,.rb.on{border-radius:14px;background:var(--acc);border-color:transparent}
.rb img{width:100%;height:100%;object-fit:cover;border-radius:inherit}
.rb.on::before{content:'';position:absolute;left:-14px;width:4px;height:32px;background:#fff;border-radius:0 4px 4px 0}
.rsep{width:32px;height:1px;background:var(--bdr2);margin:3px 0;flex-shrink:0}
.badge{position:absolute;top:-3px;right:-3px;background:var(--red);color:#fff;border-radius:50%;width:17px;height:17px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg0)}

/* SIDEBAR */
.sb{width:236px;background:rgba(14,14,26,.95);backdrop-filter:blur(10px);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid var(--bdr);overflow:hidden}
.srv-ban{width:100%;height:72px;object-fit:cover;flex-shrink:0;display:none}
.srv-ban.show{display:block}
.sbhd{height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.sbt{font-size:14px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.sbt:hover{color:var(--acc)}
.sbbody{flex:1;overflow-y:auto;padding:6px 0}
.cat{display:flex;align-items:center;justify-content:space-between;padding:14px 8px 4px 12px;cursor:pointer}
.catlbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t2)}
.ci-row{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:8px;cursor:pointer;transition:background .12s;margin:1px 6px;position:relative}
.ci-row:hover{background:rgba(255,255,255,.05)}
.ci-row.on{background:rgba(91,141,248,.15)}
.ci-row .ci{font-size:13px;color:var(--t2);width:16px;text-align:center;flex-shrink:0;font-weight:800}
.ci-row.on .ci{color:var(--acc)}
.ci-row .cn{font-size:13px;font-weight:500;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ci-row:hover .cn,.ci-row.on .cn{color:var(--t0)}
.ci-row:hover .chopts{opacity:1}
.chopts{opacity:0;display:flex;gap:1px;margin-left:auto}
.chopts button{color:var(--t2);padding:2px 4px;border-radius:4px;font-size:11px}
.chopts button:hover{color:var(--t0);background:var(--bg4)}
.vcsubs{margin:2px 6px 4px 28px}
.vcsub{display:flex;align-items:center;gap:6px;padding:2px 6px;border-radius:6px;font-size:12px;color:var(--t1)}
.vcsubav{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:13px}
.vcsubav img{width:100%;height:100%;object-fit:cover}

/* USER PANEL */
.up{display:flex;align-items:center;gap:8px;padding:8px;border-top:1px solid var(--bdr);flex-shrink:0;background:rgba(10,10,18,.9)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg3);overflow:hidden;flex-shrink:0;position:relative}
.av img{width:100%;height:100%;object-fit:cover;border-radius:inherit}
.av.s24{width:24px;height:24px;font-size:14px}
.av.s28{width:28px;height:28px;font-size:16px}
.av.s32{width:32px;height:32px;font-size:18px}
.av.s40{width:40px;height:40px;font-size:22px}
.av.s48{width:48px;height:48px;font-size:26px}
.av.s80{width:80px;height:80px;font-size:44px}
.sdot{position:absolute;bottom:-1px;right:-1px;width:11px;height:11px;border-radius:50%;border:2px solid var(--bg1)}
.upi{flex:1;min-width:0}
.upn{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ups{font-size:11px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.upacts{display:flex;gap:1px}
.upacts button{color:var(--t2);padding:5px;border-radius:7px;font-size:14px}
.upacts button:hover{background:var(--bg3);color:var(--t0)}
.upacts button.muted{color:var(--red)}
.upacts button.on{color:var(--acc)}

/* VC BAR */
.vcbar{background:rgba(35,209,139,.06);border-top:1px solid rgba(35,209,139,.15);padding:8px 10px;flex-shrink:0}
.vcbar-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.vcdot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.vcts{display:flex;gap:2px}
.vcts button{color:var(--t2);padding:4px 5px;border-radius:6px;font-size:13px}
.vcts button:hover{background:var(--bg3);color:var(--t0)}
.vcts button.muted{color:var(--red)}
.vcts button.aon{color:var(--acc)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg2);position:relative}
.chhdr{height:48px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;background:rgba(20,20,34,.9);backdrop-filter:blur(8px);z-index:10;position:relative}
.chhdr .ci{font-size:17px;color:var(--t2);font-weight:800}
.chhdr h3{font-size:15px;font-weight:800}
.chtopic{font-size:12px;color:var(--t2);padding-left:10px;border-left:1px solid var(--bdr2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:260px}
.chhdra{margin-left:auto;display:flex;gap:2px}
.chhdra button{color:var(--t2);padding:5px 7px;border-radius:7px;font-size:14px}
.chhdra button:hover{background:rgba(255,255,255,.07);color:var(--t0)}
.chhdra button.on{color:var(--acc)}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:4px 0}
.mi{display:flex;flex-direction:column;padding:0 14px;margin-bottom:2px}
.mg{display:flex;gap:12px;padding:3px 0;border-radius:6px;transition:background .1s;position:relative}
.mg:hover{background:rgba(255,255,255,.02)}
.mg:hover .macts{opacity:1;pointer-events:all}
.mg-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg3);flex-shrink:0;cursor:pointer;overflow:hidden;font-size:22px;margin-top:2px}
.mg-av img{width:100%;height:100%;object-fit:cover}
.mgbody{flex:1;min-width:0}
.mghdr{display:flex;align-items:baseline;gap:8px;margin-bottom:1px}
.mgan{font-size:14px;font-weight:700;cursor:pointer}
.mgan:hover{text-decoration:underline}
.mgts{font-size:11px;color:var(--t2)}
.mgadm{font-size:10px;background:rgba(240,71,71,.15);color:var(--red);border-radius:4px;padding:1px 6px;font-weight:700}
.mgtxt{font-size:14px;line-height:1.6;color:var(--t1);word-break:break-word;white-space:pre-wrap}
.mgtxt.ed::after{content:' (edited)';font-size:10px;color:var(--t2)}
.mgatt{margin-top:6px;max-width:380px}
.mgatt img,.mgatt video{max-width:100%;border-radius:10px;cursor:pointer;display:block}
.mgatt a{color:var(--acc);font-size:13px}
.rref{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t2);margin-bottom:3px;cursor:pointer;background:rgba(255,255,255,.03);border-radius:6px;padding:3px 8px;border-left:2px solid var(--acc)}
.rref:hover{color:var(--t0)}
.rxns{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.rxn{display:flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--bdr);border-radius:12px;padding:2px 8px;cursor:pointer;font-size:13px}
.rxn:hover{border-color:var(--acc)}
.rxn.mine{background:var(--acc-g);border-color:rgba(91,141,248,.4)}
.rxn-n{font-size:12px;font-weight:700;color:var(--t1)}
.macts{opacity:0;pointer-events:none;position:absolute;right:0;top:-22px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:10px;padding:4px;display:flex;gap:1px;z-index:30;box-shadow:var(--sh)}
.macts button{padding:4px 7px;border-radius:6px;font-size:12px;color:var(--t1)}
.macts button:hover{background:var(--bg4);color:var(--t0)}
.macts button.d:hover{background:var(--red);color:#fff}
.typr{height:24px;padding:0 14px;font-size:12px;color:var(--t2);display:flex;align-items:center;gap:6px;flex-shrink:0}
.tdots span{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--t2);animation:td .9s infinite;margin-right:1px}
.tdots span:nth-child(2){animation-delay:.15s}.tdots span:nth-child(3){animation-delay:.3s}
@keyframes td{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.daysep{display:flex;align-items:center;gap:12px;padding:10px 14px;color:var(--t2);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.daysep::before,.daysep::after{content:'';flex:1;height:1px;background:var(--bdr)}

/* INPUT */
.inpwrap{padding:0 14px 14px;flex-shrink:0}
.rib{background:var(--bg3);border-left:3px solid var(--acc);border-radius:0 8px 8px 0;padding:6px 12px;margin-bottom:8px;font-size:13px;color:var(--t2);display:flex;align-items:center;justify-content:space-between}
.rib strong{color:var(--acc)}
.inpbox{background:var(--bg3);border-radius:12px;display:flex;align-items:flex-end;gap:6px;padding:8px 12px;border:1px solid var(--bdr);transition:border-color .2s}
.inpbox:focus-within{border-color:rgba(91,141,248,.4)}
.inpbox button{color:var(--t2);padding:4px;border-radius:6px;font-size:17px;flex-shrink:0}
.inpbox button:hover{color:var(--t0);background:var(--bg4)}
.inpbox button.sendbtn{color:var(--acc)}
.msgta{flex:1;background:none;border:none;color:var(--t0);font-size:14px;resize:none;max-height:140px;min-height:22px;line-height:1.55;font-family:inherit}
.msgta::placeholder{color:var(--t2)}
.attprev{display:flex;align-items:center;gap:8px;background:var(--bg4);border-radius:8px;padding:6px 10px;margin-bottom:8px;font-size:13px}
.attprev img{height:40px;border-radius:4px;object-fit:cover}
.attprev .an{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t1)}

/* MEMBERS */
.mp{width:230px;background:rgba(14,14,26,.9);padding:0 6px;overflow-y:auto;flex-shrink:0;border-left:1px solid var(--bdr)}
.mpsec{padding-top:14px;margin-bottom:6px}
.mpsec h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t2);padding:0 8px;margin-bottom:8px}
.mr{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:9px;cursor:pointer;transition:background .12s}
.mr:hover{background:rgba(255,255,255,.05)}
.mrnm{font-size:13px;font-weight:500;color:var(--t2)}
.mr:hover .mrnm{color:var(--t0)}

/* VOICE OV */
.vcov{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:flex;flex-direction:column;backdrop-filter:blur(12px)}
.vcovhd{display:flex;align-items:center;padding:16px 22px;border-bottom:1px solid var(--bdr);gap:12px}
.vcovhd h2{font-size:17px;font-weight:800}
.vcpill{background:var(--bg3);border-radius:8px;padding:4px 12px;font-size:12px;color:var(--t1)}
.vcgrid{flex:1;display:flex;flex-wrap:wrap;gap:14px;padding:16px;align-content:flex-start;overflow-y:auto}
.vctile{background:var(--bg2);border-radius:16px;border:2px solid var(--bdr);position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:180px;flex:1;min-width:200px;max-width:420px}
.vctile.spk{border-color:var(--green);box-shadow:0 0 24px rgba(35,209,139,.25)}
.vctile video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.vctile-info{position:absolute;bottom:10px;left:10px;display:flex;align-items:center;gap:7px;background:rgba(0,0,0,.75);border-radius:20px;padding:4px 12px 4px 6px;backdrop-filter:blur(4px)}
.vctile-ic{position:absolute;top:9px;right:9px;display:flex;gap:3px}
.vctile-ic span{background:rgba(0,0,0,.7);border-radius:6px;padding:2px 5px;font-size:11px}
.vcbigav{font-size:60px;margin-bottom:6px}
.vctname{font-size:13px;font-weight:600;color:var(--t1)}
.vcctrls{display:flex;align-items:center;justify-content:center;gap:12px;padding:16px;border-top:1px solid var(--bdr)}
.vcctw{display:flex;flex-direction:column;align-items:center;gap:4px}
.vcct{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--bg3);color:var(--t0);transition:all .2s}
.vcct:hover{transform:scale(1.08);background:var(--bg4)}
.vcct.muted{background:var(--red)}.vcct.aon{background:var(--acc)}.vcct.leave{background:var(--red);width:54px;height:54px;font-size:20px}
.vcct-lbl{font-size:10px;color:var(--t2)}

/* MODALS */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(6px)}
.modal{background:var(--bg2);border-radius:18px;padding:26px;min-width:380px;max-width:500px;width:94%;border:1px solid var(--bdr2);box-shadow:0 32px 80px rgba(0,0,0,.9);max-height:90vh;overflow-y:auto}
.modal h2{font-size:19px;font-weight:800;margin-bottom:6px}
.modal .sub{color:var(--t1);font-size:13px;margin-bottom:18px}
.mfld{margin-bottom:14px}
.mfld label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t2);margin-bottom:7px}
.mfld input,.mfld textarea,.mfld select{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:9px;padding:10px 13px;color:var(--t0);font-size:14px}
.mfld input:focus,.mfld textarea:focus{border-color:var(--acc);outline:none}
.mfld textarea{resize:vertical;min-height:70px}
.macts2{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
.btn{padding:9px 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:none}
.btn-acc{background:var(--acc);color:#fff}.btn-acc:hover{background:var(--acc2)}
.btn-g{color:var(--t1);background:transparent}.btn-g:hover{color:var(--t0)}
.btn-d{background:var(--red);color:#fff}
.btn-sm{padding:6px 13px;font-size:12px}
.uparea{border:2px dashed var(--bdr2);border-radius:10px;padding:18px;text-align:center;cursor:pointer;color:var(--t2);font-size:13px;transition:all .2s}
.uparea:hover{border-color:var(--acc);color:var(--acc)}
.uparea img{max-width:100%;max-height:100px;border-radius:6px;margin-top:8px;object-fit:cover}

/* FRIENDS */
.frpg{display:flex;flex-direction:column;flex:1;overflow:hidden}
.frtabs{display:flex;gap:2px;padding:10px 14px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.frtab{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;color:var(--t2);position:relative}
.frtab:hover{color:var(--t0);background:rgba(255,255,255,.05)}
.frtab.on{background:var(--acc-g);color:var(--acc)}
.frtab .b2{position:absolute;top:-3px;right:-3px;background:var(--red);color:#fff;border-radius:50%;width:15px;height:15px;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center}
.frlist{flex:1;overflow-y:auto;padding:14px}
.fcard{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--bg3);border-radius:12px;margin-bottom:8px}
.fcard:hover{background:var(--bg4)}
.finfo{flex:1;min-width:0}
.fnm{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fsub{font-size:12px;color:var(--t2)}
.facts{display:flex;gap:6px}
.afrow{display:flex;gap:10px;margin-bottom:14px}
.afrow input{flex:1;background:var(--bg3);border:1px solid var(--bdr);border-radius:9px;padding:10px 13px;color:var(--t0);font-size:14px}
.afrow input:focus{border-color:var(--acc);outline:none}

/* DISCOVER */
.discgrid{display:flex;flex-wrap:wrap;gap:14px;padding:16px;overflow-y:auto;flex:1;align-content:flex-start}

.dban{height:80px;object-fit:cover;width:100%}

.dname{font-size:14px;font-weight:800;margin-bottom:4px}
.ddesc{font-size:12px;color:var(--t2);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:8px}
.dmeta{font-size:11px;color:var(--t2)}
.dmeta strong{color:var(--green)}

/* SETTINGS */
.slayout{display:flex;flex:1;overflow:hidden}
.snav{width:200px;background:var(--bg1);padding:14px 8px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--bdr)}
.snav h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t2);padding:0 8px;margin:14px 0 8px;display:block}
.snav h3:first-child{margin-top:0}
.si{padding:8px 10px;border-radius:8px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;display:flex;align-items:center;gap:8px}
.si:hover{color:var(--t0);background:rgba(255,255,255,.05)}
.si.on{color:var(--t0);background:var(--acc-g)}
.scontent{flex:1;overflow-y:auto;padding:28px}
.scontent h2{font-size:22px;font-weight:800;margin-bottom:6px}
.scontent .sdesc{color:var(--t1);font-size:13px;margin-bottom:26px}
.ssec{margin-bottom:24px}
.ssec h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t2);margin-bottom:12px}
.srow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--bdr)}
.srow:last-child{border-bottom:none}
.srl{font-size:14px;font-weight:500}
.srs{font-size:12px;color:var(--t2);margin-top:2px}
.sinp{background:var(--bg3);border:1px solid var(--bdr);border-radius:9px;padding:8px 12px;color:var(--t0);font-size:14px;width:220px}
.sinp:focus{border-color:var(--acc);outline:none}
.tog{width:42px;height:24px;border-radius:12px;background:var(--bg4);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tog.on{background:var(--acc)}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s}
.tog.on::after{transform:translateX(18px)}
.range-inp{width:180px;accent-color:var(--acc)}
.clrpick{width:44px;height:32px;border-radius:8px;border:1px solid var(--bdr);cursor:pointer;background:none}

/* COLOR THEMES */
.theme-swatches{display:flex;gap:8px;flex-wrap:wrap}
.tsw{width:30px;height:30px;border-radius:50%;cursor:pointer;transition:transform .15s;border:2px solid transparent}
.tsw:hover,.tsw.on{transform:scale(1.15);border-color:#fff}

/* PROFILE CARD */
.pc{position:fixed;background:var(--bg2);border:1px solid var(--bdr2);border-radius:16px;width:280px;z-index:5000;box-shadow:0 20px 60px rgba(0,0,0,.9);overflow:hidden}
.pcban{height:70px;object-fit:cover;width:100%}
.pcbody{padding:0 16px 16px}
.pcavr{display:flex;align-items:flex-end;justify-content:space-between;margin-top:-26px;margin-bottom:10px}
.pcname{font-size:17px;font-weight:800}
.pcun{font-size:12px;color:var(--t2);margin-bottom:4px}
.pccs{font-size:12px;color:var(--t1);font-style:italic;margin-bottom:8px}
.pcbio{font-size:12px;color:var(--t1);line-height:1.5;margin-bottom:12px}
.pcacts{display:flex;gap:7px}

/* ADMIN */
.adminpg{display:flex;flex:1;overflow:hidden}
.abtable{width:100%;border-collapse:collapse}
.abtable th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t2);padding:8px 12px;text-align:left;border-bottom:1px solid var(--bdr)}
.abtable td{padding:10px 12px;border-bottom:1px solid var(--bdr);font-size:13px}
.abtable tr:hover td{background:rgba(255,255,255,.02)}

/* CTX */
.ctx{position:fixed;background:var(--bg3);border:1px solid var(--bdr2);border-radius:12px;padding:5px;z-index:9000;min-width:178px;box-shadow:0 12px 40px rgba(0,0,0,.8)}
.ctx-i{padding:8px 12px;border-radius:7px;font-size:13px;cursor:pointer;color:var(--t1);display:flex;align-items:center;gap:9px}
.ctx-i:hover{background:var(--acc);color:#fff}
.ctx-i.d:hover{background:var(--red);color:#fff}
.ctxsep{height:1px;background:var(--bdr);margin:4px 0}

/* EP */
.ep{position:absolute;bottom:60px;right:12px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:14px;padding:10px;z-index:200;box-shadow:var(--sh);width:228px}
.ep input{width:100%;background:var(--bg4);border:1px solid var(--bdr);border-radius:8px;padding:6px 10px;color:var(--t0);font-size:13px;margin-bottom:8px}
.ep input:focus{outline:none;border-color:var(--acc)}
.epgrid{display:flex;flex-wrap:wrap;gap:2px;max-height:150px;overflow-y:auto}
.epbtn{font-size:20px;padding:4px;border-radius:6px;cursor:pointer;background:none;border:none;line-height:1}
.epbtn:hover{background:var(--bg4)}

/* SEARCH */
.sov{position:fixed;top:68px;left:50%;transform:translateX(-50%);width:540px;max-width:96vw;background:var(--bg2);border:1px solid var(--bdr2);border-radius:14px;padding:14px;z-index:2000;box-shadow:var(--sh)}
.sovrow{display:flex;align-items:center;gap:8px;background:var(--bg3);border-radius:9px;padding:8px 12px;margin-bottom:10px}
.sovrow input{flex:1;background:none;border:none;color:var(--t0);font-size:14px;font-family:inherit}
.sovrow input:focus{outline:none}
.sri{padding:8px 12px;border-radius:8px;cursor:pointer}
.sri:hover{background:var(--bg3)}
.src{font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* TOASTS */
.toasts{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--bg3);border:1px solid var(--bdr2);border-left:3px solid var(--acc);border-radius:10px;padding:10px 14px;pointer-events:all;animation:tin .3s;box-shadow:var(--sh);max-width:280px}
.toast.err{border-left-color:var(--red)}.toast.ok{border-left-color:var(--green)}
.toast-t{font-size:13px;font-weight:700;margin-bottom:2px}
.toast-b{font-size:12px;color:var(--t1)}
@keyframes tin{from{transform:translateX(130%);opacity:0}to{transform:none;opacity:1}}

/* WELCOME */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;color:var(--t2);padding:40px;text-align:center}
.welcome h2{font-size:28px;font-weight:800;color:var(--t0)}

/* STATUS */
.st-online{color:var(--green)}.st-idle{color:var(--yellow)}.st-dnd{color:var(--red)}.st-offline{color:var(--t2)}
.sd-online{background:var(--green)}.sd-idle{background:var(--yellow)}.sd-dnd{background:var(--red)}.sd-offline{background:var(--t2)}
</style>
</head>
<body>
<div id="bg-theme"></div><div id="bg-dim"></div>

<!-- AUTH -->
<div id="auth">
  <div class="abox">
    <div class="alogo">Mole<em>cord</em></div>
    <div class="atag">Chat · Voice · Video · Screenshare</div>
    <!-- Step 0: Key -->
    <div id="step-key">
      <div class="key-badge">🔑 Registration Key Required</div>
      <div class="fld"><label>Enter Registration Key</label><input id="reg-key-inp" type="password" placeholder="Contact admin for key" onkeydown="if(event.key==='Enter')validateKey()"/></div>
      <button class="btn-p" onclick="validateKey()">Continue</button>
    </div>
    <!-- Step 1: Auth -->
    <div id="step-auth" style="display:none">
      <div class="atabs">
        <button class="atab on" id="tab-li" onclick="switchTab('li')">Sign In</button>
        <button class="atab" id="tab-reg" onclick="switchTab('reg')">Register</button>
      </div>
      <div id="aerr" class="aerr"></div>
      <div id="li-f">
        <div class="fld"><label>Username or Email</label><input id="li-u" type="text" onkeydown="if(event.key==='Enter')doLogin()"/></div>
        <div class="fld"><label>Password</label><input id="li-p" type="password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
        <button class="btn-p" onclick="doLogin()">Sign In</button>
      </div>
      <div id="reg-f" style="display:none">
        <div class="fld"><label>Username</label><input id="reg-u" type="text" placeholder="lowercase, letters and numbers"/></div>
        <div class="fld"><label>Display Name</label><input id="reg-dn" placeholder="How others see you"/></div>
        <div class="fld"><label>Email (optional)</label><input id="reg-e" type="email" placeholder="For account recovery"/></div>
        <div class="fld"><label>Password</label><input id="reg-p" type="password" placeholder="Minimum 6 characters" onkeydown="if(event.key==='Enter')doRegister()"/></div>
        <button class="btn-p" onclick="doRegister()">Create Account</button>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="layout">
    <div class="rail" id="rail">
      <div class="rb" id="rb-friends" onclick="showFriends()" title="Friends">👥<div class="badge hidden" id="fr-badge">0</div></div>
      <div class="rsep"></div>
      <div id="srv-rail"></div>
      <div class="rsep"></div>
      <div class="rb" onclick="openModal('new-srv')" title="Create Server" style="color:var(--green);font-size:22px;font-weight:900">+</div>
      <div class="rb" onclick="showDiscover()" title="Discover" style="color:var(--orange)">🧭</div>
    </div>
    <div class="sb" id="sb">
      <img class="srv-ban" id="srv-ban" src="" alt=""/>
      <div class="sbhd">
        <span class="sbt" id="sbt" onclick="openSrvMenu()">Molecord</span>
        <button onclick="openSrvMenu()" style="color:var(--t2);font-size:16px;padding:4px">⌄</button>
      </div>
      <div class="sbbody" id="sbbody"></div>
      <div id="vcbar-slot"></div>
      <div class="up">
        <div style="position:relative;cursor:pointer" onclick="openSelfProfile(event)">
          <div class="av s32" id="up-av">🧑</div>
          <div class="sdot sd-online" id="up-sdot"></div>
        </div>
        <div class="upi">
          <div class="upn" id="up-nm">—</div>
          <div class="ups" id="up-sub">Online</div>
        </div>
        <div class="upacts">
          <button id="btn-mute" onclick="toggleMute()" title="Mute">🎤</button>
          <button id="btn-deaf" onclick="toggleDeafen()" title="Deafen">🎧</button>
          <button onclick="openSettings()" title="Settings">⚙️</button>
          <button onclick="doLogout()" title="Logout" style="font-size:13px">🚪</button>
        </div>
      </div>
    </div>
    <div class="main" id="main">
      <div class="welcome"><div style="font-size:80px">🔵</div><h2>Welcome to Molecord</h2><p style="color:var(--t1);font-size:14px">Pick a channel or friend to get started.</p></div>
    </div>
    <div class="mp hidden" id="mp"></div>
  </div>
</div>

<!-- VOICE OV -->
<div class="vcov hidden" id="vcov">
  <div class="vcovhd">
    <span style="font-size:18px">🔊</span><h2>Voice Channel</h2>
    <span class="vcpill" id="vcovch">General</span>
    <button onclick="closeVCOv()" style="margin-left:auto;background:var(--bg3);color:var(--t1);padding:7px 16px;border-radius:9px;font-size:13px;font-weight:600">Minimize</button>
  </div>
  <div class="vcgrid" id="vcgrid"></div>
  <div class="vcctrls">
    <div class="vcctw"><button class="vcct" id="vc-mic" onclick="toggleMute()">🎤</button><div class="vcct-lbl">Mic</div></div>
    <div class="vcctw"><button class="vcct" id="vc-deaf" onclick="toggleDeafen()">🎧</button><div class="vcct-lbl">Deafen</div></div>
    <div class="vcctw"><button class="vcct" id="vc-cam" onclick="toggleCamera()">📷</button><div class="vcct-lbl">Camera</div></div>
    <div class="vcctw"><button class="vcct" id="vc-ss" onclick="toggleScreenshare()">🖥️</button><div class="vcct-lbl">Screen</div></div>
    <div class="vcctw"><button class="vcct leave" onclick="leaveVoice()">📵</button><div class="vcct-lbl">Leave</div></div>
  </div>
</div>

<div id="modals"></div>
<div class="ctx hidden" id="ctx"></div>
<div class="pc hidden" id="pc"></div>
<div class="ep hidden" id="ep"></div>
<div class="sov hidden" id="sov"></div>
<div class="toasts" id="toasts"></div>

<script>
// ── State ──────────────────────────────────────────────────────────
let me=null,ws=null,regKey='';
let servers=[],allUsers={},friendships=[];
let activeSrvId=null,activeChId=null,activeDMId=null;
let view='welcome';
let messages={},dmMessages={},msgCache={};
let showMP=true,muted=false,deafened=false,camOn=false,ssOn=false;
let voiceChId=null,voiceSrvId=null,localStream=null,screenStream=null;
let peerConns={},voiceRooms={};
let typingTimers={},typingUsers={};
let replyTo=null,attachFile=null,lastTyping=0;
let mySettings={theme_color:'#5b8df8',theme_mode:'dark',theme_bg:null,theme_bg_blur:0,theme_bg_dim:40,custom_font_url:null,custom_font_name:null,profile_theme_color:'#5b8df8',profile_theme_gradient:null,notifications:1};
let friendTab='all',settingsTab='profile';
const ICE=[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}];
const SL={online:'Online',idle:'Idle',dnd:'Do Not Disturb',offline:'Offline'};
const SDC={online:'sd-online',idle:'sd-idle',dnd:'sd-dnd',offline:'sd-offline'};
const SC={online:'var(--green)',idle:'var(--yellow)',dnd:'var(--red)',offline:'var(--t2)'};
const EMOJIS='👍❤️😂😮😢🔥🎉👋✅💯🚀💀😍🤔👀🎵💻🐛🎮⭐🙏😎🤣🥳😤🫡💪🤖🎯🍕🎶🦊🐱🐼🦁🌟💎🎸🏆'.split('');
const THEME_COLORS=['#5b8df8','#a855f7','#23d18b','#f04747','#faa61a','#ff6b35','#ec4899','#06b6d4','#10b981','#f59e0b'];

const $=id=>document.getElementById(id);
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtT(ts){return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
function fmtD(ts){return new Date(ts).toLocaleDateString([],{month:'long',day:'numeric',year:'numeric'})}
function timeAgo(ts){const d=Date.now()-ts;if(d<60000)return'just now';if(d<3600000)return Math.floor(d/60000)+'m';if(d<86400000)return Math.floor(d/3600000)+'h';return Math.floor(d/86400000)+'d';}
function getUser(id){return allUsers[id]||{id,username:'unknown',displayName:'Unknown',avatar:null,avatarEmoji:'👤',status:'offline',customStatus:''}}
function findCh(id){for(const s of servers)for(const c of s.channels)if(c.id===id)return c;return null}
function findSrv(id){return servers.find(s=>s.id===id)}
function pend(){return friendships.filter(f=>f.status==='pending'&&!f.isRequester).length}
function renderAv(u,sz='s32',shaped=true){
  const r=shaped?'border-radius:50%':'border-radius:10px';
  if(u?.avatar)return`<div class="av ${sz}" style="${r}"><img src="${esc(u.avatar)}" alt=""/></div>`;
  return`<div class="av ${sz}" style="${r}">${esc(u?.avatarEmoji||'👤')}</div>`;
}

// ── Theme ──────────────────────────────────────────────────────────
function applyTheme(){
  const s=mySettings;
  // Light/dark
  document.body.classList.toggle('light-mode',s.theme_mode==='light');
  // Accent color
  const root=document.documentElement;
  if(s.theme_color){
    root.style.setProperty('--acc',s.theme_color);
    // Compute slightly darker shade
    root.style.setProperty('--acc2',s.theme_color);
    root.style.setProperty('--acc-g',hexToRgba(s.theme_color,.15));
  }
  // BG
  const bg=$('bg-theme'),dim=$('bg-dim');
  if(s.theme_bg){
    bg.style.backgroundImage=`url(${s.theme_bg})`;
    bg.style.filter=s.theme_bg_blur?`blur(${s.theme_bg_blur*4}px)`:'none';
    bg.classList.add('on');
    dim.style.background=`rgba(0,0,0,${(s.theme_bg_dim||40)/100})`;
    dim.style.display='block';
  } else {bg.classList.remove('on');dim.style.display='none';}
  // Font
  if(s.custom_font_url){
    $('font-style').textContent=`@font-face{font-family:'${esc(s.custom_font_name||'CustomFont')}';src:url('${s.custom_font_url}');}:root{--font:'${esc(s.custom_font_name||'CustomFont')}',sans-serif;}`;
  } else {
    $('font-style').textContent=`@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');:root{--font:'DM Sans',sans-serif;}`;
  }
}
function hexToRgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}

// ── Auth ────────────────────────────────────────────────────────────
async function validateKey(){
  const k=$('reg-key-inp').value.trim();
  const r=await fetch('/api/auth/validate-key',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:k})});
  const d=await r.json();
  if(d.valid){regKey=k;$('step-key').style.display='none';$('step-auth').style.display='block';}
  else showAuthErr('Invalid registration key. Contact an admin.');
}
function switchTab(t){
  $('li-f').style.display=t==='li'?'block':'none';
  $('reg-f').style.display=t==='reg'?'block':'none';
  $('tab-li').className='atab'+(t==='li'?' on':'');
  $('tab-reg').className='atab'+(t==='reg'?' on':'');
  $('aerr').style.display='none';
}
function showAuthErr(m){const e=$('aerr');e.textContent=m;e.style.display='block';}
async function doLogin(){
  const u=$('li-u').value.trim(),p=$('li-p').value;
  if(!u||!p)return showAuthErr('Fill all fields');
  const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
  const d=await r.json();
  if(!r.ok){if(d.error==='banned')return showAuthErr(`Banned: ${d.reason||'Contact admin'}`);return showAuthErr(d.error);}
  me=d;await initApp();
}
async function doRegister(){
  const u=$('reg-u').value.trim(),dn=$('reg-dn').value.trim(),e=$('reg-e').value.trim(),p=$('reg-p').value;
  if(!u||!p)return showAuthErr('Username and password required');
  const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,displayName:dn,email:e,password:p,regKey})});
  const d=await r.json();if(!r.ok)return showAuthErr(d.error);
  me=d;await initApp();
}
async function doLogout(){await fetch('/api/auth/logout',{method:'POST'});if(ws)ws.close();location.reload();}

// ── Init ────────────────────────────────────────────────────────────
async function initApp(){
  const[ur,sr,fr,mr]=await Promise.all([fetch('/api/users'),fetch('/api/servers'),fetch('/api/friends'),fetch('/api/auth/me')]);
  if(!mr.ok)return;
  const meD=await mr.json();me={...meD,...me};
  if(meD.settings)mySettings={...mySettings,...meD.settings};
  const ua=await ur.json();ua.forEach(u=>allUsers[u.id]=u);allUsers[me.id]=me;
  servers=await sr.json();friendships=await fr.json();
  $('auth').style.display='none';$('app').style.display='block';
  applyTheme();updateUP();renderRail();
  if(servers.length)selectServer(servers[0].id);
  updateFrBadge();connectWS();
}
// Auto-resume session from cookie
(async()=>{try{const r=await fetch('/api/auth/me');if(r.ok){const d=await r.json();if(d.id){me=d;// show key step skipped since already logged in
$('step-key').style.display='none';$('step-auth').style.display='none';await initApp();}}}catch{}})();

// ── WebSocket ───────────────────────────────────────────────────────
function connectWS(){
  const p=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(`${p}//${location.host}`);
  ws.onopen=()=>{};
  ws.onmessage=e=>{try{handleWS(JSON.parse(e.data));}catch(err){console.error(err);}};
  ws.onclose=()=>setTimeout(connectWS,3000);
}
function wsSend(d){if(ws&&ws.readyState===1)ws.send(JSON.stringify(d));}

function handleWS(d){
  switch(d.type){
    case 'MESSAGE_CREATE':
      if(!messages[d.message.channelId])messages[d.message.channelId]=[];
      messages[d.message.channelId].push(d.message);msgCache[d.message.id]=d.message;
      if(d.message.channelId===activeChId&&view==='server'){appendMsg(d.message);scrollBot();}
      else if(d.message.authorId!==me.id&&mySettings.notifications){const ch=findCh(d.message.channelId);if(ch)toast(`#${ch.name}`,`${d.message.authorName}: ${d.message.content.slice(0,50)}`);}
      break;
    case 'MESSAGE_UPDATE':
      {const a=messages[d.channelId];if(a){const i=a.findIndex(m=>m.id===d.messageId);if(i>-1){a[i].content=d.content;a[i].edited=true;}}}
      if(d.channelId===activeChId&&view==='server')renderMsgs();break;
    case 'MESSAGE_DELETE':
      if(messages[d.channelId])messages[d.channelId]=messages[d.channelId].filter(m=>m.id!==d.messageId);
      if(d.channelId===activeChId&&view==='server')renderMsgs();break;
    case 'MESSAGE_PIN':
      {const a=messages[d.channelId];if(a){const i=a.findIndex(m=>m.id===d.messageId);if(i>-1)a[i].pinned=d.pinned;}}
      if(d.channelId===activeChId&&view==='server')renderMsgs();break;
    case 'REACTION_UPDATE':
      Object.values(messages).forEach(a=>{const i=a.findIndex(m=>m.id===d.messageId);if(i>-1)a[i].reactions=d.reactions;});
      const re=document.getElementById('rxn-'+d.messageId);if(re)re.innerHTML=buildRxns({id:d.messageId,reactions:d.reactions});break;
    case 'DM_CREATE':
      {const k=d.fromUserId===me.id?d.toUserId:d.fromUserId;
      if(!dmMessages[k])dmMessages[k]=[];dmMessages[k].push(d.message);
      if(activeDMId===k&&view==='dm'){appendDMMsg(d.message);scrollBot();}
      else if(d.fromUserId!==me.id){const u=allUsers[d.fromUserId];toast(`DM: ${u?.displayName||'?'}`,d.message.content.slice(0,50));}}break;
    case 'USER_STATUS':
      if(allUsers[d.userId])allUsers[d.userId].status=d.status;
      if(d.userId===me.id){me.status=d.status;updateUP();}
      renderMP();if(view==='friends')renderFriendsList();break;
    case 'USER_UPDATE':
      allUsers[d.user.id]={...allUsers[d.user.id],...d.user};
      if(d.user.id===me.id)me={...me,...d.user};updateUP();renderMP();break;
    case 'USER_JOIN':allUsers[d.user.id]=d.user;break;
    case 'TYPING':
      if(d.channelId===activeChId&&d.userId!==me.id){if(!typingUsers[d.channelId])typingUsers[d.channelId]=new Set();typingUsers[d.channelId].add(d.displayName);clearTimeout(typingTimers[d.userId]);typingTimers[d.userId]=setTimeout(()=>{typingUsers[d.channelId]?.delete(d.displayName);renderTyping();},3000);renderTyping();}break;
    case 'CHANNEL_CREATE':{const s=findSrv(d.serverId);if(s){s.channels.push(d.channel);renderSidebar();}}break;
    case 'CHANNEL_DELETE':
      servers.forEach(s=>s.channels=s.channels.filter(c=>c.id!==d.channelId));
      if(activeChId===d.channelId){activeChId=null;showWelcome();}renderSidebar();break;
    case 'SERVER_CREATED':case 'SERVER_JOINED':
      if(!servers.find(s=>s.id===d.server.id)){servers.push(d.server);renderRail();renderSidebar();}break;
    case 'SERVER_UPDATE':
      {const i=servers.findIndex(s=>s.id===d.server.id);if(i>-1)servers[i]={...servers[i],...d.server};}
      renderRail();if(d.server.id===activeSrvId)renderSidebar();break;
    case 'MEMBER_JOIN':{const s=findSrv(d.serverId);if(s&&!s.members.find(m=>m.id===d.userId)){const u=allUsers[d.userId];if(u)s.members.push(u);}}break;
    case 'MEMBER_LEAVE':{const s=findSrv(d.serverId);if(s)s.members=s.members.filter(m=>m.id!==d.userId);}break;
    case 'FRIEND_REQUEST':
      friendships.unshift(d.friendship);updateFrBadge();
      toast('Friend Request',`${d.friendship.user.displayName} sent you a request`);
      if(view==='friends')renderFriendsList();break;
    case 'FRIEND_ACCEPTED':
      {const i=friendships.findIndex(f=>f.friendshipId===d.friendshipId);
      if(i>-1)friendships[i].status='accepted';
      toast('Friend Added!',`${d.user.displayName} accepted`,'ok');
      updateFrBadge();if(view==='friends')renderFriendsList();}break;
    case 'VOICE_JOIN':if(d.userId!==me.id)toast('🔊',`${getUser(d.userId).displayName} joined voice`);break;
    case 'VOICE_LEAVE':closePeer(d.userId);if(d.userId!==me.id)toast('🔇',`${getUser(d.userId).displayName} left voice`);break;
    case 'VOICE_ROOM_UPDATE':voiceRooms[d.channelId]=d.participants;renderVCOv();renderVCBar();renderSidebar();break;
    case 'VOICE_STATE_UPDATE':{const pts=voiceRooms[d.channelId];if(pts){const p=pts.find(p=>p.userId===d.userId);if(p)Object.assign(p,d);}}renderVCOv();renderSidebar();break;
    case 'RTC_SEND_OFFER':createOffer(d.targetUserId);break;
    case 'RTC_OFFER':handleOffer(d.fromUserId,d.sdp);break;
    case 'RTC_ANSWER':handleAnswer(d.fromUserId,d.sdp);break;
    case 'RTC_ICE':handleIce(d.fromUserId,d.candidate);break;
    case 'BANNED':
      toast('Banned',d.reason||'You have been banned from Molecord','err');
      setTimeout(()=>{if(ws)ws.close();location.reload();},2000);break;
  }
}

// ── Message render ──────────────────────────────────────────────────
function renderMsgs(){
  const inner=$('msgs-inner');if(!inner)return;
  const msgs=messages[activeChId]||[];
  if(!msgs.length){const ch=findCh(activeChId);inner.innerHTML=`<div style="padding:48px 14px;text-align:center;color:var(--t2)"><div style="font-size:52px;margin-bottom:12px">💬</div><div style="font-size:15px;font-weight:700;color:var(--t1)">#${esc(ch?.name||'')}</div><div style="font-size:13px;margin-top:4px">Be the first to say something!</div></div>`;return;}
  inner.innerHTML='';let la=null,lt=0,ld='';
  for(const m of msgs){
    const day=new Date(m.timestamp).toDateString();
    if(day!==ld){const s=document.createElement('div');s.className='daysep';s.textContent=fmtD(m.timestamp);inner.appendChild(s);ld=day;}
    const g=la===m.authorId&&(m.timestamp-lt)<300000&&!m.replyTo;
    inner.appendChild(buildMsgEl(m,!g));la=m.authorId;lt=m.timestamp;
  }
}
function buildMsgEl(msg,showH){
  const u=getUser(msg.authorId);const wrap=document.createElement('div');wrap.className='mi';
  const d=document.createElement('div');d.className='mg';d.id='mg-'+msg.id;
  const avH=msg.authorAvatar?`<div class="mg-av" onclick="openProfile(event,'${msg.authorId}')"><img src="${esc(msg.authorAvatar)}" alt=""/></div>`:`<div class="mg-av" onclick="openProfile(event,'${msg.authorId}')">${esc(msg.authorAvatarEmoji||'👤')}</div>`;
  const attH=buildAtt(msg);const rxH=buildRxns(msg);const acH=buildActs(msg);const repH=msg.replyTo?buildRepRef(msg.replyTo):'';
  if(showH){
    d.innerHTML=`${avH}<div class="mgbody">${repH}<div class="mghdr"><span class="mgan" onclick="openProfile(event,'${msg.authorId}')">${esc(u.displayName||u.username)}</span>${u.isAdmin?'<span class="mgadm">ADMIN</span>':''}<span class="mgts">${fmtT(msg.timestamp)}</span></div><div class="mgtxt${msg.edited?' ed':''}" id="mt-${msg.id}">${esc(msg.content)}</div>${attH}<div class="rxns" id="rxn-${msg.id}">${rxH}</div></div>${acH}`;
  } else {
    d.innerHTML=`<div style="width:40px;flex-shrink:0"></div><div class="mgbody">${repH}<div class="mgtxt${msg.edited?' ed':''}" id="mt-${msg.id}">${esc(msg.content)}</div>${attH}<div class="rxns" id="rxn-${msg.id}">${rxH}</div></div>${acH}`;
  }
  wrap.appendChild(d);return wrap;
}
function buildAtt(msg){
  if(!msg.attachmentUrl)return'';const t=msg.attachmentType||'';
  if(t.startsWith('image/')||/\.(png|jpg|jpeg|gif|webp)$/i.test(msg.attachmentUrl))return`<div class="mgatt"><img src="${esc(msg.attachmentUrl)}" onclick="window.open('${esc(msg.attachmentUrl)}','_blank')" alt=""/></div>`;
  if(t.startsWith('video/'))return`<div class="mgatt"><video controls src="${esc(msg.attachmentUrl)}" style="max-width:380px;border-radius:10px"></video></div>`;
  return`<div class="mgatt"><a href="${esc(msg.attachmentUrl)}" target="_blank">📎 Attachment</a></div>`;
}
function buildRepRef(rid){const r=msgCache[rid];if(!r)return'';const u=getUser(r.authorId);return`<div class="rref">↩ <strong style="color:var(--acc)">${esc(u.displayName||'?')}</strong> ${esc(r.content.slice(0,60))}</div>`;}
function buildRxns(msg){return Object.entries(msg.reactions||{}).filter(([,u])=>u.length>0).map(([e,u])=>`<button class="rxn${u.includes(me.id)?' mine':''}" onclick="doReact('${msg.id}','${e}')">${e}<span class="rxn-n">${u.length}</span></button>`).join('');}
function buildActs(msg){const mine=msg.authorId===me.id;return`<div class="macts">${EMOJIS.slice(0,5).map(e=>`<button onclick="doReact('${msg.id}','${e}')">${e}</button>`).join('')}<button onclick="setReply('${msg.id}')">↩</button>${mine?`<button onclick="startEdit('${msg.id}')">✏️</button>`:''}<button onclick="doPin('${msg.id}')" style="${msg.pinned?'color:var(--yellow)':''}">📌</button>${mine?`<button class="d" onclick="doDelete('${msg.id}')">🗑</button>`:''}</div>`;}
function appendMsg(msg){const inner=$('msgs-inner');if(!inner)return;const msgs=messages[activeChId]||[];const prev=msgs[msgs.length-2];const g=prev&&prev.authorId===msg.authorId&&(msg.timestamp-prev.timestamp)<300000&&!msg.replyTo;inner.appendChild(buildMsgEl(msg,!g));}
function scrollBot(){const m=$('msgs');if(m)setTimeout(()=>m.scrollTop=m.scrollHeight,50);}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,140)+'px';}

async function sendMsg(){

  replyTo=null;attachFile=null;const rb=$('rply-bar');if(rb)rb.innerHTML='';const ap=$('att-prev');if(ap)ap.innerHTML='';
  await fetch(`/api/channels/${activeChId}/messages`,{method:'POST',body:fd});
}
async function sendDM(){
  const ta=$('dm-ta');if(!ta)return;

function clearAtt(){attachFile=null;const s=$('att-prev');if(s)s.innerHTML='';const i=$('att-inp');if(i)i.value='';}
function startEdit(id){const msg=messages[activeChId]?.find(m=>m.id===id);if(!msg)return;const el=document.getElementById('mt-'+id);if(!el)return;el.innerHTML=`<input style="width:100%;background:var(--bg4);border:1px solid var(--acc);border-radius:8px;padding:7px 11px;color:var(--t0);font-size:14px;font-family:inherit;outline:none" value="${esc(msg.content)}" onkeydown="onEditKD(event,'${id}')"/><div style="font-size:11px;color:var(--t2);margin-top:3px">Enter to save · Esc to cancel</div>`;el.querySelector('input').focus();}
async function onEditKD(e,id){if(e.key==='Enter'){await fetch(`/api/messages/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:e.target.value})});renderMsgs();}if(e.key==='Escape')renderMsgs();}

async function doReact(id,emoji){await fetch(`/api/messages/${id}/react`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({emoji})});}

// ── Voice / WebRTC ───────────────────────────────────────────────────
async function joinVoice(chId,srvId){
  if(voiceChId===chId){openVCOv();return;}
  if(voiceChId)await leaveVoice(true);
  try{localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});}
  catch(e){toast('Mic Error','Allow mic permission in browser','err');return;}
  voiceChId=chId;voiceSrvId=srvId;muted=false;deafened=false;
  localStream.getAudioTracks().forEach(t=>t.enabled=true);
  wsSend({type:'VOICE_JOIN',channelId:chId,serverId:srvId});
  updateUP();renderVCBar();renderSidebar();openVCOv();toast('🔊','Joined voice channel','ok');
}
async function leaveVoice(silent=false){
  if(!voiceChId)return;
  wsSend({type:'VOICE_LEAVE',channelId:voiceChId,serverId:voiceSrvId});
  Object.keys(peerConns).forEach(closePeer);
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  if(screenStream){screenStream.getTracks().forEach(t=>t.stop());screenStream=null;}
  voiceChId=null;voiceSrvId=null;ssOn=false;camOn=false;
  $('vcov').classList.add('hidden');renderVCBar();renderSidebar();
  if(!silent)toast('📵','Left voice channel');
}
function openVCOv(){const ch=findCh(voiceChId);$('vcovch').textContent=ch?.name||'Voice';$('vcov').classList.remove('hidden');renderVCOv();updateVCCtrls();}
function closeVCOv(){$('vcov').classList.add('hidden');}
function renderVCOv(){
  if(!voiceChId)return;const grid=$('vcgrid');if(!grid)return;
  const pts=voiceRooms[voiceChId]||[];
  const me_tile={userId:me.id,displayName:me.displayName,avatar:me.avatar,avatarEmoji:me.avatarEmoji,muted,deafened,screensharing:ssOn,video:camOn,isMe:true};
  const tiles=[me_tile,...pts.filter(p=>p.userId!==me.id)];
  grid.innerHTML='';
  for(const p of tiles){
    const tile=document.createElement('div');tile.className='vctile';tile.id='vct-'+p.userId;
    const avH=p.avatar?`<img src="${esc(p.avatar)}" style="width:80px;height:80px;border-radius:50%;object-fit:cover" alt=""/>`:`<div class="vcbigav">${esc(p.avatarEmoji||'👤')}</div>`;
    tile.innerHTML=`${avH}<div class="vctname">${esc(p.displayName)}${p.isMe?' (you)':''}</div><div class="vctile-info"><span style="font-size:13px">${esc(p.avatarEmoji||'👤')}</span><span style="font-size:12px;font-weight:600">${esc(p.displayName)}${p.isMe?' (you)':''}</span></div><div class="vctile-ic">${p.muted?'<span>🔇</span>':''}${p.screensharing?'<span>🖥️</span>':''}${p.video?'<span>📷</span>':''}</div>`;
    if(!p.isMe){
      const pc=peerConns[p.userId];
      if(pc){
        const tracks=pc.getReceivers().map(r=>r.track).filter(Boolean);
        if(tracks.length){
          const stream=new MediaStream(tracks);
          const at=stream.getAudioTracks(),vt=stream.getVideoTracks();
          if(at.length){const a=document.createElement('audio');a.autoplay=true;a.muted=deafened;a.srcObject=new MediaStream(at);a.style.display='none';tile.appendChild(a);}
          if(vt.length){const v=document.createElement('video');v.autoplay=true;v.playsInline=true;v.srcObject=new MediaStream(vt);Object.assign(v.style,{position:'absolute',inset:'0',width:'100%',height:'100%',objectFit:'cover'});tile.appendChild(v);}
        }
      }
    } else {
      const src=ssOn&&screenStream?screenStream:(camOn&&localStream?new MediaStream(localStream.getVideoTracks()):null);
      if(src&&src.getVideoTracks().length){const v=document.createElement('video');v.autoplay=true;v.playsInline=true;v.muted=true;v.srcObject=src;Object.assign(v.style,{position:'absolute',inset:'0',width:'100%',height:'100%',objectFit:'cover'});tile.appendChild(v);}
    }
    grid.appendChild(tile);
  }
}

}
function toggleMute(){muted=!muted;if(localStream)localStream.getAudioTracks().forEach(t=>t.enabled=!muted);if(voiceChId)wsSend({type:'VOICE_STATE',channelId:voiceChId,serverId:voiceSrvId,muted,deafened,screensharing:ssOn,video:camOn});updateUP();updateVCCtrls();renderVCBar();}
function toggleDeafen(){deafened=!deafened;document.querySelectorAll('#vcgrid audio').forEach(a=>a.muted=deafened);if(voiceChId)wsSend({type:'VOICE_STATE',channelId:voiceChId,serverId:voiceSrvId,muted,deafened,screensharing:ssOn,video:camOn});updateVCCtrls();renderVCBar();}
async function toggleCamera(){
  if(camOn){localStream?.getVideoTracks().forEach(t=>{t.stop();localStream.removeTrack(t);});camOn=false;}
  else{try{const vs=await navigator.mediaDevices.getUserMedia({video:true,audio:false});vs.getVideoTracks().forEach(t=>localStream.addTrack(t));camOn=true;for(const uid of Object.keys(peerConns)){const pc=peerConns[uid];vs.getVideoTracks().forEach(t=>pc.addTrack(t,localStream));const o=await pc.createOffer();await pc.setLocalDescription(o);wsSend({type:'RTC_OFFER',targetUserId:uid,sdp:o});}}catch(e){toast('Camera Error','Could not access camera','err');return;}}
  if(voiceChId)wsSend({type:'VOICE_STATE',channelId:voiceChId,serverId:voiceSrvId,muted,deafened,screensharing:ssOn,video:camOn});updateVCCtrls();renderVCOv();

async function toggleScreenshare(){
  if(ssOn){screenStream?.getTracks().forEach(t=>t.stop());screenStream=null;ssOn=false;}
  else{try{screenStream=await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});ssOn=true;screenStream.getVideoTracks()[0].onended=()=>{ssOn=false;screenStream=null;if(voiceChId)wsSend({type:'VOICE_STATE',channelId:voiceChId,serverId:voiceSrvId,muted,deafened,screensharing:false,video:camOn});updateVCCtrls();renderVCOv();};for(const uid of Object.keys(peerConns)){const pc=peerConns[uid];screenStream.getTracks().forEach(t=>pc.addTrack(t,screenStream));const o=await pc.createOffer();await pc.setLocalDescription(o);wsSend({type:'RTC_OFFER',targetUserId:uid,sdp:o});}}catch(e){if(e.name!=='NotAllowedError')toast('Screen Error','Could not share screen','err');return;}}
  if(voiceChId)wsSend({type:'VOICE_STATE',channelId:voiceChId,serverId:voiceSrvId,muted,deafened,screensharing:ssOn,video:camOn});updateVCCtrls();renderVCOv();
}

// WebRTC
function createPeer(uid){if(peerConns[uid])return peerConns[uid];const pc=new RTCPeerConnection({iceServers:ICE});peerConns[uid]=pc;if(localStream)localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));if(screenStream)screenStream.getTracks().forEach(t=>pc.addTrack(t,screenStream));pc.onicecandidate=e=>{if(e.candidate)wsSend({type:'RTC_ICE',targetUserId:uid,candidate:e.candidate});};pc.ontrack=()=>renderVCOv();pc.onconnectionstatechange=()=>{if(pc.connectionState==='failed'||pc.connectionState==='closed')closePeer(uid);};return pc;}
async function createOffer(uid){const pc=createPeer(uid);const o=await pc.createOffer();await pc.setLocalDescription(o);wsSend({type:'RTC_OFFER',targetUserId:uid,sdp:o});}
async function handleOffer(uid,sdp){const pc=createPeer(uid);await pc.setRemoteDescription(new RTCSessionDescription(sdp));const a=await pc.createAnswer();await pc.setLocalDescription(a);wsSend({type:'RTC_ANSWER',targetUserId:uid,sdp:a});}
async function handleAnswer(uid,sdp){const pc=peerConns[uid];if(pc&&pc.signalingState!=='stable')await pc.setRemoteDescription(new RTCSessionDescription(sdp));}
async function handleIce(uid,c){const pc=peerConns[uid];if(pc&&c)try{await pc.addIceCandidate(new RTCIceCandidate(c));}catch{}}
function closePeer(uid){const pc=peerConns[uid];if(pc)pc.close();delete peerConns[uid];renderVCOv();}

    <div class="dinfo">${s.icon?`<img src="${esc(s.icon)}" style="width:36px;height:36px;border-radius:10px;object-fit:cover;margin-bottom:6px" alt=""/>`:s.iconEmoji?`<div style="font-size:28px;margin-bottom:6px">${esc(s.iconEmoji)}</div>`:''}<div class="dname">${esc(s.name)}</div><div class="ddesc">${esc(s.description||'')}</div><div class="dmeta"><strong>${s.memberCount}</strong> members</div></div>
  </div>`).join('');
}
function randColor(){const c=['#5b8df8','#a855f7','#23d18b','#ff6b35','#faa61a','#ec4899'];return c[Math.floor(Math.random()*c.length)];}
async function joinDiscover(sid){const a=servers.find(s=>s.id===sid);if(a){selectServer(sid);return;}const r=await fetch(`/api/servers/${sid}/join`,{method:'POST'});if(r.ok){const srv=await r.json();if(!servers.find(s=>s.id===srv.id))servers.push(srv);renderRail();selectServer(sid);toast('Joined!',srv.name,'ok');}}

        <div style="display:flex;align-items:center;gap:10px;margin-top:10px"><input type="color" class="clrpick" id="acc-color" value="${mySettings.theme_color||'#5b8df8'}" oninput="setAccent(this.value)"/><span style="font-size:12px;color:var(--t2)">Custom color</span></div></div></div>
      <div class="ssec"><h4>Background Theme</h4>

        <div style="display:flex;gap:10px;flex-wrap:wrap">

async function saveProfile(){
  const dn=$('s-dn')?.value.trim(),cs=$('s-cs')?.value.trim(),bio=$('s-bio')?.value.trim(),status=$('s-st')?.value,ae=$('av-em')?.value.trim(),ptc=$('pt-color')?.value;
  if(ptc){mySettings.profile_theme_color=ptc;mySettings.profile_theme_gradient=`linear-gradient(135deg,${ptc},#a855f7)`;await fetch('/api/users/me/settings',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(mySettings)});}
  await fetch('/api/users/me',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({displayName:dn,customStatus:cs,bio,status,avatarEmoji:ae})});
  me={...me,displayName:dn,customStatus:cs,bio,status,avatarEmoji:ae};updateUP();toast('Saved!','Profile updated','ok');
}
async function uploadPFP(inp){const f=inp.files[0];if(!f)return;const fd=new FormData();fd.append('image',f);const r=await fetch('/api/users/me/avatar',{method:'POST',body:fd});if(r.ok){const d=await r.json();me.avatar=d.url;updateUP();renderSContent();toast('Avatar updated!','','ok');}}
async function uploadBanner(inp){const f=inp.files[0];if(!f)return;const fd=new FormData();fd.append('image',f);const r=await fetch('/api/users/me/banner',{method:'POST',body:fd});if(r.ok){const d=await r.json();me.banner=d.url;renderSContent();toast('Banner updated!','','ok');}}
async function uploadThemeBG(inp){const f=inp.files[0];if(!f)return;const fd=new FormData();fd.append('image',f);const r=await fetch('/api/users/me/theme-bg',{method:'POST',body:fd});if(r.ok){const d=await r.json();mySettings.theme_bg=d.url;applyTheme();renderSContent();toast('Background set!','','ok');}}
async function clearBG(){mySettings.theme_bg=null;await fetch('/api/users/me/settings',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(mySettings)});applyTheme();renderSContent();}
function previewBGSetting(inp,type){if(type==='blur')mySettings.theme_bg_blur=parseInt(inp.value);else mySettings.theme_bg_dim=parseInt(inp.value);applyTheme();clearTimeout(previewBGSetting._t);previewBGSetting._t=setTimeout(()=>fetch('/api/users/me/settings',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(mySettings)}),600);}
async function uploadFont(inp){const f=inp.files[0];if(!f)return;const fd=new FormData();fd.append('font',f);fd.append('name',f.name.replace(/\.[^.]+$/,''));const r=await fetch('/api/users/me/font',{method:'POST',body:fd});if(r.ok){const d=await r.json();mySettings.custom_font_url=d.url;mySettings.custom_font_name=d.name;applyTheme();renderSContent();toast('Font applied!',d.name,'ok');}}
async function clearFont(){mySettings.custom_font_url=null;mySettings.custom_font_name=null;await fetch('/api/users/me/settings',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(mySettings)});applyTheme();renderSContent();}
function toggleLightMode(el){el.classList.toggle('on');mySettings.theme_mode=el.classList.contains('on')?'light':'dark';applyTheme();fetch('/api/users/me/settings',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(mySettings)});}
function setAccent(color){mySettings.theme_color=color;applyTheme();renderSContent();clearTimeout(setAccent._t);setAccent._t=setTimeout(()=>fetch('/api/users/me/settings',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(mySettings)}),600);}
function toggleNotif(el){el.classList.toggle('on');mySettings.notifications=el.classList.contains('on')?1:0;fetch('/api/users/me/settings',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(mySettings)});}
function previewPT(){const c=$('pt-color')?.value;if(!c)return;mySettings.profile_theme_color=c;}
async function banUser(){const un=$('ban-un')?.value.trim(),hrs=parseInt($('ban-hrs')?.value)||null,reason=$('ban-reason')?.value.trim();if(!un)return;const r=await fetch('/api/admin/ban',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:un,reason,durationHours:hrs})});const d=await r.json();if(r.ok)toast('Banned',`${un} has been banned`,'ok');else toast('Error',d.error,'err');}
async function unbanUser(){const un=$('unban-un')?.value.trim();if(!un)return;const r=await fetch('/api/admin/unban',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:un})});const d=await r.json();if(r.ok)toast('Unbanned',un,'ok');else toast('Error',d.error,'err');}
async function loadBans(){const r=await fetch('/api/admin/bans');const bans=await r.json();const el=$('bans-list');if(!el)return;el.innerHTML=bans.length?`<table class="abtable" style="margin-top:8px"><thead><tr><th>User</th><th>Reason</th><th>By</th><th>Expires</th></tr></thead><tbody>${bans.map(b=>`<tr><td>${esc(b.username)}</td><td>${esc(b.reason||'—')}</td><td>${esc(b.banned_by)}</td><td>${b.expires_at?new Date(b.expires_at*1000).toLocaleString():'Permanent'}</td></tr>`).join('')}</tbody></table>`:'<div style="color:var(--t2);font-size:13px">No active bans.</div>';}

// ── Modals ───────────────────────────────────────────────────────────
function openModal(type,data={}){
  if(type==='settings'){openSettings();return;}
  const c=$('modals');const wrap=h=>`<div class="mbg" onclick="if(event.target===this)closeModal()">${h}</div>`;
  if(type==='new-srv'){
    c.innerHTML=wrap(`<div class="modal"><h2>Create Server</h2><div class="sub">Start your community.</div>
      <div class="mfld"><label>Server Name</label><input id="ms-n" placeholder="My Awesome Server"/></div>
      <div class="mfld"><label>Icon Emoji</label><input id="ms-i" placeholder="🌐" maxlength="4"/></div>
      <div class="mfld"><label>Description</label><textarea id="ms-d" placeholder="What's this server about?"></textarea></div>
      <div class="mfld"><label>Visibility</label><select id="ms-p"><option value="true">Public</option><option value="false">Private</option></select></div>
      <div class="macts2"><button class="btn btn-g" onclick="closeModal()">Cancel</button><button class="btn btn-acc" onclick="createSrv()">Create</button></div>
    </div>`);
  } else if(type==='new-ch'){
    c.innerHTML=wrap(`<div class="modal"><h2>New ${data.type==='voice'?'Voice':'Text'} Channel</h2>
      <div class="mfld"><label>Channel Name</label><input id="ch-n" placeholder="${data.type==='voice'?'General Voice':'new-channel'}"/></div>
      <div class="macts2"><button class="btn btn-g" onclick="closeModal()">Cancel</button><button class="btn btn-acc" onclick="createCh('${data.sid}','${data.type}')">Create</button></div>
    </div>`);
  } else if(type==='edit-ch'){
    const ch=findCh(data.chId);
    c.innerHTML=wrap(`<div class="modal"><h2>Edit Channel</h2>
      <div class="mfld"><label>Name</label><input id="ech-n" value="${esc(ch?.name||'')}"/></div>
      <div class="mfld"><label>Topic</label><input id="ech-t" value="${esc(ch?.topic||'')}"/></div>
      <div class="macts2"><button class="btn btn-g" onclick="closeModal()">Cancel</button><button class="btn btn-d btn-sm" onclick="deleteCh('${data.chId}')">Delete Channel</button><button class="btn btn-acc" onclick="saveCh('${data.chId}')">Save</button></div>
    </div>`);
  } else if(type==='srv-settings'){
    const srv=findSrv(activeSrvId);
    c.innerHTML=wrap(`<div class="modal"><h2>Server Settings</h2>
      <div class="mfld"><label>Name</label><input id="ss-n" value="${esc(srv?.name||'')}"/></div>
      <div class="mfld"><label>Icon Emoji</label><input id="ss-ie" value="${esc(srv?.iconEmoji||'🌐')}" maxlength="4"/></div>
      <div class="mfld"><label>Server Icon Image / GIF</label><div class="uparea" onclick="$('ssi-inp').click()">${srv?.icon?`<img src="${esc(srv.icon)}" style="max-height:80px;border-radius:8px"/>`:'Click to upload icon (GIF supported)'}</div><input type="file" id="ssi-inp" accept="image/*" style="display:none" onchange="uploadSrvIcon(this)"/></div>
      <div class="mfld"><label>Server Banner / GIF</label><div class="uparea" onclick="$('ssb-inp').click()">${srv?.banner?`<img src="${esc(srv.banner)}" style="max-height:80px;border-radius:8px"/>`:' Click to upload banner'}</div><input type="file" id="ssb-inp" accept="image/*" style="display:none" onchange="uploadSrvBanner(this)"/></div>
      <div class="mfld"><label>Description</label><textarea id="ss-d">${esc(srv?.description||'')}</textarea></div>
      <div class="mfld"><label>Visibility</label><select id="ss-p"><option value="true"${srv?.isPublic?' selected':''}>Public</option><option value="false"${!srv?.isPublic?' selected':''}>Private</option></select></div>
      <div class="macts2"><button class="btn btn-g" onclick="closeModal()">Cancel</button><button class="btn btn-acc" onclick="saveSrvSett()">Save</button></div>
    </div>`);
  } else if(type==='invite'){
    const link=`${location.origin}/invite/${activeSrvId}`;
    c.innerHTML=wrap(`<div class="modal"><h2>Invite People</h2><div class="sub">Share this link.</div>
      <div style="background:var(--bg3);border-radius:9px;padding:11px 14px;font-size:13px;font-family:monospace;word-break:break-all;color:var(--t1);margin-bottom:14px">${esc(link)}</div>
      <div class="macts2"><button class="btn btn-g" onclick="closeModal()">Close</button><button class="btn btn-acc" onclick="copyInvite()">Copy Link</button></div>
    </div>`);
  }
}
function closeModal(){$('modals').innerHTML='';}
async function createSrv(){const name=$('ms-n').value.trim(),icon=$('ms-i').value.trim(),desc=$('ms-d').value.trim(),pub=$('ms-p').value==='true';if(!name)return;const r=await fetch('/api/servers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,iconEmoji:icon||'🌐',description:desc,isPublic:pub})});if(r.ok){const srv=await r.json();if(!servers.find(s=>s.id===srv.id))servers.push(srv);closeModal();renderRail();selectServer(srv.id);toast('Server Created!',name,'ok');}}
async function createCh(sid,type){const name=$('ch-n').value.trim().toLowerCase().replace(/\s+/g,'-');if(!name)return;await fetch(`/api/servers/${sid}/channels`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,type})});closeModal();}
async function saveCh(chId){const name=$('ech-n').value.trim(),topic=$('ech-t').value.trim();await fetch(`/api/channels/${chId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,topic})});servers.forEach(s=>s.channels.forEach(c=>{if(c.id===chId){c.name=name;c.topic=topic;}}));closeModal();renderSidebar();if(activeChId===chId)selectChannel(chId);}
async function deleteCh(chId){if(!confirm('Delete this channel?'))return;await fetch(`/api/channels/${chId}`,{method:'DELETE'});closeModal();}
async function saveSrvSett(){const name=$('ss-n').value.trim(),ie=$('ss-ie').value.trim(),desc=$('ss-d').value.trim(),pub=$('ss-p').value==='true';const r=await fetch(`/api/servers/${activeSrvId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,iconEmoji:ie||'🌐',description:desc,isPublic:pub})});if(r.ok){const srv=await r.json();const i=servers.findIndex(s=>s.id===activeSrvId);if(i>-1)servers[i]={...servers[i],...srv};renderRail();renderSidebar();closeModal();toast('Updated!','','ok');}}
async function uploadSrvIcon(inp){const f=inp.files[0];if(!f)return;const fd=new FormData();fd.append('image',f);await fetch(`/api/servers/${activeSrvId}/icon`,{method:'POST',body:fd});toast('Icon updated!','','ok');}
async function uploadSrvBanner(inp){const f=inp.files[0];if(!f)return;const fd=new FormData();fd.append('image',f);await fetch(`/api/servers/${activeSrvId}/banner`,{method:'POST',body:fd});toast('Banner updated!','','ok');}
function copyInvite(){const l=`${location.origin}/invite/${activeSrvId}`;navigator.clipboard.writeText(l).then(()=>toast('Copied!','','ok')).catch(()=>prompt('Link:',l));}

// ── Server menu ──────────────────────────────────────────────────────
function openSrvMenu(){showCtx(84,52,[{icon:'📋',label:'Copy Invite Link',fn:copyInvite},{icon:'👥',label:'Invite People',fn:()=>openModal('invite')},{sep:true},{icon:'⚙️',label:'Server Settings',fn:()=>openModal('srv-settings')},{sep:true},{icon:'🚪',label:'Leave Server',d:true,fn:()=>{if(confirm('Leave server?'))fetch(`/api/servers/${activeSrvId}/leave`,{method:'DELETE'}).then(()=>{servers=servers.filter(s=>s.id!==activeSrvId);renderRail();if(servers.length)selectServer(servers[0].id);else showWelcome();});}}]);}
function srvCtx(e,sid){e.preventDefault();showCtx(e.clientX,e.clientY,[{icon:'📋',label:'Copy Invite',fn:()=>{activeSrvId=sid;copyInvite();}},{icon:'⚙️',label:'Settings',fn:()=>{activeSrvId=sid;openModal('srv-settings');}},{sep:true},{icon:'🚪',label:'Leave',d:true,fn:()=>{if(confirm('Leave?'))fetch(`/api/servers/${sid}/leave`,{method:'DELETE'}).then(()=>{servers=servers.filter(s=>s.id!==sid);renderRail();if(servers.length)selectServer(servers[0].id);else showWelcome();});}}]);}
function showCtx(x,y,items){const m=$('ctx');m.classList.remove('hidden');m.style.left=Math.min(x,window.innerWidth-200)+'px';m.style.top=Math.min(y,window.innerHeight-300)+'px';m.innerHTML=items.map((i,idx)=>i.sep?'<div class="ctxsep"></div>':`<div class="ctx-i${i.d?' d':''}" data-idx="${idx}">${i.icon} ${esc(i.label)}</div>`).join('');m.querySelectorAll('.ctx-i').forEach(el=>{const idx=parseInt(el.dataset.idx);el.onclick=()=>{m.classList.add('hidden');items[idx].fn();};});}

// ── Toast ─────────────────────────────────────────────────────────────
function toast(title,body='',type=''){
  if(!mySettings.notifications&&type!=='err'&&type!=='ok')return;
  const c=$('toasts'),d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML=`<div class="toast-t">${esc(title)}</div>${body?`<div class="toast-b">${esc(body)}</div>`:''}`;
  c.appendChild(d);setTimeout(()=>d.remove(),4000);
}

// ── Global events ─────────────────────────────────────────────────────
document.addEventListener('mousedown',e=>{
  if(!e.target.closest('.ctx'))$('ctx').classList.add('hidden');
  if(!e.target.closest('.pc')&&!e.target.closest('[onclick*="openProfile"]'))$('pc').classList.add('hidden');
  if(!e.target.closest('.ep')&&!e.target.closest('[onclick*="toggleEP"]'))$('ep').classList.add('hidden');
  if(!e.target.closest('.sov')&&!e.target.closest('[onclick*="toggleSearch"]'))$('sov').classList.add('hidden');
});

// Init load font from Google
$('font-style').textContent=`@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');:root{--font:'DM Sans',sans-serif;}`;
</script>
