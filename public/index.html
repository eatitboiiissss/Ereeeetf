<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Molecord</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔵</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0a0a0f;--bg1:#11111a;--bg2:#171722;--bg3:#1e1e2e;--bg4:#252538;
  --accent:#4f8ef7;--accent2:#3a7aec;--accent-dim:rgba(79,142,247,.15);
  --green:#2ecc71;--red:#e74c3c;--yellow:#f39c12;--purple:#9b59b6;
  --text0:#eeeef5;--text1:#a8a8c0;--text2:#5c5c7a;
  --border:rgba(255,255,255,.06);
  --voice-active:#2ecc71;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg0);color:var(--text0);overflow:hidden;height:100vh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(79,142,247,.4);border-radius:2px}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit}
input,textarea,select{font-family:'DM Sans',sans-serif}
a{color:var(--accent)}

/* ── AUTH ─────────────────────────────────────────────────────── */
#auth{display:flex;align-items:center;justify-content:center;height:100vh;background:radial-gradient(ellipse at 50% 30%,rgba(79,142,247,.12) 0%,transparent 70%)}
.auth-box{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:44px;width:420px;box-shadow:0 40px 80px rgba(0,0,0,.8)}
.auth-logo{text-align:center;margin-bottom:6px}
.auth-logo span{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;letter-spacing:-1px}
.auth-logo span em{color:var(--accent);font-style:normal}
.auth-sub{text-align:center;color:var(--text2);font-size:14px;margin-bottom:28px}
.auth-tabs{display:flex;gap:4px;background:var(--bg3);border-radius:12px;padding:4px;margin-bottom:24px}
.auth-tab{flex:1;padding:9px;border-radius:9px;font-size:14px;font-weight:600;transition:all .2s;color:var(--text2)}
.auth-tab.active{background:var(--accent);color:white}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:8px}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text0);font-size:14px;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--accent)}
.btn-auth{width:100%;padding:13px;border-radius:10px;font-size:15px;font-weight:700;background:var(--accent);color:white;cursor:pointer;border:none;font-family:inherit;transition:all .2s;margin-top:6px}
.btn-auth:hover{background:var(--accent2);transform:translateY(-1px)}
.auth-err{background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:14px;display:none}

/* ── APP LAYOUT ────────────────────────────────────────────────── */
#app{display:none;height:100vh;width:100%}
.layout{display:flex;height:100vh;overflow:hidden}

/* ── SERVER RAIL ───────────────────────────────────────────────── */
.rail{width:68px;background:var(--bg0);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px;overflow-y:auto;flex-shrink:0;border-right:1px solid var(--border)}
.rail-icon{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all .25s;position:relative;background:var(--bg2);flex-shrink:0}
.rail-icon:hover,.rail-icon.active{border-radius:14px;background:var(--accent)}
.rail-icon.active::before{content:'';position:absolute;left:-13px;width:4px;height:28px;background:var(--text0);border-radius:0 3px 3px 0}
.rail-div{width:28px;height:1px;background:var(--border);margin:4px 0}
.rail-add{color:var(--green);font-size:26px;font-weight:900}

/* ── SIDEBAR ───────────────────────────────────────────────────── */
.sidebar{width:232px;background:var(--bg1);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid var(--border)}
.sb-head{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-head h2{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-body{flex:1;overflow-y:auto;padding:8px 0}
.cat-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 8px 4px 12px;cursor:pointer;user-select:none}
.cat-hdr span{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);transition:color .15s}
.cat-hdr:hover span{color:var(--text0)}
.cat-add{color:var(--text2);font-size:18px;padding:0 4px;transition:color .15s}
.cat-add:hover{color:var(--text0)}
.ch-row{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:8px;cursor:pointer;transition:background .15s;margin:1px 6px;position:relative}
.ch-row:hover{background:var(--bg3)}
.ch-row.active{background:var(--bg4)}
.ch-row .ci{font-size:14px;color:var(--text2);width:18px;text-align:center;flex-shrink:0;font-weight:700}
.ch-row .cn{font-size:13px;font-weight:500;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ch-row.active .cn,.ch-row:hover .cn{color:var(--text0)}
.ch-row:hover .ch-acts{display:flex}
.ch-acts{display:none;gap:2px;margin-left:auto}
.ch-acts button{color:var(--text2);padding:2px 4px;border-radius:4px;font-size:11px}
.ch-acts button:hover{color:var(--text0);background:var(--bg4)}
/* voice participants under channel */
.vc-participants{padding:2px 8px 4px 32px}
.vc-participant{display:flex;align-items:center;gap:6px;padding:2px 4px;border-radius:6px;font-size:12px;color:var(--text1)}
.vc-participant .vp-av{font-size:14px}
.vc-participant .vp-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vc-participant .vp-icons{display:flex;gap:2px;font-size:10px}

/* ── USER PANEL ────────────────────────────────────────────────── */
.up{padding:8px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.up-ava{position:relative;cursor:pointer}
.ava{border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg3);flex-shrink:0}
.ava.s32{width:32px;height:32px;font-size:18px}
.ava.s40{width:40px;height:40px;font-size:22px}
.ava.s48{width:48px;height:48px;font-size:26px}
.sdot{position:absolute;bottom:-1px;right:-1px;width:11px;height:11px;border-radius:50%;border:2px solid var(--bg1)}
.up-info{flex:1;min-width:0}
.up-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.up-sub{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.up-acts{display:flex;gap:1px}
.up-acts button{color:var(--text2);padding:6px;border-radius:6px;font-size:15px;transition:all .15s}
.up-acts button:hover{background:var(--bg3);color:var(--text0)}
.up-acts button.on{color:var(--accent)}

/* ── MAIN ──────────────────────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg2)}

/* ── CHANNEL HEADER ────────────────────────────────────────────── */
.ch-hdr{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.ch-hdr .ci{font-size:18px;color:var(--text2);font-weight:700;min-width:20px}
.ch-hdr h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.ch-topic{font-size:12px;color:var(--text2);padding-left:10px;border-left:1px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:280px}
.ch-hdr-acts{margin-left:auto;display:flex;gap:2px}
.ch-hdr-acts button{color:var(--text2);padding:6px 8px;border-radius:6px;font-size:16px;transition:all .15s}
.ch-hdr-acts button:hover{background:var(--bg3);color:var(--text0)}
.ch-hdr-acts button.on{color:var(--accent)}

/* ── MESSAGES ──────────────────────────────────────────────────── */
.msgs{flex:1;overflow-y:auto;padding:8px 0}
.msgs-list{display:flex;flex-direction:column;padding:0 8px}
.mg{display:flex;gap:12px;padding:3px 8px;border-radius:8px;transition:background .1s;position:relative}
.mg:hover{background:rgba(0,0,0,.25)}
.mg:hover .macts{opacity:1;pointer-events:all}
.mg-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--bg3);flex-shrink:0;cursor:pointer;margin-top:2px}
.mg-body{flex:1;min-width:0}
.mg-hdr{display:flex;align-items:baseline;gap:8px;margin-bottom:1px}
.mg-author{font-size:14px;font-weight:700;cursor:pointer}
.mg-author:hover{text-decoration:underline}
.mg-ts{font-size:11px;color:var(--text2)}
.mg-text{font-size:14px;line-height:1.6;color:var(--text1);word-break:break-word;white-space:pre-wrap}
.mg-text.edited::after{content:' (edited)';font-size:11px;color:var(--text2)}
.reply-ref{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);margin-bottom:2px;cursor:pointer}
.reply-ref:hover{color:var(--text0)}
.rr-author{color:var(--accent);font-weight:600}
.rr-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:240px}
.rxns{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.rxn{display:flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:2px 8px;cursor:pointer;font-size:13px;transition:all .15s}
.rxn:hover{border-color:var(--accent)}
.rxn.mine{background:var(--accent-dim);border-color:var(--accent)}
.rxn-n{font-size:12px;font-weight:600;color:var(--text1)}
.macts{opacity:0;pointer-events:none;position:absolute;right:8px;top:-18px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:4px;display:flex;gap:1px;z-index:20;box-shadow:0 4px 20px rgba(0,0,0,.6);transition:opacity .1s}
.macts button{padding:4px 7px;border-radius:6px;font-size:13px;color:var(--text1);transition:all .15s}
.macts button:hover{background:var(--bg4);color:var(--text0)}
.macts button.danger:hover{background:var(--red);color:white}
.edit-inp{width:100%;background:var(--bg4);border:1px solid var(--accent);border-radius:8px;padding:7px 12px;color:var(--text0);font-size:14px;outline:none;margin-top:4px}
.edit-hint{font-size:11px;color:var(--text2);margin-top:3px}
.typing-bar{height:22px;padding:0 16px;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px}
.tdots span{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--text2);animation:tdot .8s infinite;margin-right:2px}
.tdots span:nth-child(2){animation-delay:.15s}.tdots span:nth-child(3){animation-delay:.3s}
@keyframes tdot{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-4px)}}

/* ── INPUT ─────────────────────────────────────────────────────── */
.inp-area{padding:0 14px 14px;flex-shrink:0}
.reply-bar{background:var(--bg3);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:7px 12px;margin-bottom:8px;font-size:13px;color:var(--text2);display:flex;align-items:center;justify-content:space-between}
.reply-bar strong{color:var(--accent)}
.inp-box{background:var(--bg3);border-radius:12px;display:flex;align-items:flex-end;gap:6px;padding:9px 12px;border:1px solid transparent;transition:border-color .2s}
.inp-box:focus-within{border-color:var(--accent)}
.inp-box button{color:var(--text2);padding:4px;border-radius:6px;font-size:19px;transition:all .15s;flex-shrink:0}
.inp-box button:hover{color:var(--text0);background:var(--bg4)}
.inp-box button.send{color:var(--accent)}
.msg-inp{flex:1;background:none;border:none;outline:none;color:var(--text0);font-size:14px;resize:none;max-height:140px;min-height:22px;line-height:1.5}
.msg-inp::placeholder{color:var(--text2)}

/* ── MEMBERS PANEL ─────────────────────────────────────────────── */
.mp{width:232px;background:var(--bg1);padding:0 8px;overflow-y:auto;flex-shrink:0;border-left:1px solid var(--border)}
.mp-sec{padding-top:16px;margin-bottom:8px}
.mp-sec h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);padding:0 8px;margin-bottom:8px}
.mr{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;cursor:pointer;transition:background .15s}
.mr:hover{background:var(--bg3)}
.mr-name{font-size:13px;font-weight:500;color:var(--text2)}
.mr:hover .mr-name{color:var(--text0)}
.mr-sub{font-size:11px;color:var(--text2)}

/* ── VOICE CHANNEL UI ──────────────────────────────────────────── */
/* Voice connected bar in sidebar */
.vc-bar{background:rgba(46,204,113,.08);border-top:1px solid rgba(46,204,113,.2);padding:8px 10px;flex-shrink:0}
.vc-bar-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.vc-status{font-size:12px;font-weight:700;color:var(--green)}
.vc-ch-name{font-size:11px;color:var(--text2)}
.vc-bar-acts{display:flex;gap:2px}
.vc-bar-acts button{color:var(--text2);padding:5px 6px;border-radius:6px;font-size:14px;transition:all .15s}
.vc-bar-acts button:hover{background:var(--bg3);color:var(--text0)}
.vc-bar-acts button.muted{color:var(--red)}
.vc-bar-acts button.active{color:var(--accent)}

/* Full voice room overlay */
.vc-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:500;display:flex;flex-direction:column;backdrop-filter:blur(8px)}
.vc-overlay-hdr{display:flex;align-items:center;padding:20px 28px;border-bottom:1px solid var(--border);gap:12px}
.vc-overlay-hdr h2{font-family:'Syne',sans-serif;font-size:18px;font-weight:800}
.vc-overlay-hdr .vc-ch-badge{background:var(--bg3);border-radius:8px;padding:4px 12px;font-size:13px;color:var(--text1)}
.vc-overlay-close{margin-left:auto;padding:8px 16px;border-radius:10px;background:var(--bg3);color:var(--text1);font-size:13px;font-weight:600}
.vc-overlay-close:hover{background:var(--bg4);color:var(--text0)}
.vc-grid{flex:1;display:flex;flex-wrap:wrap;gap:16px;padding:20px;align-content:flex-start;overflow-y:auto}
.vc-tile{background:var(--bg2);border-radius:16px;border:2px solid var(--border);position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:180px;transition:border-color .3s;flex:1;min-width:220px;max-width:380px}
.vc-tile.speaking{border-color:var(--green);box-shadow:0 0 20px rgba(46,204,113,.3)}
.vc-tile video,.vc-tile .screen-video{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:14px}
.vc-tile-info{position:absolute;bottom:12px;left:12px;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.7);border-radius:20px;padding:4px 12px 4px 6px;backdrop-filter:blur(4px)}
.vc-tile-info .ti-av{font-size:20px}
.vc-tile-info .ti-name{font-size:13px;font-weight:600}
.vc-tile-icons{position:absolute;top:10px;right:10px;display:flex;gap:4px}
.vc-tile-icons span{background:rgba(0,0,0,.7);border-radius:6px;padding:3px 5px;font-size:11px}
.vc-tile-av{font-size:64px;margin-bottom:8px}
.vc-tile-name{font-size:14px;font-weight:600;color:var(--text1)}
.vc-controls{display:flex;align-items:center;justify-content:center;gap:12px;padding:20px;border-top:1px solid var(--border)}
.vc-ctrl{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all .2s;border:none;background:var(--bg3);color:var(--text0)}
.vc-ctrl:hover{transform:scale(1.08);background:var(--bg4)}
.vc-ctrl.muted{background:var(--red)}
.vc-ctrl.active{background:var(--accent)}
.vc-ctrl.leave{background:var(--red);width:56px;height:56px;font-size:22px}
.vc-ctrl.leave:hover{background:#c0392b}
.vc-ctrl-label{font-size:11px;color:var(--text2);text-align:center;margin-top:4px}
.vc-ctrl-wrap{display:flex;flex-direction:column;align-items:center}

/* ── MODALS ─────────────────────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border-radius:20px;padding:28px;min-width:420px;max-width:500px;width:90%;border:1px solid var(--border);box-shadow:0 32px 80px rgba(0,0,0,.8)}
.modal h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:8px}
.modal p{color:var(--text1);font-size:14px;margin-bottom:20px}
.mf{margin-bottom:16px}
.mf label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:8px}
.mf input,.mf textarea,.mf select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text0);font-size:14px;outline:none;transition:border-color .2s}
.mf input:focus,.mf textarea:focus{border-color:var(--accent)}
.macts-row{display:flex;gap:10px;justify-content:flex-end;margin-top:4px}
.btn{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;border:none}
.btn-p{background:var(--accent);color:white}.btn-p:hover{background:var(--accent2)}
.btn-g{color:var(--text1)}.btn-g:hover{color:var(--text0);text-decoration:underline}
.btn-d{background:var(--red);color:white}.btn-d:hover{filter:brightness(1.1)}
.btn-sm{padding:7px 14px;font-size:13px}

/* ── CONTEXT MENU ───────────────────────────────────────────────── */
.ctx{position:fixed;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:6px;z-index:2000;min-width:176px;box-shadow:0 10px 40px rgba(0,0,0,.7)}
.ctx-i{padding:8px 12px;border-radius:7px;font-size:13px;cursor:pointer;color:var(--text1);display:flex;align-items:center;gap:8px;transition:all .1s}
.ctx-i:hover{background:var(--accent);color:white}
.ctx-i.d:hover{background:var(--red);color:white}
.ctx-sep{height:1px;background:var(--border);margin:4px 0}

/* ── EMOJI PICKER ───────────────────────────────────────────────── */
.epicker{position:absolute;bottom:68px;right:14px;background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:12px;display:flex;flex-wrap:wrap;gap:3px;width:226px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.ep-e{font-size:21px;padding:4px;border-radius:6px;cursor:pointer;transition:background .1s;background:none;border:none;line-height:1}
.ep-e:hover{background:var(--bg4)}

/* ── PINNED / SEARCH ────────────────────────────────────────────── */
.pin-panel{position:absolute;right:0;top:52px;width:300px;background:var(--bg2);border:1px solid var(--border);border-left:none;border-radius:0 0 0 14px;padding:16px;z-index:50;box-shadow:-8px 8px 28px rgba(0,0,0,.5);max-height:60vh;overflow-y:auto}
.pin-panel h3{font-size:13px;font-weight:700;margin-bottom:12px}
.pin-msg{background:var(--bg3);border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:13px;border-left:3px solid var(--accent)}
.pin-author{font-weight:700;color:var(--accent);font-size:11px;margin-bottom:3px}
.search-ov{position:fixed;top:68px;left:50%;transform:translateX(-50%);width:540px;max-width:95vw;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;z-index:1000;box-shadow:0 20px 56px rgba(0,0,0,.8)}
.s-wrap{display:flex;align-items:center;gap:10px;background:var(--bg3);border-radius:10px;padding:10px 14px;margin-bottom:12px}
.s-wrap input{flex:1;background:none;border:none;outline:none;color:var(--text0);font-size:14px;font-family:inherit}
.sr-item{padding:8px 12px;border-radius:8px;cursor:pointer;transition:background .1s}
.sr-item:hover{background:var(--bg3)}
.sr-ch{font-size:11px;color:var(--text2);margin-bottom:2px}
.sr-c{font-size:14px}
.sr-m{font-size:11px;color:var(--accent);font-weight:600;margin-top:2px}

/* ── PROFILE CARD ───────────────────────────────────────────────── */
.pc{position:fixed;background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:270px;z-index:2000;box-shadow:0 20px 56px rgba(0,0,0,.8);overflow:hidden}
.pc-banner{height:60px;background:linear-gradient(135deg,var(--accent),#7c3aed)}
.pc-body{padding:0 16px 16px}
.pc-av{margin-top:-26px;width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;background:var(--bg2);border:4px solid var(--bg2)}
.pc-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-top:8px}
.pc-un{font-size:12px;color:var(--text2);margin-bottom:4px}
.pc-st{font-size:12px;margin-bottom:12px}

/* ── DM ROW ─────────────────────────────────────────────────────── */
.dm-row{display:flex;align-items:center;gap:9px;padding:5px 8px;border-radius:8px;cursor:pointer;transition:background .15s;margin:1px 0}
.dm-row:hover{background:var(--bg3)}
.dm-row.active{background:var(--bg4)}
.dm-name{font-size:13px;font-weight:500;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dm-row.active .dm-name,.dm-row:hover .dm-name{color:var(--text0)}

/* ── TOAST ───────────────────────────────────────────────────────── */
.toasts{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:10px;padding:11px 15px;pointer-events:all;animation:tin .3s ease;box-shadow:0 8px 28px rgba(0,0,0,.6);max-width:300px}
.toast.err{border-left-color:var(--red)}
.toast.ok{border-left-color:var(--green)}
.toast-t{font-size:13px;font-weight:700;margin-bottom:3px}
.toast-b{font-size:12px;color:var(--text1)}
@keyframes tin{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── WELCOME ──────────────────────────────────────────────────────  */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;color:var(--text2);padding:40px}
.welcome h2{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--text0)}

/* status */
.s-online{color:var(--green)}.s-idle{color:var(--yellow)}.s-dnd{color:var(--red)}.s-offline{color:var(--text2)}
.sd-online{background:var(--green)}.sd-idle{background:var(--yellow)}.sd-dnd{background:var(--red)}.sd-offline{background:var(--text2)}
</style>
</head>
<body>

<!-- Auth -->
<div id="auth">
  <div class="auth-box">
    <div class="auth-logo"><span>Mole<em>cord</em></span></div>
    <div class="auth-sub">Real-time chat · Voice · Screenshare</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-li" onclick="switchTab('li')">Sign In</button>
      <button class="auth-tab" id="tab-reg" onclick="switchTab('reg')">Register</button>
    </div>
    <div id="auth-err" class="auth-err"></div>
    <div id="li-form">
      <div class="field"><label>Username</label><input id="li-u" type="text" placeholder="your_username" autocomplete="username"/></div>
      <div class="field"><label>Password</label><input id="li-p" type="password" placeholder="••••••••" autocomplete="current-password"/></div>
      <button class="btn-auth" onclick="login()">Sign In</button>
    </div>
    <div id="reg-form" style="display:none">
      <div class="field"><label>Username</label><input id="reg-u" type="text" placeholder="cool_username" autocomplete="username"/></div>
      <div class="field"><label>Display Name</label><input id="reg-d" type="text" placeholder="Your Name"/></div>
      <div class="field"><label>Password</label><input id="reg-p" type="password" placeholder="Min 6 characters" autocomplete="new-password"/></div>
      <button class="btn-auth" onclick="register()">Create Account</button>
    </div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="layout">
    <div class="rail" id="rail">
      <div class="rail-icon" id="dm-rail" onclick="showDMs()" title="Direct Messages">💬</div>
      <div class="rail-div"></div>
      <div id="srv-icons"></div>
      <div class="rail-div"></div>
      <div class="rail-icon rail-add" onclick="openModal('new-server')" title="Create Server">+</div>
    </div>
    <div class="sidebar" id="sidebar">
      <div class="sb-head"><h2 id="sb-title">Molecord</h2><button id="srv-menu-btn" onclick="openSrvMenu()" style="color:var(--text2);font-size:18px;padding:4px;border-radius:6px">⌄</button></div>
      <div class="sb-body" id="sb-body"></div>
      <div id="vc-bar"></div>
      <div class="up">
        <div class="up-ava" onclick="openProfile(event,me?.id)">
          <div class="ava s32" id="up-av">🧑</div>
          <div class="sdot sd-online" id="up-sdot"></div>
        </div>
        <div class="up-info">
          <div class="up-name" id="up-name">—</div>
          <div class="up-sub" id="up-sub">Online</div>
        </div>
        <div class="up-acts">
          <button id="btn-mute" onclick="toggleMute()" title="Mute">🎤</button>
          <button id="btn-deaf" onclick="toggleDeafen()" title="Deafen">🎧</button>
          <button onclick="openModal('settings')" title="Settings">⚙️</button>
          <button onclick="doLogout()" title="Sign out" style="font-size:13px">🚪</button>
        </div>
      </div>
    </div>
    <div class="main" id="main">
      <div class="welcome"><div style="font-size:72px">🔵</div><h2>Welcome to Molecord</h2><p>Select a channel to start chatting.</p></div>
    </div>
    <div class="mp" id="mp" style="display:none"></div>
  </div>
</div>

<!-- Voice overlay -->
<div id="vc-overlay" class="vc-overlay" style="display:none">
  <div class="vc-overlay-hdr">
    <h2>🔊 Voice</h2>
    <span class="vc-ch-badge" id="vc-overlay-chname">General</span>
    <button class="vc-overlay-close" onclick="minimizeVC()">Minimize ↓</button>
  </div>
  <div class="vc-grid" id="vc-grid"></div>
  <div class="vc-controls">
    <div class="vc-ctrl-wrap"><button class="vc-ctrl" id="vc-mic" onclick="toggleMute()">🎤</button><div class="vc-ctrl-label">Mic</div></div>
    <div class="vc-ctrl-wrap"><button class="vc-ctrl" id="vc-deaf" onclick="toggleDeafen()">🎧</button><div class="vc-ctrl-label">Deafen</div></div>
    <div class="vc-ctrl-wrap"><button class="vc-ctrl" id="vc-cam" onclick="toggleCamera()">📷</button><div class="vc-ctrl-label">Camera</div></div>
    <div class="vc-ctrl-wrap"><button class="vc-ctrl" id="vc-ss" onclick="toggleScreenshare()">🖥️</button><div class="vc-ctrl-label">Screen</div></div>
    <div class="vc-ctrl-wrap"><button class="vc-ctrl leave" onclick="leaveVoice()">📵</button><div class="vc-ctrl-label">Leave</div></div>
  </div>
</div>

<div id="modals"></div>
<div id="ctx" class="ctx" style="display:none"></div>
<div id="pc" class="pc" style="display:none"></div>
<div id="epicker" class="epicker" style="display:none"></div>
<div id="pin-panel" class="pin-panel" style="display:none"><h3>📌 Pinned Messages</h3><div id="pin-list"></div></div>
<div id="search-ov" class="search-ov" style="display:none">
  <div class="s-wrap"><span>🔍</span><input id="s-inp" placeholder="Search messages…" oninput="doSearch(this.value)"/><button onclick="closeSearch()" style="color:var(--text2)">✕</button></div>
  <div id="s-results"></div>
</div>
<div class="toasts" id="toasts"></div>

<script>
// ─── State ─────────────────────────────────────────────────────────────────
let me = null, ws = null;
let servers = [], allUsers = {}, friends = [];
let activeServerId = null, activeChannelId = null, activeDMUserId = null;
let view = 'server';
let messages = {}, dmMessages = {}, msgCache = {};
let showMp = true;
let muted = false, deafened = false, camOn = false, ssOn = false;

// Voice / WebRTC
let voiceChannelId = null, voiceServerId = null;
let localStream = null, screenStream = null;
let peerConns = {}; // userId -> RTCPeerConnection
let voiceParticipants = {}; // channelId -> [participant]

let typingTimers = {}, typingUsers = {};
let replyTo = null, emojiTarget = null;

const EMOJIS = ['👍','❤️','😂','😮','😢','🔥','🎉','👋','✅','💯','🚀','💀','😍','🤔','👀','🎵','💻','🐛','🎮','⭐','🙏','😎','🤣','🥳','😤','🫡','💪','🤖','🎯','🍕'];
const SC = {online:'#2ecc71',idle:'#f39c12',dnd:'#e74c3c',offline:'#5c5c7a'};
const SL = {online:'Online',idle:'Idle',dnd:'Do Not Disturb',offline:'Invisible'};
const SDC = {online:'sd-online',idle:'sd-idle',dnd:'sd-dnd',offline:'sd-offline'};
const ICE = [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }];

// ─── Utils ─────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtTime(ts){return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
function timeAgo(ts){const d=Date.now()-ts;if(d<60000)return'just now';if(d<3600000)return Math.floor(d/60000)+'m ago';return Math.floor(d/3600000)+'h ago'}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function toast(title,body='',type=''){
  const c=document.getElementById('toasts'),d=document.createElement('div');
  d.className='toast'+(type?' '+type:'');
  d.innerHTML=`<div class="toast-t">${esc(title)}</div>${body?`<div class="toast-b">${esc(body)}</div>`:''}`;
  c.appendChild(d);setTimeout(()=>d.remove(),4000);
}
function getUserById(id){
  const u=allUsers[id];if(u)return u;
  return{id,username:'unknown',displayName:'Unknown',avatar:'👤',status:'offline'};
}
function findChannel(cid){for(const s of servers)for(const c of s.channels)if(c.id===cid)return c;return null}
function findServer(sid){return servers.find(s=>s.id===sid)}

document.addEventListener('mousedown',e=>{
  if(!e.target.closest('.ctx'))document.getElementById('ctx').style.display='none';
  if(!e.target.closest('.pc')&&!e.target.closest('.mg-av')&&!e.target.closest('.mr')&&!e.target.closest('.dm-row'))document.getElementById('pc').style.display='none';
  if(!e.target.closest('.epicker')&&!e.target.closest('.ep-btn'))document.getElementById('epicker').style.display='none';
  if(!e.target.closest('.search-ov')&&!e.target.closest('.s-btn'))document.getElementById('search-ov').style.display='none';
  if(!e.target.closest('.pin-panel')&&!e.target.closest('.pin-btn'))document.getElementById('pin-panel').style.display='none';
});

// ─── Auth ─────────────────────────────────────────────────────────────────
function switchTab(t){
  document.getElementById('li-form').style.display=t==='li'?'block':'none';
  document.getElementById('reg-form').style.display=t==='reg'?'block':'none';
  document.getElementById('tab-li').className='auth-tab'+(t==='li'?' active':'');
  document.getElementById('tab-reg').className='auth-tab'+(t==='reg'?' active':'');
  document.getElementById('auth-err').style.display='none';
}
function showAuthErr(m){const e=document.getElementById('auth-err');e.textContent=m;e.style.display='block'}
async function login(){
  const u=document.getElementById('li-u').value.trim(),p=document.getElementById('li-p').value;
  if(!u||!p)return showAuthErr('Fill in all fields');
  const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
  const d=await r.json();if(!r.ok)return showAuthErr(d.error||'Login failed');
  me=d;await initApp();
}
async function register(){
  const u=document.getElementById('reg-u').value.trim(),dn=document.getElementById('reg-d').value.trim(),p=document.getElementById('reg-p').value;
  if(!u||!p)return showAuthErr('Fill in all fields');
  const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,displayName:dn,password:p})});
  const d=await r.json();if(!r.ok)return showAuthErr(d.error||'Registration failed');
  me=d;await initApp();
}
async function doLogout(){
  await fetch('/api/auth/logout',{method:'POST'});
  if(ws)ws.close();location.reload();
}
document.getElementById('li-p').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
document.getElementById('reg-p').addEventListener('keydown',e=>{if(e.key==='Enter')register()});

// ─── Init ─────────────────────────────────────────────────────────────────
async function initApp(){
  const mr=await fetch('/api/auth/me');if(!mr.ok){document.getElementById('auth').style.display='flex';return;}
  me=await mr.json();
  const ur=await fetch('/api/users');const ua=await ur.json();ua.forEach(u=>allUsers[u.id]=u);allUsers[me.id]=me;
  const sr=await fetch('/api/servers');servers=await sr.json();
  const fr=await fetch('/api/friends');friends=await fr.json();
  document.getElementById('auth').style.display='none';
  document.getElementById('app').style.display='block';
  updateUP();renderRail();
  if(servers.length>0)selectServer(servers[0].id);
  connectWS();
}
(async()=>{try{const r=await fetch('/api/auth/me');if(r.ok){me=await r.json();await initApp();}}catch{}})();

// ─── WebSocket ─────────────────────────────────────────────────────────────
function connectWS(){
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(`${proto}//${location.host}`);
  ws.onopen=()=>console.log('🔵 WS connected');
  ws.onmessage=e=>{try{handleWS(JSON.parse(e.data));}catch(err){console.error(err)}};
  ws.onclose=()=>setTimeout(connectWS,3000);
}
function wsSend(data){if(ws&&ws.readyState===1)ws.send(JSON.stringify(data));}

function handleWS(d){
  switch(d.type){
    case 'MESSAGE_CREATE':
      if(!messages[d.message.channelId])messages[d.message.channelId]=[];
      messages[d.message.channelId].push(d.message);msgCache[d.message.id]=d.message;
      if(d.message.channelId===activeChannelId&&view==='server'){appendMsg(d.message);scrollBottom();}
      else if(d.message.authorId!==me.id){const ch=findChannel(d.message.channelId);if(ch)toast(`#${ch.name}`,`${d.message.authorName}: ${d.message.content.slice(0,60)}`);}
      break;
    case 'MESSAGE_UPDATE':
      if(messages[d.channelId]){const i=messages[d.channelId].findIndex(m=>m.id===d.messageId);if(i>-1){messages[d.channelId][i].content=d.content;messages[d.channelId][i].edited=true;}}
      if(d.channelId===activeChannelId&&view==='server')renderMsgs();
      break;
    case 'MESSAGE_DELETE':
      if(messages[d.channelId])messages[d.channelId]=messages[d.channelId].filter(m=>m.id!==d.messageId);
      if(d.channelId===activeChannelId&&view==='server')renderMsgs();
      break;
    case 'MESSAGE_PIN':
      if(messages[d.channelId]){const i=messages[d.channelId].findIndex(m=>m.id===d.messageId);if(i>-1)messages[d.channelId][i].pinned=d.pinned;}
      if(d.channelId===activeChannelId&&view==='server')renderMsgs();
      break;
    case 'REACTION_UPDATE':
      Object.values(messages).forEach(arr=>{const i=arr.findIndex(m=>m.id===d.messageId);if(i>-1)arr[i].reactions=d.reactions;});
      renderRxns(d.messageId,d.reactions);
      break;
    case 'DM_CREATE':
      const dmk=d.fromUserId===me.id?d.toUserId:d.fromUserId;
      if(!dmMessages[dmk])dmMessages[dmk]=[];dmMessages[dmk].push(d.message);
      if(activeDMUserId===dmk&&view==='dm'){appendDMMsg(d.message);scrollBottom();}
      else if(d.fromUserId!==me.id){const u=allUsers[d.fromUserId];toast(`DM from ${u?.displayName||'Someone'}`,d.message.content.slice(0,60));}
      break;
    case 'USER_STATUS':
      if(allUsers[d.userId])allUsers[d.userId].status=d.status;
      if(d.userId===me.id){me.status=d.status;updateUP();}
      renderMP();renderSidebar();
      break;
    case 'USER_UPDATE':
      if(allUsers[d.user.id])Object.assign(allUsers[d.user.id],d.user);
      renderMP();
      break;
    case 'TYPING':
      if(d.channelId===activeChannelId&&d.userId!==me.id){
        if(!typingUsers[d.channelId])typingUsers[d.channelId]=new Set();
        typingUsers[d.channelId].add(d.displayName);
        clearTimeout(typingTimers[d.userId]);
        typingTimers[d.userId]=setTimeout(()=>{if(typingUsers[d.channelId])typingUsers[d.channelId].delete(d.displayName);renderTyping();},3000);
        renderTyping();
      }
      break;
    case 'CHANNEL_CREATE':
      const srv=servers.find(s=>s.id===d.serverId);if(srv){srv.channels.push(d.channel);renderSidebar();}
      break;
    case 'CHANNEL_DELETE':
      servers.forEach(s=>s.channels=s.channels.filter(c=>c.id!==d.channelId));
      if(activeChannelId===d.channelId){activeChannelId=null;showWelcome();}
      renderSidebar();
      break;
    case 'USER_JOIN':
      allUsers[d.user.id]=d.user;break;
    case 'FRIEND_ADD':
      friends.push({...d.from,friendStatus:'accepted'});toast('New Friend!',`${d.from.displayName} added you`,'ok');renderSidebar();break;
    // ── WebRTC / Voice ──
    case 'VOICE_JOIN':
      if(d.userId!==me.id)toast('Voice',`${getUserById(d.userId).displayName} joined`);
      break;
    case 'VOICE_LEAVE':
      closePeer(d.userId);
      if(d.userId!==me.id)toast('Voice',`${getUserById(d.userId).displayName} left`);
      break;
    case 'VOICE_ROOM_UPDATE':
      if(!voiceParticipants[d.channelId])voiceParticipants[d.channelId]=[];
      voiceParticipants[d.channelId]=d.participants;
      renderVCOverlay();renderVCBar();renderSidebar();
      break;
    case 'VOICE_STATE_UPDATE':
      const pts=voiceParticipants[d.channelId];
      if(pts){const pi=pts.findIndex(p=>p.userId===d.userId);if(pi>-1)Object.assign(pts[pi],{muted:d.muted,deafened:d.deafened,screensharing:d.screensharing,video:d.video});}
      renderVCOverlay();renderSidebar();
      break;
    case 'VOICE_INITIATE_OFFER':
      // Server says: create offer to targetUserId
      createOffer(d.targetUserId);
      break;
    case 'VOICE_USER_JOINED':
      // A new user joined our channel — we'll get VOICE_INITIATE_OFFER to send them an offer
      break;
    // ── WebRTC signaling ──
    case 'RTC_OFFER':
      handleOffer(d.fromUserId, d.sdp);break;
    case 'RTC_ANSWER':
      handleAnswer(d.fromUserId, d.sdp);break;
    case 'RTC_ICE':
      handleIce(d.fromUserId, d.candidate);break;
  }
}

// ─── Rail & Sidebar ────────────────────────────────────────────────────────
function renderRail(){
  document.getElementById('srv-icons').innerHTML=servers.map(s=>`
    <div class="rail-icon ${activeServerId===s.id&&view==='server'?'active':''}" onclick="selectServer('${s.id}')" title="${esc(s.name)}" oncontextmenu="srvCtx(event,'${s.id}')">${esc(s.icon||s.name[0])}</div>
  `).join('');
  document.getElementById('dm-rail').className='rail-icon'+(view==='dm'||view==='friends'?' active':'');
}

function renderSidebar(){
  if(view==='dm'||view==='friends'){
    document.getElementById('sb-title').textContent='Direct Messages';
    document.getElementById('srv-menu-btn').style.display='none';
    document.getElementById('sb-body').innerHTML=`
      <div style="padding:8px">
        <button class="btn btn-p btn-sm" style="width:100%;margin-bottom:12px" onclick="openModal('add-friend')">Add Friend</button>
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);padding:4px 8px 8px">Friends</div>
        ${friends.map(f=>`
          <div class="dm-row ${activeDMUserId===f.id&&view==='dm'?'active':''}" onclick="openDM('${f.id}')">
            <div style="position:relative">
              <div class="ava s32">${esc(f.avatar||'👤')}</div>
              <div class="sdot ${SDC[f.status||'offline']}"></div>
            </div>
            <span class="dm-name">${esc(f.displayName)}</span>
          </div>
        `).join('')}
        ${!friends.length?'<div style="color:var(--text2);font-size:13px;padding:8px">No friends yet!</div>':''}
      </div>`;
    return;
  }
  const srv=findServer(activeServerId);if(!srv)return;
  document.getElementById('sb-title').textContent=srv.name;
  document.getElementById('srv-menu-btn').style.display='block';
  const textChs=srv.channels.filter(c=>c.type==='text');
  const voiceChs=srv.channels.filter(c=>c.type==='voice');
  document.getElementById('sb-body').innerHTML=`
    <div class="cat-hdr" onclick="toggleCat('tc')"><span>▾ Text Channels</span><button class="cat-add" onclick="event.stopPropagation();openModal('new-channel',{type:'text'})">+</button></div>
    <div id="cat-tc">
      ${textChs.map(ch=>`
        <div class="ch-row ${activeChannelId===ch.id&&view==='server'?'active':''}" id="chr-${ch.id}" onclick="selectChannel('${ch.id}')" oncontextmenu="chCtx(event,'${ch.id}')">
          <span class="ci">#</span>
          <span class="cn">${esc(ch.name)}</span>
          <div class="ch-acts"><button onclick="event.stopPropagation();openModal('ch-settings',{chId:'${ch.id}'})">⚙</button></div>
        </div>
      `).join('')}
    </div>
    <div class="cat-hdr" onclick="toggleCat('vc')" style="margin-top:8px"><span>▾ Voice Channels</span><button class="cat-add" onclick="event.stopPropagation();openModal('new-channel',{type:'voice'})">+</button></div>
    <div id="cat-vc">
      ${voiceChs.map(ch=>{
        const pts=(voiceParticipants[ch.id]||[]);
        return`
          <div class="ch-row ${voiceChannelId===ch.id?'active':''}" onclick="joinVoice('${ch.id}','${srv.id}')">
            <span class="ci" style="font-size:12px">🔊</span>
            <span class="cn">${esc(ch.name)}</span>
            ${voiceChannelId===ch.id?'<span style="font-size:10px;color:var(--green)">●</span>':''}
          </div>
          ${pts.length?`<div class="vc-participants">${pts.map(p=>`
            <div class="vc-participant">
              <span class="vp-av">${esc(p.avatar||'👤')}</span>
              <span class="vp-name">${esc(p.displayName)}</span>
              <span class="vp-icons">
                ${p.muted?'🔇':''}
                ${p.screensharing?'🖥️':''}
                ${p.video?'📷':''}
              </span>
            </div>`).join('')}</div>`:''}

// ─── Voice / WebRTC ─────────────────────────────────────────────────────────
async function joinVoice(channelId, serverId){
  if(voiceChannelId===channelId){openVCOverlay();return;}
  if(voiceChannelId){await leaveVoice(true);}

  // Request mic permission
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch(e) {
    toast('Mic Error','Could not access microphone. Please allow mic permission.','err');
    return;
  }
  voiceChannelId=channelId;voiceServerId=serverId;
  muted=false;deafened=false;
  localStream.getAudioTracks().forEach(t=>t.enabled=true);
  wsSend({type:'VOICE_JOIN',channelId,serverId});
  updateUP();renderVCBar();renderSidebar();
  openVCOverlay();
  toast('Voice','Joined voice channel','ok');
}

async function leaveVoice(silent=false){
  if(!voiceChannelId)return;
  wsSend({type:'VOICE_LEAVE',channelId:voiceChannelId,serverId:voiceServerId});
  // Close all peer connections
  Object.keys(peerConns).forEach(uid=>closePeer(uid));
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  if(screenStream){screenStream.getTracks().forEach(t=>t.stop());screenStream=null;}
  voiceChannelId=null;voiceServerId=null;
  ssOn=false;camOn=false;
  document.getElementById('vc-overlay').style.display='none';
  renderVCBar();renderSidebar();
  if(!silent)toast('Voice','Left voice channel');
}

function openVCOverlay(){
  const ch=findChannel(voiceChannelId);
  document.getElementById('vc-overlay-chname').textContent=ch?.name||'Voice';
  document.getElementById('vc-overlay').style.display='flex';
  renderVCOverlay();
  updateVCCtrls();
}
function minimizeVC(){document.getElementById('vc-overlay').style.display='none';}

function renderVCOverlay(){
  if(!voiceChannelId)return;
  const grid=document.getElementById('vc-grid');if(!grid)return;
  const pts=voiceParticipants[voiceChannelId]||[];
  // Always show ourselves
  const allTiles=[
    {userId:me.id,displayName:me.displayName,avatar:me.avatar,muted,deafened,screensharing:ssOn,video:camOn,isMe:true},
    ...pts.filter(p=>p.userId!==me.id)
  ];
  grid.innerHTML='';
  for(const p of allTiles){
    const tile=document.createElement('div');
    tile.className='vc-tile';tile.id='vct-'+p.userId;
    tile.innerHTML=`
      <div class="vc-tile-av">${esc(p.avatar||'👤')}</div>
      <div class="vc-tile-name">${esc(p.displayName)}${p.isMe?' (you)':''}</div>
      <div class="vc-tile-info">
        <span class="ti-av">${esc(p.avatar||'👤')}</span>
        <span class="ti-name">${esc(p.displayName)}${p.isMe?' (you)':''}</span>
      </div>
      <div class="vc-tile-icons">
        ${p.muted?'<span>🔇</span>':''}
        ${p.deafened?'<span>🔕</span>':''}
        ${p.screensharing?'<span>🖥️</span>':''}
        ${p.video?'<span>📷</span>':''}
      </div>`;
    // Attach remote stream video/audio if we have it
    if(!p.isMe){
      const pc=peerConns[p.userId];
      if(pc){
        const streams=pc.getReceivers().map(r=>r.track).filter(Boolean);
        if(streams.length){
          const remoteStream=new MediaStream(streams);
          // Audio (always)
          const audio=document.createElement('audio');audio.autoplay=true;audio.srcObject=remoteStream;
          audio.style.display='none';tile.appendChild(audio);
          // Video / screenshare
          const videoTracks=remoteStream.getVideoTracks();
          if(videoTracks.length){
            const vid=document.createElement('video');vid.autoplay=true;vid.playsInline=true;vid.muted=false;
            vid.srcObject=new MediaStream(videoTracks);
            vid.className='screen-video';tile.appendChild(vid);
          }
        }
      }
    } else {
      // Show local camera/screen if on
      if(camOn&&localStream){
        const vt=localStream.getVideoTracks();
        if(vt.length){
          const vid=document.createElement('video');vid.autoplay=true;vid.playsInline=true;vid.muted=true;
          vid.srcObject=new MediaStream(vt);
          vid.className='screen-video';tile.appendChild(vid);
        }
      }
      if(ssOn&&screenStream){
        const vid=document.createElement('video');vid.autoplay=true;vid.playsInline=true;vid.muted=true;
        vid.srcObject=screenStream;
        vid.className='screen-video';tile.appendChild(vid);
      }
    }
    grid.appendChild(tile);
  }
}

function updateVCCtrls(){
  const mic=document.getElementById('vc-mic');const deaf=document.getElementById('vc-deaf');
  const cam=document.getElementById('vc-cam');const ss=document.getElementById('vc-ss');
  if(mic)mic.className='vc-ctrl'+(muted?' muted':'');
  if(deaf)deaf.className='vc-ctrl'+(deafened?' muted':'');
  if(cam)cam.className='vc-ctrl'+(camOn?' active':'');
  if(ss)ss.className='vc-ctrl'+(ssOn?' active':'');
  if(mic)mic.textContent=muted?'🔇':'🎤';
  if(deaf)deaf.textContent=deafened?'🔕':'🎧';
}

function toggleMute(){
  muted=!muted;

  if(voiceChannelId)wsSend({type:'VOICE_STATE',channelId:voiceChannelId,serverId:voiceServerId,muted,deafened,screensharing:ssOn,video:camOn});
  updateUP();updateVCCtrls();renderVCBar();
}
function toggleDeafen(){
  deafened=!deafened;
  // Mute all remote audio
  document.querySelectorAll('#vc-grid audio').forEach(a=>a.muted=deafened);
  if(voiceChannelId)wsSend({type:'VOICE_STATE',channelId:voiceChannelId,serverId:voiceServerId,muted,deafened,screensharing:ssOn,video:camOn});
  updateUP();updateVCCtrls();renderVCBar();
}

async function toggleCamera(){
  if(camOn){
    // Stop camera tracks
    if(localStream){localStream.getVideoTracks().forEach(t=>{t.stop();localStream.removeTrack(t);});}
    camOn=false;
  } else {
    try{
      const vs=await navigator.mediaDevices.getUserMedia({video:true,audio:false});
      vs.getVideoTracks().forEach(t=>localStream.addTrack(t));
      camOn=true;
      // Add to existing peer connections
      for(const uid of Object.keys(peerConns)){
        const pc=peerConns[uid];
        vs.getVideoTracks().forEach(t=>pc.addTrack(t,localStream));
        const offer=await pc.createOffer();await pc.setLocalDescription(offer);
        wsSend({type:'RTC_OFFER',targetUserId:uid,sdp:offer});
      }
    }catch(e){toast('Camera Error','Could not access camera. Please allow permission.','err');return;}
  }
  if(voiceChannelId)wsSend({type:'VOICE_STATE',channelId:voiceChannelId,serverId:voiceServerId,muted,deafened,screensharing:ssOn,video:camOn});
  updateVCCtrls();renderVCOverlay();
}

async function toggleScreenshare(){
  if(ssOn){
    if(screenStream){screenStream.getTracks().forEach(t=>t.stop());screenStream=null;}
    ssOn=false;
  } else {
    try{
      screenStream=await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});
      ssOn=true;
      screenStream.getVideoTracks()[0].onended=()=>{ssOn=false;screenStream=null;
        if(voiceChannelId)wsSend({type:'VOICE_STATE',channelId:voiceChannelId,serverId:voiceServerId,muted,deafened,screensharing:false,video:camOn});
        updateVCCtrls();renderVCOverlay();
      };
      // Share screen with all peers
      for(const uid of Object.keys(peerConns)){
        const pc=peerConns[uid];
        screenStream.getTracks().forEach(t=>pc.addTrack(t,screenStream));
        const offer=await pc.createOffer();await pc.setLocalDescription(offer);
        wsSend({type:'RTC_OFFER',targetUserId:uid,sdp:offer});
      }
    }catch(e){if(e.name!=='NotAllowedError')toast('Screen Error','Could not share screen.','err');return;}
  }
  if(voiceChannelId)wsSend({type:'VOICE_STATE',channelId:voiceChannelId,serverId:voiceServerId,muted,deafened,screensharing:ssOn,video:camOn});
  updateVCCtrls();renderVCOverlay();
}

// ─── WebRTC Peer Connections ───────────────────────────────────────────────
function createPeer(targetUserId){
  if(peerConns[targetUserId])return peerConns[targetUserId];
  const pc=new RTCPeerConnection({iceServers:ICE});
  peerConns[targetUserId]=pc;
  // Add local tracks
  if(localStream)localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  if(screenStream)screenStream.getTracks().forEach(t=>pc.addTrack(t,screenStream));
  // ICE candidates
  pc.onicecandidate=e=>{if(e.candidate)wsSend({type:'RTC_ICE',targetUserId,candidate:e.candidate});};
  // Remote tracks → render
  pc.ontrack=e=>{renderVCOverlay();};
  pc.onconnectionstatechange=()=>{if(pc.connectionState==='failed'||pc.connectionState==='closed')closePeer(targetUserId);};
  return pc;
}

async function createOffer(targetUserId){
  const pc=createPeer(targetUserId);
  const offer=await pc.createOffer();
  await pc.setLocalDescription(offer);
  wsSend({type:'RTC_OFFER',targetUserId,sdp:offer});
}

async function handleOffer(fromUserId,sdp){
  const pc=createPeer(fromUserId);
  await pc.setRemoteDescription(new RTCSessionDescription(sdp));
  const answer=await pc.createAnswer();
  await pc.setLocalDescription(answer);
  wsSend({type:'RTC_ANSWER',targetUserId:fromUserId,sdp:answer});
}

async function handleAnswer(fromUserId,sdp){
  const pc=peerConns[fromUserId];
  if(pc&&pc.signalingState!=='stable')await pc.setRemoteDescription(new RTCSessionDescription(sdp));
}

async function handleIce(fromUserId,candidate){
  const pc=peerConns[fromUserId];
  if(pc&&candidate){try{await pc.addIceCandidate(new RTCIceCandidate(candidate));}catch{}}
}

function closePeer(userId){
  const pc=peerConns[userId];if(pc){pc.close();}
  delete peerConns[userId];
  renderVCOverlay();
}

// ─── Voice bar in sidebar ─────────────────────────────────────────────────
function renderVCBar(){
  const c=document.getElementById('vc-bar');if(!c)return;
  if(!voiceChannelId){c.innerHTML='';return;}
  const ch=findChannel(voiceChannelId);
  c.innerHTML=`<div class="vc-bar">
    <div class="vc-bar-top">
      <div><div class="vc-status">🔊 Voice Connected</div><div class="vc-ch-name">${esc(ch?.name||'')}</div></div>
      <button onclick="openVCOverlay()" style="margin-left:auto;color:var(--text2);font-size:13px;padding:4px 8px;border-radius:6px">Open</button>
    </div>
    <div class="vc-bar-acts">
      <button class="${muted?'muted':''}" onclick="toggleMute()">${muted?'🔇':'🎤'}</button>
      <button class="${deafened?'muted':''}" onclick="toggleDeafen()">${deafened?'🔕':'🎧'}</button>
      <button class="${camOn?'active':''}" onclick="toggleCamera()">📷</button>
      <button class="${ssOn?'active':''}" onclick="toggleScreenshare()">🖥️</button>
      <button onclick="leaveVoice()" style="color:var(--red)">📵</button>
    </div>
  </div>`;
}

    <div class="pc-banner"></div>
    <div class="pc-body">
      <div class="pc-av">${esc(u.avatar||'👤')}</div>
      <div class="pc-name">${esc(u.displayName||u.username)}</div>
      <div class="pc-un">@${esc(u.username||'')}</div>
      <div class="pc-st" style="color:${SC[u.status||'offline']}">● ${SL[u.status||'offline']}</div>
      ${u.customStatus?`<div style="font-size:12px;color:var(--text1);margin-bottom:12px">"${esc(u.customStatus)}"</div>`:''}
      ${!isMe?`<div style="display:flex;gap:8px">
        <button class="btn btn-p btn-sm" style="flex:1" onclick="openDM('${userId}');document.getElementById('pc').style.display='none'">Message</button>
        ${!isFr?`<button class="btn btn-sm" style="background:var(--bg3)" onclick="addFriend('${u.username}')">Add Friend</button>`:''}
      </div>`:`<button class="btn btn-p btn-sm" style="width:100%" onclick="openModal('settings');document.getElementById('pc').style.display='none'">Edit Profile</button>`}

// ─── Emoji picker ─────────────────────────────────────────────────────────
function toggleEP(target){
  emojiTarget=target;const p=document.getElementById('epicker');
  p.style.display=p.style.display==='none'?'flex':'none';
  p.innerHTML=EMOJIS.map(e=>`<button class="ep-e" onclick="pickEmoji('${e}')">${e}</button>`).join('');
}
function pickEmoji(e){
  if(emojiTarget==='input'){const inp=document.getElementById('msg-inp')||document.getElementById('dm-inp');if(inp){inp.value+=e;inp.focus();}}
  else if(emojiTarget)doReact(emojiTarget,e);
  document.getElementById('epicker').style.display='none';
}

// ─── Search ───────────────────────────────────────────────────────────────
function toggleSearch(){const o=document.getElementById('search-ov');o.style.display=o.style.display==='none'?'block':'none';if(o.style.display!=='none')document.getElementById('s-inp').focus();}
function closeSearch(){document.getElementById('search-ov').style.display='none';}
function doSearch(q){
  const res=document.getElementById('s-results');if(q.length<2){res.innerHTML='';return;}
  const results=[];
  Object.entries(messages).forEach(([chId,msgs])=>{
    msgs.filter(m=>m.content.toLowerCase().includes(q.toLowerCase())).forEach(m=>{
      const ch=findChannel(chId);results.push({...m,channelId:chId,channelName:ch?.name||'?'});
    });
  });
  results.sort((a,b)=>b.timestamp-a.timestamp);
  res.innerHTML=results.slice(0,12).map(m=>`<div class="sr-item" onclick="jumpTo('${m.channelId}','${m.id}')"><div class="sr-ch">#${esc(m.channelName)}</div><div class="sr-c">${esc(m.content.slice(0,100))}</div><div class="sr-m">${esc(m.authorName||'?')} · ${timeAgo(m.timestamp)}</div></div>`).join('')
    ||(results.length===0?`<div style="color:var(--text2);font-size:13px;padding:8px 12px">No results for "${esc(q)}"</div>`:'');
}
async function jumpTo(chId,msgId){
  closeSearch();await selectChannel(chId);
  setTimeout(()=>{const el=document.getElementById('mg-'+msgId);if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.background='rgba(79,142,247,.2)';setTimeout(()=>el.style.background='',2000);}},300);
}

// ─── Pinned ────────────────────────────────────────────────────────────────
function togglePinned(){
  const p=document.getElementById('pin-panel');p.style.display=p.style.display==='none'?'block':'none';
  if(p.style.display!=='none'){
    const msgs=(messages[activeChannelId]||[]).filter(m=>m.pinned);
    document.getElementById('pin-list').innerHTML=msgs.length?msgs.map(m=>`<div class="pin-msg"><div class="pin-author">${esc(getUserById(m.authorId).displayName||'?')}</div><div>${esc(m.content)}</div></div>`).join(''):`<div style="color:var(--text2);font-size:13px">No pinned messages.</div>`;
  }
}

// ─── Context menus ─────────────────────────────────────────────────────────
function openSrvMenu(){
  const btn=document.getElementById('srv-menu-btn');const r=btn.getBoundingClientRect();
  showCtx(r.left,r.bottom+4,[
    {icon:'📋',label:'Copy Invite Link',fn:()=>copyInvite(activeServerId)},
    {icon:'👥',label:'Invite People',fn:()=>openModal('invite')},
    {sep:true},
    {icon:'🚪',label:'Leave Server',d:true,fn:()=>{if(confirm('Leave server?'))fetch(`/api/servers/${activeServerId}/leave`,{method:'DELETE'}).then(()=>{servers=servers.filter(s=>s.id!==activeServerId);renderRail();if(servers.length)selectServer(servers[0].id);else showWelcome();})}},
  ]);
}
function srvCtx(e,sid){e.preventDefault();showCtx(e.clientX,e.clientY,[{icon:'📋',label:'Copy Invite',fn:()=>copyInvite(sid)},{sep:true},{icon:'🚪',label:'Leave',d:true,fn:()=>{if(confirm('Leave?'))fetch(`/api/servers/${sid}/leave`,{method:'DELETE'});}}]);}
function chCtx(e,chId){e.preventDefault();showCtx(e.clientX,e.clientY,[{icon:'⚙',label:'Settings',fn:()=>openModal('ch-settings',{chId})},{sep:true},{icon:'🗑️',label:'Delete',d:true,fn:()=>{if(confirm('Delete?'))fetch(`/api/channels/${chId}`,{method:'DELETE'});}}]);}
function showCtx(x,y,items){
  const m=document.getElementById('ctx');m.style.display='block';
  m.style.left=Math.min(x,window.innerWidth-200)+'px';m.style.top=Math.min(y,window.innerHeight-300)+'px';
  m.innerHTML=items.map(i=>i.sep?`<div class="ctx-sep"></div>`:`<div class="ctx-i${i.d?' d':''}" id="ctx-${uid()}">${i.icon} ${esc(i.label)}</div>`).join('');
  // Attach click handlers after render
  const rendered=m.querySelectorAll('.ctx-i');let idx=0;
  items.filter(i=>!i.sep).forEach((item,ii)=>{rendered[ii].onclick=()=>{m.style.display='none';item.fn();}});
}
async function copyInvite(sid){
  const link=`${location.origin}/invite/${sid}`;
  try{await navigator.clipboard.writeText(link);toast('Copied!','Invite link copied','ok');}
  catch{prompt('Copy this link:',link);}
}

// ─── Modals ────────────────────────────────────────────────────────────────
function openModal(type,data={}){
  const c=document.getElementById('modals');
  const wrap=(inner)=>`<div class="modal-bg" onclick="if(event.target===this)closeModal()">${inner}</div>`;
  if(type==='new-server'){
    c.innerHTML=wrap(`<div class="modal"><h2>Create a Server</h2><p>Give your community a name and icon.</p>
      <div class="mf"><label>Server Name</label><input id="ms-n" placeholder="My Awesome Server"/></div>
      <div class="mf"><label>Icon (emoji)</label><input id="ms-i" placeholder="🌐" maxlength="4"/></div>
      <div class="macts-row"><button class="btn btn-g" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="createServer()">Create</button></div>
    </div>`);
  } else if(type==='new-channel'){
    c.innerHTML=wrap(`<div class="modal"><h2>Create Channel</h2>
      <div class="mf"><label>Name</label><input id="mc-n" placeholder="new-channel"/></div>
      <div class="macts-row"><button class="btn btn-g" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="createChannel('${data.type||'text'}')">Create</button></div>
    </div>`);
  } else if(type==='ch-settings'){
    const ch=findChannel(data.chId);
    c.innerHTML=wrap(`<div class="modal"><h2>Channel Settings</h2>
      <div class="mf"><label>Name</label><input id="cs-n" value="${esc(ch?.name||'')}"/></div>
      <div class="mf"><label>Topic</label><input id="cs-t" value="${esc(ch?.topic||'')}"/></div>
      <div class="macts-row"><button class="btn btn-g" onclick="closeModal()">Cancel</button><button class="btn btn-d btn-sm" onclick="deleteChannel('${data.chId}')">Delete</button><button class="btn btn-p" onclick="saveChSettings('${data.chId}')">Save</button></div>
    </div>`);
  } else if(type==='settings'){
    c.innerHTML=wrap(`<div class="modal"><h2>User Settings</h2>
      <div class="mf"><label>Display Name</label><input id="us-n" value="${esc(me.displayName||'')}"/></div>
      <div class="mf"><label>Avatar (emoji)</label><input id="us-a" value="${esc(me.avatar||'🧑')}" maxlength="4"/></div>
      <div class="mf"><label>Custom Status</label><input id="us-c" value="${esc(me.customStatus||'')}" placeholder="What's on your mind?"/></div>
      <div class="mf"><label>Status</label><select id="us-s">${['online','idle','dnd','offline'].map(s=>`<option value="${s}"${me.status===s?' selected':''}>${SL[s]}</option>`).join('')}</select></div>
      <div class="macts-row"><button class="btn btn-g" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="saveSettings()">Save</button></div>
    </div>`);
  } else if(type==='add-friend'){
    c.innerHTML=wrap(`<div class="modal"><h2>Add Friend</h2><p>Enter their exact username.</p>
      <div class="mf"><label>Username</label><input id="af-u" placeholder="username"/></div>
      <div id="af-err" style="color:var(--red);font-size:13px;margin-bottom:8px;display:none"></div>
      <div class="macts-row"><button class="btn btn-g" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="addFriendModal()">Add</button></div>
    </div>`);
  } else if(type==='invite'){
    const link=`${location.origin}/invite/${activeServerId}`;
    c.innerHTML=wrap(`<div class="modal"><h2>Invite People</h2><p>Share this link to invite others.</p>
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--text1);font-family:monospace;word-break:break-all;margin-bottom:16px">${esc(link)}</div>
      <div class="macts-row"><button class="btn btn-g" onclick="closeModal()">Close</button><button class="btn btn-p" onclick="copyInvite('${activeServerId}')">Copy Link</button></div>
    </div>`);
  }
}
function closeModal(){document.getElementById('modals').innerHTML='';}

async function createServer(){
  const name=document.getElementById('ms-n').value.trim(),icon=document.getElementById('ms-i').value.trim()||'🌐';
  if(!name)return;
  const r=await fetch('/api/servers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,icon})});
  const s=await r.json();servers.push(s);closeModal();selectServer(s.id);toast('Server Created!',name,'ok');
}
async function createChannel(type){
  const name=document.getElementById('mc-n').value.trim().toLowerCase().replace(/\s+/g,'-');
  if(!name)return;
  await fetch(`/api/servers/${activeServerId}/channels`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,type})});
  closeModal();
}
async function saveChSettings(chId){
  const name=document.getElementById('cs-n').value.trim(),topic=document.getElementById('cs-t').value.trim();
  await fetch(`/api/channels/${chId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,topic})});
  servers.forEach(s=>s.channels.forEach(c=>{if(c.id===chId){c.name=name;c.topic=topic;}}));
  closeModal();renderSidebar();if(activeChannelId===chId)selectChannel(chId);
}
async function deleteChannel(chId){if(!confirm('Delete?'))return;await fetch(`/api/channels/${chId}`,{method:'DELETE'});closeModal();}
async function saveSettings(){
  const dn=document.getElementById('us-n').value.trim(),av=document.getElementById('us-a').value.trim(),cs=document.getElementById('us-c').value.trim(),st=document.getElementById('us-s').value;
  await fetch('/api/users/me',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({displayName:dn,avatar:av,status:st,customStatus:cs})});
  Object.assign(me,{displayName:dn,avatar:av,status:st,customStatus:cs});allUsers[me.id]=me;
  closeModal();updateUP();toast('Profile saved!','','ok');
}
async function addFriendModal(){
  const un=document.getElementById('af-u').value.trim();
  const r=await fetch(`/api/friends/${encodeURIComponent(un)}`,{method:'POST'});
  if(!r.ok){const d=await r.json();document.getElementById('af-err').textContent=d.error||'Not found';document.getElementById('af-err').style.display='block';return;}
  closeModal();const fr=await fetch('/api/friends');friends=await fr.json();renderSidebar();toast('Friend added!',un,'ok');
}
async function addFriend(un){
  const r=await fetch(`/api/friends/${encodeURIComponent(un)}`,{method:'POST'});
  if(r.ok){const fr=await fetch('/api/friends');friends=await fr.json();toast('Friend added!','','ok');}
}

// ─── Invite page ────────────────────────────────────────────────────────────
if(location.pathname.startsWith('/invite/')){
  const sid=location.pathname.split('/invite/')[1];
  (async()=>{
    const r=await fetch('/api/auth/me');
    if(!r.ok){document.getElementById('auth').style.display='flex';window._postLogin=async()=>{await fetch(`/api/servers/${sid}/join`,{method:'POST'});location.href='/'};}
    else{await fetch(`/api/servers/${sid}/join`,{method:'POST'});location.href='/';}
  })();
}
