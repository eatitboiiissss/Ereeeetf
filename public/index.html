function pickEmoji(e){
  const ta=$('msg-ta')||$('dm-ta');if(ta){ta.value+=e;ta.focus();}
  $('ep').classList.add('hidden');
}

// ─── Pinned panel ──────────────────────────────────────────────
async function togglePinned(chId){
  const msgs=(messages[chId]||[]).filter(m=>m.pinned);
  const existing=document.getElementById('pinned-panel');
  if(existing){existing.remove();return;}
  const panel=document.createElement('div');panel.id='pinned-panel';
  panel.style.cssText='position:absolute;right:0;top:48px;width:300px;background:var(--bg2);border:1px solid var(--bdr2);border-top:none;border-right:none;border-radius:0 0 0 14px;padding:16px;z-index:50;box-shadow:-8px 8px 28px rgba(0,0,0,.6);max-height:60vh;overflow-y:auto';
  panel.innerHTML=`<div style="font-size:13px;font-weight:700;margin-bottom:12px">📌 Pinned Messages</div>${msgs.length?msgs.map(m=>`<div style="background:var(--bg3);border-radius:8px;padding:10px 12px;margin-bottom:8px;border-left:3px solid var(--acc)"><div style="font-size:10px;font-weight:700;color:var(--acc);margin-bottom:3px">${esc(m.authorName)}</div><div style="font-size:13px">${esc(m.content)}</div></div>`).join(''):'<div style="color:var(--t2);font-size:13px">No pinned messages.</div>'}`;
  $('main').style.position='relative';$('main').appendChild(panel);
  setTimeout(()=>document.addEventListener('mousedown',function h(e){if(!panel.contains(e.target)){panel.remove();document.removeEventListener('mousedown',h);}},{once:false}),100);
}

// ─── Search ────────────────────────────────────────────────────
function toggleSearch(){
  const ov=$('search-ov');ov.classList.toggle('hidden');
  if(!ov.classList.contains('hidden')){
    ov.innerHTML=`<div class="s-inp-row"><span>🔍</span><input placeholder="Search messages…" oninput="doSearch(this.value)" autofocus/><button onclick="$('search-ov').classList.add('hidden')" style="color:var(--t2)">✕</button></div><div id="s-results"></div>`;
    ov.querySelector('input').focus();
  }
}
function doSearch(q){
  const res=$('s-results');if(!res||q.length<2){if(res)res.innerHTML='';return;}
  const results=[];
  Object.entries(messages).forEach(([chId,msgs])=>msgs.filter(m=>m.content.toLowerCase().includes(q.toLowerCase())).forEach(m=>{const ch=findCh(chId);results.push({...m,chName:ch?.name||'?'});}));
  results.sort((a,b)=>b.timestamp-a.timestamp);
  res.innerHTML=results.slice(0,12).map(m=>`<div class="s-res-item" onclick="jumpTo('${m.channelId}','${m.id}')"><div class="s-res-ch">#${esc(m.chName)}</div><div class="s-res-c">${esc(m.content.slice(0,100))}</div><div class="s-res-m">${esc(m.authorName||'?')} · ${timeAgo(m.timestamp)}</div></div>`).join('')
    ||(results.length===0?`<div style="color:var(--t2);font-size:13px;padding:10px">No results</div>`:'');
}
async function jumpTo(chId,msgId){
  $('search-ov').classList.add('hidden');await selectChannel(chId);
  setTimeout(()=>{const el=document.getElementById('mg-'+msgId);if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.background='rgba(91,141,248,.2)';setTimeout(()=>el.style.background='',2000);}},400);
}

// ─── Discover ──────────────────────────────────────────────────
async function showDiscover(){
  view='discover';activeChId=null;activeDMId=null;renderRail();
  $('srv-banner').classList.add('hidden');$('sb-title').textContent='Discover';$('sb-menu-btn').style.display='none';
  $('sb-body').innerHTML='';$('mp').classList.add('hidden');
  $('main').innerHTML=`<div class="ch-hdr"><span style="font-size:18px">🧭</span><h3>Discover Servers</h3><span class="ch-topic">Find public servers to join</span></div><div class="disc-grid" id="disc-grid"><div style="color:var(--t2);padding:20px">Loading…</div></div>`;
  const r=await fetch('/api/servers/discover');const srvs=await r.json();
  $('disc-grid').innerHTML=srvs.map(s=>`
    <div class="disc-card" onclick="joinDiscover('${s.id}')">
      ${s.banner?`<img class="disc-banner" src="${esc(s.banner)}" alt=""/>`:`<div class="disc-banner" style="background:linear-gradient(135deg,${randomColor()},${randomColor()})"></div>`}
      <div class="disc-info">
        ${s.icon?`<img src="${esc(s.icon)}" style="width:36px;height:36px;border-radius:10px;object-fit:cover;margin-bottom:6px" alt=""/>`:`<div class="disc-icon">${esc(s.iconEmoji||'🌐')}</div>`}
        <div class="disc-name">${esc(s.name)}</div>
        ${s.description?`<div class="disc-desc">${esc(s.description)}</div>`:''}
        <div class="disc-meta"><strong>${s.memberCount}</strong> members</div>
      </div>
    </div>`).join('');
}
function randomColor(){const c=['#5b8df8','#a855f7','#23d18b','#ff6b35','#faa61a'];return c[Math.floor(Math.random()*c.length)];}
async function joinDiscover(sid){
  const already=servers.find(s=>s.id===sid);
  if(already){selectServer(sid);return;}
  const r=await fetch(`/api/servers/${sid}/join`,{method:'POST'});
  if(r.ok){const srv=await r.json();if(!servers.find(s=>s.id===srv.id))servers.push(srv);renderRail();selectServer(sid);toast('Joined!',srv.name,'ok');}
}

// ─── Settings ──────────────────────────────────────────────────
function openSettings(){openModal('settings');}
let settingsTab='profile';
function openSettingsModal(){
  closeModal();
  const m=document.createElement('div');m.className='modal-bg';m.id='settings-modal';
  m.onclick=e=>{if(e.target===m)closeModal();};
  m.innerHTML=`<div class="modal" style="min-width:660px;max-width:760px;padding:0;overflow:hidden;border-radius:18px;display:flex;flex-direction:row;height:82vh">
    <div class="settings-nav">
      <h3>User</h3>
      <div class="snav-i ${settingsTab==='profile'?'active':''}" onclick="setSTab('profile')">👤 Profile</div>
      <div class="snav-i ${settingsTab==='account'?'active':''}" onclick="setSTab('account')">🔐 Account</div>
      <div class="snav-i ${settingsTab==='appearance'?'active':''}" onclick="setSTab('appearance')">🎨 Appearance</div>
      <div class="snav-i ${settingsTab==='notifications'?'active':''}" onclick="setSTab('notifications')">🔔 Notifications</div>
    </div>
    <div class="settings-content" id="s-content"></div>
  </div>`;
  document.getElementById('modals').appendChild(m);
  renderSettingsContent();
}
function setSTab(tab){settingsTab=tab;renderSettingsContent();}
function renderSettingsContent(){
  const c=$('s-content');if(!c)return;
  if(settingsTab==='profile'){
    c.innerHTML=`<h2>Profile</h2><div class="sdesc">Customize how others see you.</div>
      <div class="s-section">
        <h4>Avatar</h4>
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px">
          <div class="av s80">${me.avatar?`<img src="${esc(me.avatar)}" alt=""/>`:esc(me.avatarEmoji||'🧑')}</div>
          <div>
            <button class="btn btn-p btn-sm" onclick="$('pfp-upload').click()">Upload Photo</button>
            <input type="file" id="pfp-upload" accept="image/*" style="display:none" onchange="uploadPFP(this)"/>
            <div style="margin-top:8px">
              <span style="font-size:11px;color:var(--t2)">Or choose emoji:</span>
              <input id="av-emoji" value="${esc(me.avatarEmoji||'🧑')}" style="width:60px;background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:6px 10px;color:var(--t0);font-size:20px;text-align:center;margin-left:8px"/>
            </div>
          </div>
        </div>
      </div>
      <div class="s-section">
        <h4>Profile Banner</h4>
        <div class="img-upload-area" onclick="$('banner-upload').click()">
          ${me.banner?`<img src="${esc(me.banner)}" class="img-preview show"/>`:'Click to upload a banner image'}
        </div>
        <input type="file" id="banner-upload" accept="image/*" style="display:none" onchange="uploadBanner(this)"/>
      </div>
      <div class="s-section">
        <h4>Info</h4>
        <div class="s-row"><div><div class="s-row-label">Display Name</div></div><input class="s-inp" id="s-dn" value="${esc(me.displayName||'')}"/></div>
        <div class="s-row"><div><div class="s-row-label">Custom Status</div></div><input class="s-inp" id="s-cs" value="${esc(me.customStatus||'')}" placeholder="What's up?"/></div>
        <div class="s-row"><div><div class="s-row-label">Bio</div></div><textarea class="s-inp" id="s-bio" style="height:70px;resize:vertical">${esc(me.bio||'')}</textarea></div>
        <div class="s-row"><div><div class="s-row-label">Status</div></div>
          <select class="s-inp" id="s-status" style="width:180px">${['online','idle','dnd','offline'].map(s=>`<option value="${s}"${me.status===s?' selected':''}>${SL[s]}</option>`).join('')}</select>
        </div>
      </div>
      <button class="btn btn-p" onclick="saveProfile()">Save Profile</button>`;
  } else if(settingsTab==='account'){
    c.innerHTML=`<h2>Account</h2><div class="sdesc">Manage your account credentials.</div>
      <div class="s-section">
        <h4>Details</h4>
        <div class="s-row"><div><div class="s-row-label">Username</div><div class="s-row-sub">@${esc(me.username)}</div></div></div>
        <div class="s-row"><div><div class="s-row-label">Email</div><div class="s-row-sub">${esc(me.email||'Not set')}</div></div></div>
      </div>
      <div style="margin-top:20px"><button class="btn btn-d" onclick="if(confirm('Log out?'))doLogout()">Log Out</button></div>`;
  } else if(settingsTab==='appearance'){
    c.innerHTML=`<h2>Appearance</h2><div class="sdesc">Customize your Molecord experience. Themes are private — only you see them.</div>
      <div class="s-section">
        <h4>Background Theme</h4>
        ${mySettings.theme_bg?`<img src="${esc(mySettings.theme_bg)}" style="width:100%;max-height:180px;object-fit:cover;border-radius:10px;margin-bottom:12px"/>`:''}
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-p btn-sm" onclick="$('theme-bg-upload').click()">Upload Background</button>
          ${mySettings.theme_bg?`<button class="btn btn-d btn-sm" onclick="clearThemeBG()">Remove Background</button>`:''}
        </div>
        <input type="file" id="theme-bg-upload" accept="image/*" style="display:none" onchange="uploadThemeBG(this)"/>
      </div>
      ${mySettings.theme_bg?`<div class="s-section">
        <h4>Background Options</h4>
        <div class="s-row"><div><div class="s-row-label">Blur</div></div><input type="range" class="range-inp" min="0" max="5" value="${mySettings.theme_bg_blur||0}" oninput="previewTheme(this,'blur')"/></div>
        <div class="s-row"><div><div class="s-row-label">Dim</div></div><input type="range" class="range-inp" min="0" max="80" value="${mySettings.theme_bg_dim||40}" oninput="previewTheme(this,'dim')"/></div>
      </div>`:''}`;
  } else if(settingsTab==='notifications'){
    c.innerHTML=`<h2>Notifications</h2><div class="sdesc">Control what alerts you receive.</div>
      <div class="s-section"><div class="s-row"><div><div class="s-row-label">Enable Notifications</div><div class="s-row-sub">Show toast notifications for new messages</div></div><div class="toggle ${mySettings.notifications!==0?'on':''}" onclick="toggleNotifs(this)"></div></div></div>`;
  }
}
async function saveProfile(){
  const dn=$('s-dn')?.value.trim(),cs=$('s-cs')?.value.trim(),bio=$('s-bio')?.value.trim(),status=$('s-status')?.value,emojiV=$('av-emoji')?.value.trim();
  await fetch('/api/users/me',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({displayName:dn,customStatus:cs,bio,status,avatarEmoji:emojiV})});
  me={...me,displayName:dn,customStatus:cs,bio,status,avatarEmoji:emojiV};updateUP();toast('Saved!','Profile updated','ok');
}
async function uploadPFP(input){
  const file=input.files[0];if(!file)return;const fd=new FormData();fd.append('image',file);
  const r=await fetch('/api/users/me/avatar',{method:'POST',body:fd});
  if(r.ok){const d=await r.json();me.avatar=d.url;updateUP();renderSettingsContent();toast('Avatar updated!','','ok');}
}
async function uploadBanner(input){
  const file=input.files[0];if(!file)return;const fd=new FormData();fd.append('image',file);
  const r=await fetch('/api/users/me/banner',{method:'POST',body:fd});
  if(r.ok){const d=await r.json();me.banner=d.url;renderSettingsContent();toast('Banner updated!','','ok');}
}
async function uploadThemeBG(input){
  const file=input.files[0];if(!file)return;const fd=new FormData();fd.append('image',file);
  const r=await fetch('/api/users/me/theme-bg',{method:'POST',body:fd});
  if(r.ok){const d=await r.json();mySettings.theme_bg=d.url;applyTheme();renderSettingsContent();toast('Theme set!','','ok');}
}
async function clearThemeBG(){
  await fetch('/api/users/me/settings',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({...mySettings,theme_bg:null})});
  mySettings.theme_bg=null;applyTheme();renderSettingsContent();
}
function previewTheme(inp,type){
  if(type==='blur'){mySettings.theme_bg_blur=parseInt(inp.value);}
  else{mySettings.theme_bg_dim=parseInt(inp.value);}
  applyTheme();
  clearTimeout(previewTheme._t);previewTheme._t=setTimeout(()=>fetch('/api/users/me/settings',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(mySettings)}),500);
}
function toggleNotifs(el){
  el.classList.toggle('on');mySettings.notifications=el.classList.contains('on')?1:0;
  fetch('/api/users/me/settings',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(mySettings)});
}

// ─── Modals ─────────────────────────────────────────────────────
function openModal(type,data={}){
  if(type==='settings'){openSettingsModal();return;}
  const c=$('modals');
  const wrap=inner=>`<div class="modal-bg" onclick="if(event.target===this)closeModal()">${inner}</div>`;

  if(type==='new-server'){
    c.innerHTML=wrap(`<div class="modal"><h2>Create a Server</h2><div class="sub">Start your community.</div>
      <div class="mfld"><label>Server Name</label><input id="ms-n" placeholder="My Awesome Server"/></div>
      <div class="mfld"><label>Icon Emoji</label><input id="ms-i" placeholder="🌐" maxlength="4"/></div>
      <div class="mfld"><label>Description</label><textarea id="ms-d" placeholder="What's this server about?"></textarea></div>
      <div class="mfld"><label>Visibility</label><select id="ms-p"><option value="true">Public (anyone can find it)</option><option value="false">Private (invite only)</option></select></div>
      <div class="modal-acts"><button class="btn btn-g" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="createServer()">Create Server</button></div>
    </div>`);
  } else if(type==='new-ch'){
    c.innerHTML=wrap(`<div class="modal"><h2>New ${data.type==='voice'?'Voice':'Text'} Channel</h2>
      <div class="mfld"><label>Channel Name</label><input id="ch-n" placeholder="${data.type==='voice'?'General Voice':'new-channel'}"/></div>
      <div class="modal-acts"><button class="btn btn-g" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="createChannel('${data.sid}','${data.type}')">Create</button></div>
    </div>`);
  } else if(type==='edit-ch'){
    const ch=findCh(data.chId);
    c.innerHTML=wrap(`<div class="modal"><h2>Edit Channel</h2>
      <div class="mfld"><label>Name</label><input id="ech-n" value="${esc(ch?.name||'')}"/></div>
      <div class="mfld"><label>Topic</label><input id="ech-t" value="${esc(ch?.topic||'')}"/></div>
      <div class="modal-acts"><button class="btn btn-g" onclick="closeModal()">Cancel</button><button class="btn btn-d btn-sm" onclick="deleteChannel('${data.chId}')">Delete</button><button class="btn btn-p" onclick="saveChannel('${data.chId}')">Save</button></div>
    </div>`);
  } else if(type==='srv-settings'){
    const srv=findSrv(activeSrvId);
    c.innerHTML=wrap(`<div class="modal"><h2>Server Settings</h2>
      <div class="mfld"><label>Server Name</label><input id="ss-n" value="${esc(srv?.name||'')}"/></div>
      <div class="mfld"><label>Icon Emoji</label><input id="ss-ie" value="${esc(srv?.iconEmoji||'🌐')}" maxlength="4"/></div>
      <div class="mfld"><label>Server Icon (Image)</label><div class="img-upload-area" onclick="$('ss-icon-u').click()">${srv?.icon?`<img src="${esc(srv.icon)}" class="img-preview show"/>`:'Click to upload icon image'}</div><input type="file" id="ss-icon-u" accept="image/*" style="display:none" onchange="uploadSrvIcon(this)"/></div>
      <div class="mfld"><label>Server Banner</label><div class="img-upload-area" onclick="$('ss-ban-u').click()">${srv?.banner?`<img src="${esc(srv.banner)}" class="img-preview show"/>`:'Click to upload banner image'}</div><input type="file" id="ss-ban-u" accept="image/*" style="display:none" onchange="uploadSrvBanner(this)"/></div>
      <div class="mfld"><label>Description</label><textarea id="ss-d">${esc(srv?.description||'')}</textarea></div>
      <div class="mfld"><label>Visibility</label><select id="ss-p"><option value="true"${srv?.isPublic?' selected':''}>Public</option><option value="false"${!srv?.isPublic?' selected':''}>Private</option></select></div>
      <div class="modal-acts"><button class="btn btn-g" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="saveSrvSettings()">Save</button></div>
    </div>`);
  } else if(type==='invite'){
    const link=`${location.origin}/invite/${activeSrvId}`;
    c.innerHTML=wrap(`<div class="modal"><h2>Invite People</h2><div class="sub">Share this link to invite friends.</div>
      <div style="background:var(--bg3);border-radius:9px;padding:12px 14px;font-size:13px;font-family:monospace;word-break:break-all;margin-bottom:16px;color:var(--t1)">${esc(link)}</div>
      <div class="modal-acts"><button class="btn btn-g" onclick="closeModal()">Close</button><button class="btn btn-p" onclick="copyInvite()">Copy Link</button></div>
    </div>`);
  }
}
function closeModal(){$('modals').innerHTML='';}
async function createServer(){
  const name=$('ms-n').value.trim(),icon=$('ms-i').value.trim(),desc=$('ms-d').value.trim(),pub=$('ms-p').value==='true';
  if(!name)return;
  const r=await fetch('/api/servers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,iconEmoji:icon||'🌐',description:desc,isPublic:pub})});
  if(r.ok){const srv=await r.json();if(!servers.find(s=>s.id===srv.id))servers.push(srv);closeModal();renderRail();selectServer(srv.id);toast('Server Created!',name,'ok');}
}
async function createChannel(sid,type){
  const name=$('ch-n').value.trim().toLowerCase().replace(/\s+/g,'-');if(!name)return;
  await fetch(`/api/servers/${sid}/channels`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,type})});
  closeModal();
}
async function saveChannel(chId){
  const name=$('ech-n').value.trim(),topic=$('ech-t').value.trim();
  await fetch(`/api/channels/${chId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,topic})});
  servers.forEach(s=>s.channels.forEach(c=>{if(c.id===chId){c.name=name;c.topic=topic;}}));
  closeModal();renderSidebar();if(activeChId===chId)selectChannel(chId);
}
async function deleteChannel(chId){if(!confirm('Delete this channel?'))return;await fetch(`/api/channels/${chId}`,{method:'DELETE'});closeModal();}
async function saveSrvSettings(){
  const name=$('ss-n').value.trim(),ie=$('ss-ie').value.trim(),desc=$('ss-d').value.trim(),pub=$('ss-p').value==='true';
  const r=await fetch(`/api/servers/${activeSrvId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,iconEmoji:ie||'🌐',description:desc,isPublic:pub})});
  if(r.ok){const srv=await r.json();const i=servers.findIndex(s=>s.id===activeSrvId);if(i>-1)servers[i]={...servers[i],...srv};renderRail();renderSidebar();closeModal();toast('Server updated!','','ok');}
}
async function uploadSrvIcon(input){
  const file=input.files[0];if(!file)return;const fd=new FormData();fd.append('image',file);
  const r=await fetch(`/api/servers/${activeSrvId}/icon`,{method:'POST',body:fd});
  if(r.ok)toast('Icon updated!','','ok');
}
async function uploadSrvBanner(input){
  const file=input.files[0];if(!file)return;const fd=new FormData();fd.append('image',file);
  const r=await fetch(`/api/servers/${activeSrvId}/banner`,{method:'POST',body:fd});
  if(r.ok)toast('Banner updated!','','ok');
}
function copyInvite(){const link=`${location.origin}/invite/${activeSrvId}`;navigator.clipboard.writeText(link).then(()=>toast('Copied!','Invite link copied','ok')).catch(()=>prompt('Copy link:',link));}

// ─── Server context menu ───────────────────────────────────────
function openSrvMenu(){showCtx(84,52,[{icon:'📋',label:'Copy Invite Link',fn:()=>copyInvite()},{icon:'👥',label:'Invite People',fn:()=>openModal('invite')},{sep:true},{icon:'⚙️',label:'Server Settings',fn:()=>openModal('srv-settings')},{sep:true},{icon:'🚪',label:'Leave Server',d:true,fn:()=>{if(confirm('Leave server?')){fetch(`/api/servers/${activeSrvId}/leave`,{method:'DELETE'}).then(()=>{servers=servers.filter(s=>s.id!==activeSrvId);renderRail();if(servers.length)selectServer(servers[0].id);else showWelcome();})}}}]);}
function srvCtx(e,sid){e.preventDefault();showCtx(e.clientX,e.clientY,[{icon:'📋',label:'Copy Invite',fn:()=>{activeSrvId=sid;copyInvite();}},{icon:'⚙️',label:'Settings',fn:()=>{activeSrvId=sid;openModal('srv-settings');}},{sep:true},{icon:'🚪',label:'Leave',d:true,fn:()=>{if(confirm('Leave?'))fetch(`/api/servers/${sid}/leave`,{method:'DELETE'}).then(()=>{servers=servers.filter(s=>s.id!==sid);renderRail();if(servers.length)selectServer(servers[0].id);else showWelcome();});}}]);}
function showCtx(x,y,items){
  const m=$('ctx');m.classList.remove('hidden');
  m.style.left=Math.min(x,window.innerWidth-200)+'px';m.style.top=Math.min(y,window.innerHeight-300)+'px';
  m.innerHTML=items.map((i,idx)=>i.sep?`<div class="ctx-sep"></div>`:`<div class="ctx-i${i.d?' d':''}" data-idx="${idx}">${i.icon} ${esc(i.label)}</div>`).join('');
  m.querySelectorAll('.ctx-i').forEach(el=>{const idx=parseInt(el.dataset.idx);el.onclick=()=>{m.classList.add('hidden');items[idx].fn();};});
}

// ─── Invite landing ────────────────────────────────────────────
if(location.pathname.startsWith('/invite/')){
  const sid=location.pathname.split('/invite/')[1];
  (async()=>{const r=await fetch('/api/auth/me');if(!r.ok){$('auth').style.display='flex';window._postLogin=async()=>{await fetch(`/api/servers/${sid}/join`,{method:'POST'});location.href='/'};}else{await fetch(`/api/servers/${sid}/join`,{method:'POST'});location.href='/';}}  )();
}
</script>
