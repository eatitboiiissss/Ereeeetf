    const isAdmin=srv?.myRole==='admin'||isAdm(me?.username)||isServerOwner;
    c.innerHTML=wrap(`<div class="modal"><h2>Server Settings</h2>
      <div class="mfld"><label>Server Icon</label>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
          <div id="srv-icon-preview" style="width:64px;height:64px;flex-shrink:0">${srvIcon(srv||{},64)}</div>
          <div>
            <div style="font-size:11px;color:var(--t2);margin-bottom:6px">Upload image:</div>
            <button class="btn btn-acc btn-sm" onclick="$('ssi-inp').click()">📷 Upload</button>
            <input type="file" id="ssi-inp" accept="image/*" style="display:none" onchange="uploadSrvIconDirect(this)"/>
          </div>
        </div>
        <div style="font-size:11px;color:var(--t2);margin-bottom:8px">Or choose a premade icon:</div>
        <div id="premade-icons-grid-modal" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px">Loading…</div>
        <button class="btn btn-acc btn-sm" onclick="applyServerIcon()">✓ Apply Selected</button>
      </div>
      ${isAdmin?`
      <div class="mfld"><label>Server Name</label><input id="ss-n" value="${esc(srv?.name||'')}"/></div>
      ${isServerOwner?`
      <div class="mfld"><label>Server Banner / GIF</label>
        <div class="uparea" onclick="$('ssb-inp').click()">${srv?.banner?`<img src="${esc(srv.banner)}" style="max-height:80px;border-radius:7px"/>`:' Click to upload banner'}</div>
        <input type="file" id="ssb-inp" accept="image/*" style="display:none" onchange="uploadSrvBanner(this)"/>
      </div>
      <div class="mfld"><label>Description</label><textarea id="ss-d">${esc(srv?.description||'')}</textarea></div>
      <div class="mfld"><label>Visibility</label><select id="ss-p"><option value="true"${srv?.isPublic?' selected':''}>Public</option><option value="false"${!srv?.isPublic?' selected':''}>Private</option></select></div>`:''}
      <div class="macts2"><button class="btn btn-g" onclick="closeModal()">Cancel</button><button class="btn btn-acc" onclick="saveSrvSett()">Save</button></div>
      `:`<div class="macts2"><button class="btn btn-g" onclick="closeModal()">Close</button></div>`}
    </div>`);
    fetch('/api/premade-icons').then(r=>r.json()).then(icons=>{
      const grid=document.getElementById('premade-icons-grid-modal');
      if(!grid)return;
      grid.innerHTML=icons.length?icons.map(ic=>`<div onclick="selectPremadeIconModal('${esc(ic.url)}',this)" style="cursor:pointer;border-radius:10px;overflow:hidden;border:2px solid var(--bdr);transition:border-color .15s"><img src="${esc(ic.url)}" style="width:56px;height:56px;object-fit:cover;display:block" title="${esc(ic.name||'')}"/></div>`).join('')
        :'<div style="color:var(--t2);font-size:12px">No premade icons yet.</div>';
    }).catch(()=>{});
  } else if(type==='invite'){
    const link=`${location.origin}/invite/${activeSrvId}`;
    c.innerHTML=wrap(`<div class="modal"><h2>Invite People</h2><div class="sub">Share this link to invite others.</div>
      <div style="background:var(--bg3);border-radius:8px;padding:10px 13px;font-size:12px;font-family:monospace;word-break:break-all;color:var(--t1);margin-bottom:12px">${esc(link)}</div>
      <div class="macts2"><button class="btn btn-g" onclick="closeModal()">Close</button><button class="btn btn-acc" onclick="copyInvite()">Copy Link</button></div>
    </div>`);
  }
}
function closeModal(){$('modals').innerHTML='';}
async function createSrv(){
  const name=$('ms-n')?.value.trim(),desc=$('ms-d')?.value.trim(),pub=$('ms-p')?.value==='true';
  if(!name){toast('Error','Server name is required','err');return;}
  try{
    const r=await fetch('/api/servers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,description:desc,isPublic:pub})});
    const d=await r.json();
    if(!r.ok){toast('Error',d.error,'err');return;}
    if(!servers.find(s=>s.id===d.id))servers.push(d);
    closeModal();renderRail();selectServer(d.id);toast('Server Created!',name,'ok');
  }catch(e){toast('Error',e.message,'err');}
}
async function createCh(sid,type){const name=$('ch-n')?.value.trim().toLowerCase().replace(/\s+/g,'-');if(!name)return;await fetch(`/api/servers/${sid}/channels`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,type})});closeModal();}
async function saveCh(chId){const name=$('ech-n')?.value.trim(),topic=$('ech-t')?.value.trim();await fetch(`/api/channels/${chId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,topic})});servers.forEach(s=>s.channels.forEach(c=>{if(c.id===chId){c.name=name;c.topic=topic;}}));closeModal();renderSidebar();if(activeChId===chId)selectChannel(chId);}
async function deleteCh(chId){if(!confirm('Delete this channel?'))return;await fetch(`/api/channels/${chId}`,{method:'DELETE'});closeModal();}
async function saveSrvSett(){
  const name=$('ss-n')?.value.trim(),desc=$('ss-d')?.value,pub=$('ss-p')?.value==='true';
  const r=await fetch(`/api/servers/${activeSrvId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,description:desc,isPublic:pub})});
  if(r.ok){const srv=await r.json();const i=servers.findIndex(s=>s.id===activeSrvId);if(i>-1)servers[i]={...servers[i],...srv};renderRail();renderSidebar();closeModal();toast('Updated!','','ok');}
}
async function uploadSrvIconDirect(inp){
  const f=inp.files[0];if(!f)return;
  const fd=new FormData();fd.append('image',f);
  const r=await fetch(`/api/servers/${activeSrvId}/icon`,{method:'POST',body:fd});
  if(r.ok){const d=await r.json();const prev=document.getElementById('srv-icon-preview');if(prev){prev.src=d.url;prev.tagName==='IMG'?prev.src=d.url:null;}toast('Icon updated!','','ok');}
  else toast('Error','Upload failed','err');
}
function selectPremadeIconModal(url,el){
  document.querySelectorAll('#premade-icons-grid-modal div').forEach(d=>d.style.borderColor='var(--bdr)');
  el.style.borderColor='var(--acc)';
  window._selectedPremadeIcon=url;
  const prev=document.getElementById('srv-icon-preview');
  if(prev&&prev.tagName==='IMG')prev.src=url;
}
async function uploadSrvIcon(inp){const f=inp.files[0];if(!f)return;const fd=new FormData();fd.append('image',f);const r=await fetch(`/api/servers/${activeSrvId}/icon`,{method:'POST',body:fd});if(r.ok)toast('Icon updated!','','ok');}
async function uploadSrvBanner(inp){const f=inp.files[0];if(!f)return;const fd=new FormData();fd.append('image',f);await fetch(`/api/servers/${activeSrvId}/banner`,{method:'POST',body:fd});toast('Banner updated!','','ok');}
function copyInvite(){const l=`${location.origin}/invite/${activeSrvId}`;navigator.clipboard?.writeText(l).then(()=>toast('Copied!','','ok')).catch(()=>prompt('Link:',l));}

// ── SERVER MENU ───────────────────────────────────────────────────────
function openSrvMenu(){
  if(view!=='server'){return;}
  const srv=findSrv(activeSrvId);
  const isAdmin=srv?.myRole==='admin';
  const items=[{icon:'📋',label:'Invite People',fn:()=>openModal('invite')},{sep:true}];
  if(isAdmin||isAdm(me?.username))items.push({icon:'⚡',label:'Manage Roles',fn:()=>openRolesPanel(activeSrvId)},{sep:true},{icon:'⚙️',label:'Server Settings',fn:()=>openModal('srv-settings')},{sep:true});
  items.push({icon:'🚪',label:'Leave Server',d:true,fn:()=>{if(confirm('Leave server?'))fetch(`/api/servers/${activeSrvId}/leave`,{method:'DELETE'}).then(()=>{servers=servers.filter(s=>s.id!==activeSrvId);renderRail();if(servers.length)selectServer(servers[0].id);else showWelcomeMain();});}});
  showCtx(84,52,items);
}
function srvCtx(e,sid){
  e.preventDefault();
  const srv=findSrv(sid);
  const isOwnerOfSrv=srv?.ownerId===me?.id||me?.isOwner;
  const items=[
    {icon:'📋',label:'Invite',fn:()=>{activeSrvId=sid;openModal('invite');}},
    {icon:'⚙️',label:'Settings',fn:()=>{activeSrvId=sid;openModal('srv-settings');}},
    {icon:'🔑',label:'Copy ID',fn:()=>{navigator.clipboard?.writeText(sid).then(()=>toast('Copied','Server ID copied','ok')).catch(()=>prompt('Server ID:',sid));}},
    {sep:true},
    {icon:'🚪',label:'Leave',d:true,fn:()=>{if(confirm('Leave server?'))fetch(`/api/servers/${sid}/leave`,{method:'DELETE'}).then(()=>{servers=servers.filter(s=>s.id!==sid);renderRail();if(servers.length)selectServer(servers[0].id);else showWelcomeMain();});}},
  ];
  if(isOwnerOfSrv){items.push({icon:'🗑️',label:'Delete Server',d:true,fn:()=>{if(confirm('PERMANENTLY delete this server and all its data?'))fetch(`/api/servers/${sid}`,{method:'DELETE'}).then(()=>{servers=servers.filter(s=>s.id!==sid);renderRail();if(servers.length)selectServer(servers[0].id);else showWelcomeMain();toast('Deleted','','ok');});}});}
  showCtx(e.clientX,e.clientY,items);
}
function showCtx(x,y,items){const m=$('ctx');m.classList.remove('hidden');m.style.left=Math.min(x,window.innerWidth-200)+'px';m.style.top=Math.min(y,window.innerHeight-300)+'px';m.innerHTML=items.map((item,idx)=>item.sep?'<div class="ctxsep"></div>':`<div class="ctx-i${item.d?' d':''}" data-idx="${idx}">${item.icon} ${esc(item.label)}</div>`).join('');m.querySelectorAll('.ctx-i').forEach(el=>{const idx=parseInt(el.dataset.idx);el.onclick=()=>{m.classList.add('hidden');items[idx].fn();};});}

// ── TOAST ─────────────────────────────────────────────────────────────
function toast(title,body='',type=''){
  if(!mySettings.notifications&&type!=='err')return;
  const c=$('toasts'),d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML=`<div class="toast-t">${esc(title)}</div>${body?`<div class="toast-b">${esc(body)}</div>`:''}`;
  c.appendChild(d);setTimeout(()=>d.remove(),4000);
}

// ── GLOBAL EVENTS ─────────────────────────────────────────────────────
document.addEventListener('mousedown',e=>{
  if(!e.target.closest('.ctx'))$('ctx').classList.add('hidden');
  if(!e.target.closest('.pc')&&!e.target.closest('[onclick*="openProfile"]')&&!e.target.closest('.mg-av')&&!e.target.closest('.mgan'))$('pc').classList.add('hidden');
  if(!e.target.closest('#ep-wrap')&&!e.target.closest('[onclick*="toggleEP"]'))$('ep-wrap').innerHTML='';
  if(!e.target.closest('.sov')&&!e.target.closest('[onclick*="toggleSearch"]'))$('sov').classList.add('hidden');
});

// Handle resize — update MP visibility
window.addEventListener('resize',()=>{renderMP();});

// Default font
$('font-style').textContent=`:root{--font:'Norse',serif;}`;

// ── Anti-Inspect Element ──────────────────────────────────────────
(function antiInspect(){
  // Method 1: DevTools size detection
  function detectDevTools(){
    const threshold=160;
    const widthDiff=window.outerWidth-window.innerWidth;
    const heightDiff=window.outerHeight-window.innerHeight;
    if(widthDiff>threshold||heightDiff>threshold)onInspect();
  }
  setInterval(detectDevTools,1000);

  // Method 2: debugger timing trick
  function debuggerTrap(){
    const start=performance.now();
    // eslint-disable-next-line no-debugger
    (function(){}).constructor('debugger')();
    if(performance.now()-start>100)onInspect();
  }
  setInterval(debuggerTrap,3000);

  // Method 3: console.log object with getter (fires when devtools inspects it)
  let _inspectFired=false;
  const _trap=Object.defineProperty({},'trap',{get:function(){if(!_inspectFired){_inspectFired=true;onInspect();}return 'banned';}});
  setInterval(()=>{console.log(_trap);console.clear();},2000);

  // Method 4: F12, Ctrl+Shift+I/J/C, Ctrl+U keys
  document.addEventListener('keydown',e=>{
    if(e.key==='F12')e.preventDefault();
    if(e.ctrlKey&&e.shiftKey&&['I','J','C','K'].includes(e.key)){e.preventDefault();onInspect();}
    if(e.ctrlKey&&e.key==='u'){e.preventDefault();}
    if(e.ctrlKey&&e.key==='s'){e.preventDefault();}
  });

  // Method 5: Right-click context menu
  document.addEventListener('contextmenu',e=>e.preventDefault());

  let _warnCount=0;
  function onInspect(){
    _warnCount++;
    if(_warnCount===1){
      // First detection: warn
      document.body.style.filter='blur(12px)';
      const warn=document.createElement('div');
      warn.id='_inspect-warn';
      Object.assign(warn.style,{position:'fixed',inset:'0',background:'rgba(0,0,0,.9)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',zIndex:'999999',color:'#fff',textAlign:'center',gap:'16px'});
      warn.innerHTML='<div style="font-size:64px">👀</div><h2 style="font-size:28px;font-weight:900;color:#f04747">Inspect Element Detected</h2><p style="color:#9898b8;font-size:14px;max-width:340px">Close developer tools to continue using Molecord.</p>';
      document.body.appendChild(warn);
      document.body.style.overflow='hidden';
    }
    if(_warnCount>=3){
      // Persistent: lock out
      document.body.innerHTML='<div style="background:#07070e;color:#f04747;display:flex;align-items:center;justify-content:center;height:100vh;font-size:24px;font-weight:900;font-family:sans-serif">🔒 Access Denied</div>';
    }
  }

  // Clear warning when devtools closed (size back to normal)
  setInterval(()=>{
    const threshold=160;
    if(window.outerWidth-window.innerWidth<threshold&&window.outerHeight-window.innerHeight<threshold){
      const w=document.getElementById('_inspect-warn');
      if(w){w.remove();document.body.style.filter='';document.body.style.overflow='';_warnCount=0;}
    }
  },800);
})();
</script>
